 a la aplicación; no se centra en cómo funciona el software, sino en qué tan bien funciona el software (confiabilidad, usabilidad, rendimiento se evalúan en diferentes entornos para garantizar que el producto funcione según los requisitos del diseño en el mundo donde opera). 102 El objetivo de una prueba de caja negra es evaluar una aplicación por sus méritos y diseño. Si bien cada equipo desarrolla su set de herramientas, hay algunas técnicas básicas que la mayoría de los equipos utilizan para garantizar que el producto funcione. ¿Qué son las pruebas de caja negra? Para explicar el origen del término es útil realizar un Diagrama EPS (Entrada, Proceso y Salida) donde cada elemento corresponde a:  Entrada: Datos que recibe un determinado proceso.  Proceso: Operaciones que se realizan para dar solución a un problema.  Salida: Solución al problema originalmente planteado. Las operaciones que se realizan en el proceso, por ser de tipo caja negra no son visibles por el usuario, ya que desconoce su implementación. Sin embargo, a pesar de no conocer la forma en la que se le da solución al problema, conoce los datos de entrada y la salida que arroja el proceso. En una prueba de caja negra se trata de garantizar que se ha probado la mayor cantidad de software posible dentro de las limitaciones de tiempo, datos y probabilidad matemática. Se utilizan estas pruebas para eliminar problemas razonables y detectar los valores atípicos. Las pruebas de Caja Negra comienzan con los enfoques más rudimentarios para el análisis de datos y se expanden a exámenes más complicados de la lógica, el rendimiento y la funcionalidad del software; todos los buenos casos de prueba comienzan con los datos. El software en su núcleo trata de tomar información y decirle a la computadora cómo tomarla; luego el usuario carga datos y la aplicación levanta los datos para ver cómo tomarla. Tipos de técnicas de Caja Negra Partición de equivalencia Consiste en tomar los valores de entrada de un campo, probar las respuestas válidas y no válidas y, a continuación, particionarlas con condiciones de prueba similares para reducir la cantidad de pruebas. Se realizan cortes por grupo para acelerar la validación del campo El principio de esta prueba es que el caso de prueba de un valor representativo de cada clase es igual a una prueba de cualquier otro valor de la misma clase. De esa manera, se pueden identificar equivalencias válidas y no válidas. Pruebas de análisis de valor límite Éstas trabajan de la mano con la anterior al garantizar que funcionen los límites apropiados colocados en las particiones, pudiendo identificar fácilmente los valores incorrectos para un campo, pero debe asegurarse que se entregue el error correcto cuando se ingresa. Esta técnica de prueba de caja negra se basa en el principio de que, si un sistema funciona bien para estos valores particulares, funcionará perfectamente para todos los valores que se encuentran entre los dos valores límite. Las pautas para este tipo de análisis son:  Si una condición de entrada está restringida entre los valores x e y, entonces los casos de prueba deben diseñarse con valores x e y con otros valores que estén por encima y por debajo de los mismos. 103  Si una condición de entrada es un gran número de valores, se debe desarrollar el caso de prueba que necesita ejercer los números mínimo y máximo. También se ponen a prueba los valores superiores e inferiores a los valores mínimos y máximos.  Al aplicar las pautas 1 y 2 a las condiciones de salida, da una salida que refleja los valores mínimos y máximos esperados. También prueba los valores inferiores o superiores. Pruebas de todos los pares También denominada “prueba de pares”, toma dos valores ingresados y luego evalúan todas las combinaciones posibles para garantizar que funcionen correctamente.`,
  8: `UNIDAD N°8: TESTING FUNCIONAL/NO FUNCIONAL Contenido: Code Review ∙ Code Coverage ∙ Base de Datos ∙ Performance . Code Review Concepto Un Code Review es una discusión entre dos o más programadores sobre cambios en el código para entregar/reparar una funcionalidad, se utiliza en el desarrollo de software para evaluar la calidad del código que se ha escrito. En un Code Review, otro miembro del equipo revisa el código y proporciona comentarios y sugerencias para mejorarlo. Objetivo Existen varios motivos por los que esta práctica es importante, sin embargo, el objetivo principal para empezar a implementar un Code Review es el de mejorar la calidad del código que se desarrolla y crear una cultura de equipo en la que todos los desarrolladores se sienten importantes. El hecho de compartir los resultados de las revisiones y de mejorar aquellas cosas que el equipo considera importantes, ayuda a los desarrolladores a aprender buenas prácticas y a desarrollar bajo un mismo criterio y estilo. ¿Por qué hacer Code Review? La explicación del manual dirá que mejora la calidad, la mantenibilidad y la homogeneización del código fuente. Sin embargo, existen otras razones:  Hasta el más genio se equivoca: Una lectura apurada del requerimiento, una condición negada demasiadas veces, un mal día o una mala noche, un malestar de salud física o mental le puede suceder a cualquiera. Nadie es perfecto y hasta les programadores somos humanos y pueden equivocarse. Los requerimientos no siempre son lo suficientemente claros: Muchas veces existe cierta interpretación al programar, que a otra persona le despierta dudas y tal vez habría que preguntar o aclarar mejor algún detalle en el requerimiento.  La revisión de código debe incluirse siempre dentro del proceso de desarrollo de software; es fundamental aclarar que dicha revisión no reemplaza el chequeo funcional del desarrollador, ni las pruebas unitarias, ni las pruebas de integración, ni las pruebas de regresión, ni las pruebas funcionales, ni las pruebas automatizadas. Revisar el código no evita que haya que probar el software de todas las maneras posibles. La revisión del código como método de aprendizaje La revisión de código es una de las formas más simples y eficaces de enseñar y aprender a programar en la vida diaria ya que se da de modo natural, progresivo, adecuado al contexto y es individual y grupal a la vez. 116 La revisión debe hacerse a conciencia y ser valorada por el equipo y los líderes técnicos; y la intención de criticar y ser criticado no debe confundirse con una evaluación del trabajador o de su capacidad, sino con una práctica habitual de la labor de un programador, ya que por el tipo de tarea es lo más lógico y sano que siempre se estén aprendiendo cosas nuevas. Beneficios Los beneficios de las revisiones de código van, desde mejorar la calidad del código escrito y el crecimiento profesional de los desarrolladores, hasta ver cómo otros compañeros solucionan problemas concretos e incluso el compartir conocimientos. En ningún caso se trata de encontrar culpables ni de fiscalizar el trabajo de los demás. Como resultados más palpables las revisiones de código consiguen: Mejorar la calidad del equipo El proceso de revisión de código fomenta la colaboración y el trabajo en equipo. Los miembros del equipo pueden compartir conocimientos y técnicas para mejorar el código, lo que aumenta la eficiencia y la calidad del trabajo. Existe un aumento de compromiso y motivación ya que, al incluir Code Review en el flujo de trabajo, los desarrolladores se comprometen más en realizar un código más limpio y a consolidar aspectos pendientes. Al saber que el código va a ser revisado, se tiene más precaución, se incrementa el compromiso con el proyecto y aumenta la motivación del desarrollador al ser gratificado por el resto de compañeros. Mejorar la calidad de comunicación entre los miembros del equipo El proceso de revisión de código ayuda a fomentar una comunicación más clara y efectiva dentro del equipo. Al discutir los cambios propuestos en el código, los miembros del equipo pueden aclarar los requisitos y expectativas, lo que puede evitar malentendidos y errores en el futuro. El proyecto es de todos y el código que implementamos es responsabilidad todos los miembros del equipo. Es por ello, que es importante que todo el equipo esté alineado sobre la funcionalidad que se añade o se modifica. Esta comunicación es positiva e integradora y une puentes entre el equipo. Mejorar la calidad del código Al revisar el código, los miembros del equipo pueden identificar errores, bugs, y otros problemas en el código antes de que se implemente. Esto ayuda a garantizar que el código final sea de alta calidad y funcione correctamente. La consistencia es otra característica que se fortalece con esta práctica. Muchas veces se nota que parte del desarrollo se ha realizado por diferentes personas, pero el código es propiedad y responsabilidad de todo el equipo, por lo que debería ser uniforme. Es importante establecer reglas de estilo, marcar estructura de carpetas y crear normas comunes. Esto facilita la lectura del código, prevenir errores y una mayor colaboración si un tercer desarrollador debe de ayudar en el proyecto porque ya conoce lo que se va a encontrar. 117 Facilitar el aprendizaje Al revisar el código de otros miembros del equipo, los desarrolladores pueden aprender nuevas técnicas y prácticas que pueden aplicar a su propio trabajo. Esto puede ayudar a mejorar la calidad de todo el código que se produce en el equipo. Ayuda también a aumentar el nivel de calidad en toda la organización. Esto es debido a que los desarrolladores con menos experiencia pueden aprender rápidamente de aquellos con más experiencia en la tecnología que se esté utilizando. Probablemente un desarrollador con más experiencia ya haya tenido ciertos problemas por los que podrá guiar a los recién iniciados a una mejor solución. Encontrar problemas de codificación En ocasiones ayuda a encontrar errores, posibles problemas de rendimiento o vulnerabilidades. El objetivo no es encontrar bugs, pero a veces pueden encontrarse mientras se realiza la revisión. Elementos a revisar en un Code Review Idealmente, se revsisaría todo el código, pero la calidad deseada del producto es la que va a definir las premisas sobre la revisión requerida para determinado software. Los Code Review no entienden de rol en el equipo: ser la persona con más experiencia en el equipo no implica que el código no necesite revisión. Incluso si el código es impecable, la revisión proporciona una oportunidad para la tutoría y la colaboración del resto del equipo. Todos pueden aportar en el proceso del Code Review. Algunos de los puntos principales que se han de tener en cuenta a la hora de revisar el código de otro desarrollador podrían ser: Objetivo funcional Revisar el requerimiento funcional y al menos chequear que superficialmente el código aplique sobre el requerimiento solicitado. De todas maneras, esto nunca remplazará a las pruebas funcionales, sean manuales o automatizadas. Si los requerimientos no se cumplen, ningún comentario tiene sentido, es la razón de existir de una pull request o de una tarea, debe resolver un problema específico. Cuando la tarea es de capa de presentación UI, ya sea móvil o web es importante validar que la implementación cumple con el diseño de UI. Si implica cambiar o actualizar APIs, validar que sigue siendo compatible con todos los clientes y no genera “break changes”. Si hay cambios en bases de datos o tablas, asegurar que contiene migraciones y no va generar daños colaterales.  ¿El código enviado cumple realmente este propósito? ¿Está bien especificado el propósito? Nomenclaturas y convenciones Verificar que se cumplan los estilos del lenguaje y del proyecto; chequear guías de estilo particular si se hubieran acordado; que se aplique correctamente la nomenclatura, la longitud de las funciones, cómo nombrar las variables, funciones, métodos, clases, comentarios en el código, 118 entre otros. Ya sea, tanto en formato como en adecuación al glosario específico, que no haya errores de escritura. Básicamente, esto hace al código más legible y permite su mantenibilidad.  ¿Es el código consistente con el proyecto en términos de estilo y convenciones de nombrado? ¿Es el flujo implementado sensato y los nombres de las variables y los métodos fueron fáciles de seguir? ¿Se comprende el concepto en un tiempo razonable? ¿Puedes hacer un seguimiento a través de múltiples archivos o funciones? Lógica y algoritmia Esto puede variar mucho según el lenguaje de programación; pero suelen ser un punto de confusión las lógicas de control, en particular cuando se anidan condiciones en código spaghetti (término que se utiliza para describir un código mal estructurado y difícil de mantener) o se utilizan algoritmos tomados de algún otro sitio sin conocer bien los detalles de aplicación. Asegurar que el código es consistente con el diseño, patrones y arquitectura definida.  ¿Se cumple con la arquitectura software? ¿El código construido es flexible, escalable y reutilizable? ¿Cumple con las expectativas técnicas? ¿Cumple los principios SOLID? ¿Utiliza los patrones de diseño? Manejo de errores Una buena revisión de código debe sospechar que todo va a salir mal: ¿y si los parámetros no tienen los valores esperados? ¿Y si los recursos necesarios no están disponibles (archivos, servicios externos, bases de datos)? Así se puede validar cómo reaccionaría el código ante esos sucesos inesperadamente frecuentes en la vida real.  ¿Se manejan correctamente las excepciones? ¿Se han añadido errores personalizados para esa parte del código? Si es así, ¿son útiles? Mejoras conceptuales Cuando el revisor tiene mayor experiencia que el autor del código; es posible que proponga otra forma de resolver las cosas, algoritmos, patrones de diseño, etc.`,
  9: `UNIDAD N°9: MOBILE TESTING Contenido: Introducción ∙ Aplicaciones nativas o web ∙ Sistemas Operativos ∙ Pruebas en mobile testing ∙ Compliance. Compatibilidad ∙ Responsividad. Introducción Las apps móviles son un recurso cada vez más utilizado por las empresas para agregar valor a su oferta y posicionarse en el mercado. Pero como cualquier otro producto hecho por el hombre, estos desarrollos están sujetos a errores y fallos durante su uso. He aquí la importancia de las pruebas de software o software testing. En el acelerado mundo del desarrollo de aplicaciones móviles, es crucial garantizar que la aplicación funcione sin problemas en diversos dispositivos y plataformas. Las pruebas de aplicaciones móviles son esenciales para lograrlo, ya que ayudan a identificar y corregir posibles problemas antes de que la aplicación llegue a las manos de los usuarios. Concepto El proceso sistemático de evaluar la funcionalidad, usabilidad y rendimiento de una aplicación móvil se conoce como prueba de aplicaciones móviles. Examinar la funcionalidad, experiencia del usuario, seguridad y compatibilidad de la aplicación con diferentes sistemas y dispositivos es parte de este proceso. El objetivo es garantizar que la aplicación cumpla con los requisitos de calidad y proporcione una experiencia de usuario memorable. Finalmente, se persigue el descubrimiento de cualquier problema que esté presente en el software, establecer cómo la organización puede resolver estos problemas y, en última instancia, enviar un producto de alta calidad en el que los clientes estén contentos de invertir. Importancia del mobile testing Principalmente, ayuda a localizar y resolver errores y fallas que podrían afectar negativamente la experiencia del usuario; se encarga de validar que el sistema opere correctamente y que no existan fallas que interfieran en el funcionamiento. 134 Las pruebas garantizan que la aplicación funcione correctamente en diversas situaciones, como variaciones en la intensidad de la red y las especificaciones del dispositivo. En última instancia, las pruebas colaboran en la creación de aplicaciones móviles confiables y fáciles de usar, reduciendo la posibilidad de críticas desfavorables, desinstalaciones y posibles pérdidas financieras. Ventajas  Detección oportuna de errores en el sistema antes de su lanzamiento al mercado.  Reducción de costos: La localización de bugs en etapas tempranas reduce los riesgos y costos relacionados a las fallas ocasionadas.  Incremento en el número de descargas.  Aumento en los ingresos de la empresa.  Posicionamiento favorable para la marca o empresa.  Entregas de calidad. El rol de QA en el testing mobile La actividad de pruebas en un entorno móvil presenta ciertas singularidades respecto a las pruebas realizadas en otros entornos o aplicaciones. Hay que seguir los 7 principios del testing y considerar una serie de factores para establecer la estrategia de pruebas. Diversidad de plataformas de instalación y actualización Apple Store y Google Play suelen ser los mercados más comunes para poder distribuir una aplicación, pero dependiendo de la naturaleza del producto, el uso de mecanismos de distribución de terceros o empresariales será necesario. La elección de la plataforma adecuada permite compartir la aplicación de la forma más segura tanto para el usuario como para el gestor. También es importante tener en cuenta que existe la posibilidad que se deba gestionar un pago para la instalación de la app, por lo que estos mercados o mecanismos de distribución deben ser correctamente configurados para llevar a cabo esa gestión. Diversidad de OS y sus versionados Dependiendo de los usuarios objetivos del producto hay que tener en cuenta qué versiones de los OS disponibles deben ser aseguradas para cubrir y cumplir con cualquier restricción que estas demanden. Los OS más comunes son Android y iOS, pero también hay que considerar sus posibles variantes, las capas de personalización de las distintas marcas de fabricantes y las características específicas de dispositivos como tablets, smartwatches y otros. Diversidad de dispositivos y marcas Los dispositivos pueden presentarse en modo básico, de altas prestaciones, Smartphone, tablet, incluso vestibles o weareables y dispositivos conectados a través de IOT. Lo importante es identificar qué dispositivos y marcas son los que los usuarios de la app utilizarán con mayor probabilidad en el mercado y segmento al que se dirige. 135 Diversidad de prestaciones y sensores Los dispositivos pueden estar equipados con una gran variedad y combinación de características específicas, como por ejemplo radio, USB, sensores de wifi, NFC, acelerómetro, proximidad, Bluetooth, cámaras, altavoces, micrófonos, auriculares, GPS, lectores de huella dactilar, magnetómetros, detectores de luz ambiente, lectores de iris, sensores infrarrojos, giroscopios, barómetros, sensores capacitivos, podómetros, sensores de espectro de color, sensores de ritmo cardíaco, etc. Diversidad de redes y proveedores de redes Usualmente los datos consumidos por las apps se obtienen a través de internet. Por lo tanto, puede haber diversidad de niveles de cobertura, pérdida de señal y cambios entre redes 2G, 3G, 4G. A su vez, hay que considerar que los datos pueden ser recibidos desde otras fuentes de datos de comunicación como Bluetooth, NFC o sensores propios del dispositivo. Diversidad de tipo de compras en la app Dependiendo del canal a través del que se adquiera el producto, se pueden gestionar los pagos de forma tanto nativa como a través de servicios de terceros. En ambos casos es importante cumplir con los requisitos y exigencias de configuración y seguridad para no comprometer los datos personales del usuario. Diversidad de localización de los usuarios Los usuarios y dispositivos pueden estar dispersos geográficamente a lo largo de diversos mercados, cada uno con sus particularidades. Esto implica una gran diversidad a nivel de leyes y estándares, idiomas, caracteres, formatos de monedas, direcciones, teléfonos, fechas y medidas por país. Otros aspectos a considerar Importancia de la seguridad por ser dispositivos expuestos y en movilidad.  Aplicaciones de tipo nativas, web o híbridas.   Potenciales problemas de las plataformas que impacten en la aplicación.  UX como factor clave para el usuario.  Time to market muy cortos.  Posibilidad de interrupciones de la APP como llamadas, SMS, notificaciones.  Diversidad en condiciones de la batería, consumo de energía y estado de carga.  Diversidad en condiciones de memoria.  Diversidad en tamaños y resoluciones de pantallas.  Variabilidad de las temperaturas de los dispositivos.  Diversidad de métodos de entrada.  Cambios de orientación del dispositivo.  Otorgación de permisos de accesos a otras prestaciones.  Diversidad en método de conexión de la APP: nunca, siempre o parcialmente conectada.  Modelo de negocio: semi o gratuita, con publicidad, basada en transacciones, de pago, empresarial. 136 Buenas prácticas Cartera de dispositivos adecuada Para la ejecución de la prueba específica del mercado objetivo, segmento y tipo de aplicación a probar, se puede disponer de dispositivos reales sobre los que probar, recurrir a emuladores o simuladores o incluso a un laboratorio de pruebas. Ventajas de un laboratorio de pruebas  Acceso a una amplia variedad de dispositivos móviles, tipos pantallas y resoluciones.  Acceso a amplia variedad de sistemas operativos y sus versiones, tanto iOS como Android.  Ahorro de tiempo y recursos sin comprar ni mantenerlos en la propia empresa.  Mayor identificación de errores difícilmente detectados en prueba manual o en dispositivos específicos.  Acceso a diversas configuraciones de red, velocidades de conexión y restricciones de  ancho de banda. Integración con procesos de automatización para acelerar el proceso y evitar pruebas manuales. Estrategia de pruebas La estrategia de pruebas, desde su diseño hasta su ejecución, debe ser adecuada para el mercado y tipo de aplicación a testear, ir encaminada al escenario concreto de los dispositivos móviles, con todas sus particularidades. Funcionalidad Verificar si la aplicación funciona correctamente y cumple con los requisitos especificados. Crear una cuenta de usuario y acceder a un perfil personal son acciones sujetas a fallos durante el uso de aplicaciones móviles. Esto tiene que ver con la integración de los módulos codificados y su interacción entre sí. Usabilidad Verificar que el diseño e interfaz son sencillos e intuitivos con un flujo natural y lógico, mediante un diseño previo que enfatice la usabilidad y el fácil acceso a todas las funciones. La satisfacción de los usuarios es la prioridad en la creación de una aplicación móvil. Por tal motivo, en las etapas finales del ciclo de vida de desarrollo del software, los desarrolladores incorporan a los clientes en las pruebas para obtener retroalimentación sobre su experiencia. Con sus comentarios podrán determinar si es necesario realizar cambios o mejoras en el sistema. Rendimiento 137 Verificar velocidad de carga, eficiencia de la batería, temperatura del dispositivo y capacidad de manejar una gran cantidad de datos. El lanzamiento de un producto al mercado puede generar la saturación de un sitio web o una app móvil en el intento de acceder a él o hacer una compra. Si la aplicación no cuenta con un desarrollo óptimo pueden desencadenarse algunas fallas, como un tiempo excesivo de respuesta, el sobrecalentamiento del dispositivo o gasto inusual de la batería. Las pruebas de rendimiento tienen la función de evitar este tipo de defectos, sometiendo al sistema a cargas extremas o poco usuales de uso. De esta manera se sabrá si la aplicación podrá soportarlas en una situación real. Conectividad Las fallas de conexión son uno de los problemas más comunes durante el uso de aplicaciones móviles.`,
  10: `Metodologías tradicionales ∙ Metodologías ágiles ∙ Tableros ágiles ∙ Testing en la agilidad ∙ Rol del tester en un equipo ágil. Metodologías tradicionales La metodología tradicional es una metodología establecida donde los proyectos se ejecutan en un ciclo secuencial, que sigue una secuencia fija: Iniciación. 1. 2. Planificación. 3. Ejecución. 4. Medición. El enfoque de la gestión de proyectos tradicional pone especial énfasis en los procesos lineales, la documentación, la planificación por adelantado y la priorización. Con el método tradicional, el tiempo y el presupuesto son variables y los requerimientos (aquello que tenemos que lograr) son fijos, debido a esto a menudo existen problemas de presupuesto y plazos. Para cada paso hay herramientas y técnicas definidas por el estándar que marca la metodología PMBOK. Testing en cascada Con el modelo en cascada o Waterfall, los proyectos se dividen en diferentes fases que deben completarse en un orden secuencial. Ninguna puede comenzar hasta que la anterior haya finalizado. En general, cada fase termina en un hito del proyecto que indica que puede comenzar la siguiente. Las fases específicas de esta metodología dependen del trabajo del equipo, pero suelen ser como estas:  Fase de requisitos, a veces, dividida en una fase de análisis adicional.  Fase de diseño del sistema.  Fase de implementación, también conocida como fase de desarrollo o de codificación, según el tipo de proyecto.  Fase de pruebas.  Fase de mantenimiento. 156 Enfoque de prueba La primera fase del modelo en cascada es la fase de requisitos en la que todos los requisitos del proyecto están completamente definidos antes de comenzar las pruebas. Durante esta fase, el equipo de pruebas analiza el alcance de las pruebas, la estrategia de pruebas y redacta un plan de pruebas detallado. Solo una vez que se complete el diseño del software, el equipo pasará a la ejecución de los casos de prueba para garantizar que el software desarrollado se comporte como se esperaba. En esta metodología, el equipo de pruebas pasa a la siguiente fase sólo cuando se completa la fase anterior. Pasos del modelo en cascada Fase de requerimientos Es el proceso de planificación inicial en el que los miembros del equipo reúnen toda la información posible para garantizar el éxito del proyecto. Como las tareas del método waterfall dependen de los pasos anteriores, hay que prever todo en detalle antes de empezar. Este proceso de planificación es una etapa crucial de la metodología en cascada y por ese motivo, la mayor parte del tiempo del proyecto se dedica a la planificación. Para que el método waterfall sirva, hay que elaborar un plan del proyecto en el que se explique cada fase; incluir todo, desde qué recursos se necesitan a qué miembros específicos del equipo trabajarán. Por lo general, a este registro se lo llama documento de requerimientos del proyecto. Al finalizar la fase de requerimientos, se debería tener un esquema muy claro del proyecto de principio a fin que incluya lo siguiente:  Cada etapa del proceso.  Quién trabajará en cada etapa.    Un cronograma en el que se detalle cuánto tiempo durará cada etapa. Las dependencias clave. Los recursos necesarios. 157 Etapa de diseño del sistema En un proceso de desarrollo de software, la fase de diseño implica que el equipo que trabajará en el proyecto especifique qué hardware usará, además de cualquier otro detalle, como los lenguajes de programación y la interfaz de usuario. Hay dos pasos fundamentales en la fase de diseño del sistema: la fase de diseño de alto nivel y la de diseño detallado. En la fase de diseño de alto nivel, el equipo elabora un esqueleto de cómo funcionará el software y cómo se accederá a la información. Durante la fase de diseño detallado, el equipo define los detalles particulares del software. Si la fase de diseño de alto nivel es el esqueleto, la de diseño detallado se refiere a los órganos del proyecto. Los miembros de los equipos que hacen sus desarrollos aplicando la metodología en cascada deben documentar cada paso para que el resto del equipo pueda consultar qué se ha hecho a medida que el proyecto avanza. Etapa de implementación Esta es la fase en que todo entra en acción. Según los documentos de requerimientos del paso uno y del proceso de diseño del sistema del paso dos, el equipo inicia un proceso de desarrollo pleno para elaborar el software que se ha previsto tanto en la fase de requerimientos como en la de diseño del sistema. Etapa de pruebas En esta etapa el equipo de desarrollo entrega el proyecto al equipo de calidad para que realice las pruebas pertinentes. Los QA testers buscan cualquier error que deba repararse antes de la implementación del proyecto. Los encargados de las pruebas documentan con claridad todos los problemas que encuentran al realizar el control de calidad. En caso de que otro desarrollador se encuentre con un error similar, podrá consultar la documentación anterior para corregir el error. Fase de desarrollo En los proyectos de desarrollo, esta es la etapa en la que se implementa el software para los usuarios finales. En otros casos, es el momento en que se lanza el entregable definitivo a los clientes finales. Fase de mantenimiento Una vez que el proyecto se ha lanzado para su implementación, puede haber instancias en las que se descubra algún error nuevo o en las que sea necesario realizar alguna actualización del software. A esto se lo conoce como fase de mantenimiento y es muy común, en el desarrollo de software, que el trabajo de esta etapa sea continuo. Ventajas Este modelo de Ingeniería de software es muy sencillo de planificar y gestionar. Por lo tanto, los proyectos en los que los requisitos están claramente definidos y establecidos de antemano se pueden probar fácilmente utilizando un modelo en cascada. 158 La documentación coherente facilita el análisis retrospectivo Cuando se implementa el proceso de gestión de proyectos waterfall, se está documentando cada paso. Por lo que puede resultar beneficioso, por ejemplo, detectar errores con facilidad cuando el equipo tenga que revisar los procesos. También es excelente para crear procesos repetitivos para miembros nuevos del equipo. Es muy fácil dar seguimiento al progreso Al elaborar un proyecto en cascada con un diagrama de Gantt, resultará muy fácil dar seguimiento al progreso. El cronograma mismo sirve como barra de progreso, para que siempre quede claro en qué etapa se encuentra el proyecto. Los miembros del equipo pueden administrar el tiempo con efectividad Dado que para implementar la metodología en cascada se trabaja mucho en la planificación durante las fases de requerimientos y diseño, es más fácil estimar cuánto tiempo habrá que destinar a alguna parte específica del proceso en cascada. Desventajas En el modelo en cascada, puede comenzar con la siguiente fase sólo una vez que se haya completado la fase anterior. Por lo tanto, este modelo no puede adaptarse a eventos no planificados ni a la incertidumbre. Esta metodología no es adecuada para proyectos donde los requisitos cambian con frecuencia. Los obstáculos pueden afectar gravemente al cronograma La metodología en cascada es lineal por naturaleza, entonces, ante cualquier pequeña piedra en el camino o tarea que se demore, el cronograma entero cambia. Puede ser complicado volver atrás con el progreso lineal Uno de los principales inconvenientes de la metodología en cascada es que es muy difícil volver atrás, a una fase anterior, cuando ya se ha finalizado. El control de calidad llega muy tarde en el proceso En comparación con algunas de las metodologías iterativas de gestión de proyectos, la etapa de revisión en una estructura en cascada se produce tarde en el proceso. Si al principio del proceso se cometió un error, puede resultar complicado volver atrás y repararlo. Por la manera en que funcionan los procesos en cascada, no hay lugar a la iteración ni a la búsqueda de soluciones mejores. Metodologías ágiles El manifiesto ágil En 2001, un grupo de personas, que representaban las metodologías de desarrollo ágil de software más utilizadas, se pusieron de acuerdo en un conjunto de valores y principios 159 comunes que se conocieron como el Manifiesto para el Desarrollo Ágil de Software o el Manifiesto Ágil. El Manifiesto Ágil contiene cuatro enunciados de valores: Individuos e interacciones sobre procesos y herramientas.   Software funcionando sobre documentación extensiva.  Colaboración con el cliente sobre negociación contractual.  Respuesta ante el cambio sobre seguir un plan. El Manifiesto Ágil sostiene que, aunque los conceptos de la derecha tienen valor, los de la izquierda tienen más valor. Individuos e interacciones El desarrollo ágil está muy centrado en las personas. Los equipos de personas construyen software, y es a través de la comunicación e interacción continuas, en lugar de depender de herramientas o procesos, que los equipos pueden trabajar con mayor eficacia. Software funcionando Desde el punto de vista del cliente, software funcionando es mucho más útil y valioso que documentación excesivamente detallada y ofrece la oportunidad de proporcionar al equipo de desarrollo una retroalimentación rápida. Además, dado que el software funcionando, aunque con una funcionalidad reducida, está disponible mucho antes en el ciclo de vida de desarrollo, el desarrollo ágil puede conferir una importante ventaja en el tiempo de comercialización. Por lo tanto, el desarrollo ágil es especialmente útil en entornos de negocio que cambian rápidamente, en los que los problemas y/o las soluciones no están claros o en los que el área de negocio desea innovar en nuevos dominios de problemas. Colaboración con el cliente Los clientes suelen tener grandes dificultades para especificar el sistema que necesitan. Colaborar directamente con el cliente mejora la posibilidad de comprender exactamente lo que éste requiere.`,
};

// ── AI CALL ─────────────────────────────────────────────────────
async function callAI(prompt, maxTok=1300) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-calls':'true'},
    body: JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:maxTok,messages:[{role:'user',content:prompt}]})
  });
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d = await r.json();
  return d.content?.map(b=>b.text||'').join('')||'';
}

function spin(msg='') { return `<div class="loading"><div class="spin"></div>${msg}</div>`; }

  const u = UNITS[curU];

}

// ── PDF LOADER ────────────────────────────────────────────────────
function openPdfModal() { $('pdfModal').classList.add('open'); }
function closePdfModal() { $('pdfModal').classList.remove('open'); }

function handleDrop(e) {
  e.preventDefault();
  $('dropZone').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if(f && f.type==='application/pdf') loadPDF(f);
}

async function loadPDF(file) {
  if(!file) return;
  const status = $('pdfStatus');
  const progress = $('pdfProgress');
  const fill = $('pdfFill');
  status.textContent = 'Leyendo PDF...';
  progress.classList.add('show');
  fill.style.width = '5%';

  try {
    // Check if PDF.js loaded
    if(typeof pdfjsLib === 'undefined') {
      status.textContent = 'Cargando librería PDF...';
      await new Promise(r => setTimeout(r, 1500));
    }
    if(typeof pdfjsLib === 'undefined') throw new Error('PDF.js no disponible');

    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const arrayBuffer = await file.arrayBuffer();
    fill.style.width = '15%';
    status.textContent = 'Procesando páginas...';

    const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
    const totalPages = pdf.numPages;
    fill.style.width = '20%';

    // Extract all text
    let fullText = '';
    for(let i = 1; i <= totalPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const pageText = content.items.map(it => it.str).join(' ');
      fullText += pageText + ' ';
      fill.style.width = (20 + (i/totalPages)*60) + '%';
      status.textContent = `Leyendo página ${i} de ${totalPages}...`;
    }

    fill.style.width = '85%';
    status.textContent = 'Detectando unidades...';

    // Detect unit boundaries
    const unitPatterns = [
      /UNIDAD\s+N[°o]?\s*1[:\s]/i,
      /UNIDAD\s+N[°o]?\s*2[:\s]/i,
      /UNIDAD\s+N[°o]?\s*3[:\s]/i,
      /UNIDAD\s+N[°o]?\s*4[:\s]/i,
      /UNIDAD\s+N[°o]?\s*5[:\s]/i,
      /UNIDAD\s+N[°o]?\s*6[:\s]/i,
      /UNIDAD\s+N[°o]?\s*7[:\s]/i,
      /UNIDAD\s+N[°o]?\s*8[:\s]/i,
      /UNIDAD\s+N[°o]?\s*9[:\s]/i,
      /UNIDAD\s+N[°o]?\s*10[:\s]/i,
    ];

    const positions = unitPatterns.map(pat => {
      const match = fullText.search(pat);
      // Find second occurrence (skip TOC)
      if(match === -1) return -1;
      const second = fullText.indexOf(fullText.substring(match, match+20), match+100);
      return second > -1 ? second : match;
    });

    // Build unit content from positions
    let unitsFound = 0;
    for(let i = 0; i < 10; i++) {
      const start = positions[i];
      if(start === -1) continue;
      const end = positions.slice(i+1).find(p => p > start) || fullText.length;
      let content = fullText.substring(start, end);
      content = content.replace(/\s+/g, ' ').trim();
      if(content.length > 500) {
        UNIT_CONTENT[i+1] = content.substring(0, 10000);
        unitsFound++;
      }
    }

    fill.style.width = '100%';

    if(unitsFound >= 5) {
      status.textContent = `✓ ${unitsFound} unidades detectadas. Contenido actualizado.`;
      pdfLoaded = true;
      $('pdfBadge').classList.add('show');
      $('pdfUploadBtn').classList.add('loaded');
      $('pdfUploadBtn').innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> PDF cargado`;
      setTimeout(() => { closePdfModal(); renderPanel(); }, 1500);
    } else {
      status.textContent = `Solo se detectaron ${unitsFound} unidades. Se usará el contenido predefinido para las demás.`;
      setTimeout(() => closePdfModal(), 3000);
    }
  } catch(e) {
    fill.style.width = '100%';
    fill.style.background = '#e74c3c';
    status.textContent = 'Error al procesar el PDF: ' + e.message;
    console.error(e);
  }
}
