e usan para automatizar pruebas en mobile?","a":"Appium (multiplataforma iOS y Android), Espresso (Android nativo de Google), XCTest (iOS nativo de Apple), Detox (React Native)."},{"q":"¿Cuáles son los factores de diversidad en mobile testing?","a":"Plataformas de distribución (App Store, Google Play), OS y versiones, dispositivos y marcas, prestaciones y sensores, redes (2G/3G/4G/5G), localización geográfica."},{"q":"¿Qué es el testing de interrupción en mobile?","a":"Prueba que verifica el comportamiento de la app ante interrupciones: llamadas entrantes, notificaciones push, cambio de red, batería baja, cambio de orientación del dispositivo."},{"q":"¿Qué es la responsividad en aplicaciones web?","a":"Capacidad de adaptarse a diferentes tamaños de pantalla y dispositivos. Se logra con CSS Media Queries, diseño fluido, breakpoints y la meta etiqueta viewport."},{"q":"¿Cuáles son las ventajas de las apps nativas?","a":"Mejor rendimiento, acceso completo a hardware del dispositivo (cámara, GPS, biometría), mejor experiencia de usuario, funcionamiento offline."},{"q":"¿Cuál es la diferencia principal entre iOS y Android desde el punto de vista del testing?","a":"iOS: menos fragmentación de versiones, ciclo de aprobación más largo en App Store, mayor seguridad. Android: más dispositivos y marcas, mayor fragmentación de versiones, mayor cuota de mercado."},{"q":"¿Qué es el Compliance testing en mobile?","a":"Verificación de que la app cumple con las políticas de las tiendas (App Store/Google Play), estándares de accesibilidad (WCAG) y regulaciones de privacidad (GDPR)."},{"q":"¿Qué son los breakpoints en diseño responsivo?","a":"Puntos de quiebre en los que el diseño cambia para adaptarse a diferentes tamaños de pantalla. Definidos con CSS Media Queries. Ejemplos: 768px para tablet, 1024px para desktop."}],"quiz":[{"q":"Una app de videojuegos móvil funciona perfectamente en iOS 17 pero falla en iOS 14. ¿Qué tipo de problema es?","opts":["Problema de rendimiento","Problema de compatibilidad (fragmentación de versiones)","Problema de usabilidad","Problema de seguridad"],"correct":1,"explain":"Este es un problema de COMPATIBILIDAD, específicamente de fragmentación de versiones de SO. El app no se comporta igual en distintas versiones del mismo SO. Es uno de los principales desafíos del mobile testing."},{"q":"¿Cuál es la principal DESVENTAJA de las apps nativas?","opts":["Menor rendimiento","Mayor costo de desarrollo (hay que desarrollar por separado para iOS y Android)","No pueden acceder al hardware del dispositivo","Son más difíciles de usar"],"correct":1,"explain":"Las apps nativas requieren desarrollo separado para iOS (Swift/Objective-C) y Android (Java/Kotlin), duplicando el costo y esfuerzo de desarrollo y mantenimiento."},{"q":"Al probar que una app de juego continúa correctamente después de recibir una llamada, ¿qué tipo de prueba se realiza?","opts":["Prueba de rendimiento","Prueba de compatibilidad","Prueba de interrupción","Prueba de seguridad"],"correct":2,"explain":"La prueba de interrupción verifica el comportamiento ante eventos que interrumpen la app: llamadas, notificaciones, batería baja, cambio de orientación. Crítica en mobile testing."},{"q":"¿Cuál de los siguientes afecta ÚNICAMENTE a Android y no a iOS desde el punto de vista del testing?","opts":["La aprobación de la App Store","La fragmentación de marcas y versiones de hardware","La menor cuota de mercado","Las políticas de privacidad"],"correct":1,"explain":"La fragmentación de hardware es principalmente un problema de Android: hay cientos de marcas y modelos con diferentes pantallas, procesadores y versiones de Android personalizado. iOS solo existe en dispositivos Apple."},{"q":"¿Qué es una Progressive Web App (PWA)?","opts":["Una app nativa mejorada","Una aplicación web que puede funcionar como app móvil, instalarse y funcionar offline","Una app solo para iOS","Una app de videojuegos multijugador"],"correct":1,"explain":"Una PWA es una aplicación web que usa tecnologías modernas para comportarse como app nativa: puede instalarse en el dispositivo, funcionar offline, recibir notificaciones push, todo sin pasar por las tiendas de apps."}],"comparisons":[{"a":"App nativa","b":"App híbrida","texto":"App nativa:\n- Desarrollada específicamente para UN SO (iOS o Android)\n- iOS: Swift / Objective-C | Android: Java / Kotlin\n- Mejor rendimiento y acceso al hardware\n- Mayor costo (desarrollar dos veces)\n- Mejor experiencia de usuario\n\nApp híbrida:\n- Combina tecnología web con wrapper nativo\n- Frameworks: React Native, Flutter, Ionic\n- Un solo código para ambas plataformas\n- Rendimiento intermedio\n- Menor costo de desarrollo\n- Acceso limitado a algunas funciones nativas"},{"a":"iOS testing","b":"Android testing","texto":"iOS testing:\n- Menos fragmentación (pocos dispositivos Apple)\n- Ciclo de aprobación largo en App Store\n- Mayor seguridad y privacidad\n- XCTest para automatización\n- Requiere Mac para desarrollar\n\nAndroid testing:\n- Alta fragmentación (miles de dispositivos, marcas, versiones)\n- Google Play menos restrictivo, aprobación más rápida\n- Mayor cuota de mercado (más usuarios)\n- Espresso / Appium para automatización\n- Más escenarios de prueba por fragmentación"},{"a":"Prueba manual mobile","b":"Prueba automatizada mobile","texto":"Prueba manual:\n- Tester usa físicamente el dispositivo\n- Ideal para: usabilidad, game feel, exploratoria, interrupción\n- Detecta problemas visuales y de experiencia\n- Lenta y costosa para regresión\n\nPrueba automatizada:\n- Scripts ejecutan acciones programáticamente\n- Herramientas: Appium, Espresso, XCTest\n- Ideal para: regresión, compatibilidad, pruebas repetitivas\n- Rápida y consistente\n- No detecta problemas de UX/experiencia visual"}],"resumen":{"completo":"CONCEPTO:\nEvaluación sistemática de funcionalidad, usabilidad y rendimiento de apps móviles en múltiples dispositivos, SO y condiciones.\n\nTIPOS DE APPS:\n- Nativas: SO específico, mejor rendimiento, mayor costo\n- Web/PWA: navegador, multiplataforma, sin instalación\n- Híbridas: React Native/Flutter, balance costo-rendimiento\n\nFACTORES DE DIVERSIDAD:\n- Plataformas: App Store (iOS), Google Play (Android)\n- OS y versiones: fragmentación especialmente en Android\n- Dispositivos: básico, gama alta, tablet, wearables\n- Sensores: GPS, NFC, acelerómetro, biometría\n- Redes: 2G/3G/4G/5G, WiFi, Bluetooth\n\nPRUEBAS ESPECÍFICAS DE MOBILE:\n- Funcionales, usabilidad, compatibilidad\n- Interrupción (llamadas, notificaciones)\n- Batería, instalación/desinstalación\n\nAUTOMATIZACIÓN:\n- Appium: multiplataforma\n- Espresso: Android nativo\n- XCTest: iOS nativo\n\nRESPONSIVIDAD:\nCSS Media Queries, breakpoints, diseño fluido, viewport\n\nCOMPLIANCE:\nPolíticas de tiendas, WCAG (accesibilidad), GDPR (privacidad)","rapido":"- 3 tipos de apps: nativa (mejor rendimiento), web/PWA (multiplataforma), híbrida (balance)\n- iOS: menos fragmentación, más segura | Android: más dispositivos, fragmentada\n- Pruebas mobile: funcional, usabilidad, interrupción, batería, compatibilidad\n- Automatización: Appium (multi), Espresso (Android), XCTest (iOS)\n- Responsividad: Media Queries, breakpoints, diseño fluido","examen":"TEMAS MÁS PROBABLES:\n1. Diferencia app nativa vs web vs híbrida\n2. Diferencia iOS vs Android desde perspectiva de testing\n3. ¿Qué es el testing de interrupción?\n4. Herramientas de automatización mobile\n5. ¿Qué es responsividad y cómo se implementa?\n\nTRAMPAS FRECUENTES:\n- 'Las apps híbridas tienen el mismo rendimiento que las nativas' → FALSO\n- 'iOS tiene más fragmentación que Android' → FALSO, es al revés\n- 'Appium solo funciona para Android' → FALSO, es multiplataforma\n- 'La responsividad solo aplica a apps web' → Principalmente sí, pero el concepto se extiende\n\nRECORDAR: Flutter y React Native son frameworks para apps HÍBRIDAS.","esquema":"Unidad 9: Mobile Testing\n  ├── Tipos de Apps\n  │     ├── Nativa (iOS: Swift/ObjC, Android: Java/Kotlin)\n  │     ├── Web / PWA\n  │     └── Híbrida (React Native, Flutter)\n  ├── Factores de Diversidad\n  │     ├── OS y versiones\n  │     ├── Dispositivos y marcas\n  │     └── Redes y sensores\n  ├── iOS vs Android\n  ├── Pruebas Mobile\n  │     ├── Manual (usabilidad, interrupción)\n  │     └── Automatizada (Appium, Espresso, XCTest)\n  ├── Responsividad\n  │     └── Media Queries, breakpoints\n  └── Compliance\n        └── Políticas tiendas, WCAG, GDPR"}},"10":{"title":"Testing Ágil y Tradicional","topics":"Waterfall · Manifiesto Ágil · Scrum · Kanban · Pirámide","flashcards":[{"q":"¿Cuáles son las fases del modelo Waterfall?","a":"Requisitos → Diseño del sistema → Implementación/Codificación → Pruebas → Mantenimiento. Cada fase debe completarse antes de comenzar la siguiente."},{"q":"¿Cuáles son los 4 valores del Manifiesto Ágil?","a":"1) Individuos e interacciones sobre procesos y herramientas. 2) Software funcionando sobre documentación. 3) Colaboración con el cliente sobre negociación contractual. 4) Respuesta al cambio sobre seguir un plan."},{"q":"¿Qué es un Sprint en Scrum?","a":"Iteración de tiempo fijo (generalmente 2-4 semanas) en la que el equipo desarrolla y entrega un incremento del producto. Incluye: Planning, Daily standup, Review y Retrospectiva."},{"q":"¿Cuáles son los 3 roles en Scrum?","a":"Product Owner (define qué construir, prioriza el backlog), Scrum Master (facilita el proceso, elimina impedimentos), Development Team (diseña, desarrolla y prueba)."},{"q":"¿Qué es el tablero Kanban?","a":"Herramienta visual que muestra el flujo de trabajo con columnas (To Do, In Progress, Done). Limita el trabajo en progreso (WIP limits) para optimizar el flujo."},{"q":"¿Cuáles son los 4 cuadrantes del Agile Testing?","a":"Q1: tecnología/apoyo equipo (unitarias automatizadas). Q2: negocio/apoyo equipo (funcionales, historias de usuario). Q3: negocio/crítica del producto (exploratorias, usabilidad). Q4: tecnología/crítica del producto (rendimiento, seguridad)."},{"q":"¿Qué describe la Pirámide del Testing?","a":"Modelo que muestra la proporción ideal de pruebas: base grande (unitarias: muchas, rápidas, baratas), medio (integración), cima pequeña (E2E/UI: pocas, lentas, costosas)."},{"q":"¿Cuál es la diferencia principal entre Scrum y Kanban?","a":"Scrum: trabaja en sprints de duración fija, tiene roles definidos, backlog priorizado. Kanban: flujo continuo sin iteraciones fijas, limita WIP, más flexible."},{"q":"¿Qué es el rol del tester en un equipo ágil?","a":"Multifacético y colaborativo: participa desde el inicio, domina automatización, TDD y técnicas de caja negra/blanca, tiene buenas habilidades interpersonales y mentalidad de prevención."},{"q":"¿Qué significa 'Shift-Left Testing' en metodologías ágiles?","a":"Comenzar las actividades de prueba lo antes posible en el ciclo de vida, desde el análisis de requisitos. En ágil, el tester participa desde el primer día del sprint."}],"quiz":[{"q":"¿Cuál es la principal DESVENTAJA del modelo Waterfall para testing?","opts":["Es demasiado rápido","Los defectos se detectan tarde (al final del ciclo), aumentando el costo de corrección","No tiene documentación","No permite hacer pruebas de rendimiento"],"correct":1,"explain":"En Waterfall, las pruebas ocurren al FINAL del ciclo. Los defectos detectados allí son muy costosos de corregir porque requieren cambios en fases que ya finalizaron. Esto contrasta con el principio de 'pruebas tempranas'."},{"q":"¿Cuál de los 4 valores del Manifiesto Ágil corresponde correctamente?","opts":["Procesos y herramientas sobre individuos e interacciones","Documentación exhaustiva sobre software funcionando","Colaboración con el cliente sobre negociación contractual","Seguir un plan sobre respuesta al cambio"],"correct":2,"explain":"El tercer valor del Manifiesto Ágil es: 'Colaboración con el cliente sobre negociación contractual'. Los otros valores están invertidos: se valoran los individuos, el software funcionando y la respuesta al cambio."},{"q":"En la Pirámide del Testing ágil, ¿qué tipo de pruebas forma la BASE (la más grande)?","opts":["Pruebas de interfaz de usuario (E2E)","Pruebas de integración","Pruebas unitarias","Pruebas de aceptación"],"correct":2,"explain":"La base de la pirámide son las pruebas UNITARIAS: deben ser muchas, rápidas y baratas. El cima son las pruebas E2E/UI: pocas, lentas y costosas. Esta proporción reduce el costo total de testing."},{"q":"¿Qué diferencia a Kanban de Scrum?","opts":["Kanban usa sprints de duración fija","Kanban no tiene roles definidos como PO o SM y trabaja en flujo continuo","Kanban es para proyectos grandes únicamente","Kanban siempre es más lento que Scrum"],"correct":1,"explain":"Kanban trabaja con flujo continuo (sin sprints), limita el WIP (trabajo en progreso) y no tiene roles formales como Product Owner o Scrum Master. Scrum tiene iteraciones fijas y roles bien definidos."},{"q":"¿En qué cuadrante del Agile Testing se ubican las pruebas de RENDIMIENTO y SEGURIDAD?","opts":["Q1 (tecnología, apoyo al equipo)","Q2 (negocio, apoyo al equipo)","Q3 (negocio, crítica del producto)","Q4 (tecnología, crítica del producto)"],"correct":3,"explain":"Q4 contiene pruebas de naturaleza técnica que critican el producto: rendimiento, carga, estrés, seguridad, mantenibilidad. Son orientadas a la tecnología y suelen automatizarse."}],"comparisons":[{"a":"Waterfall","b":"Ágil","texto":"Waterfall (Cascada):\n- Fases secuenciales y fijas\n- Requisitos definidos al inicio (fijos)\n- Pruebas al final del ciclo\n- Documentación exhaustiva\n- Cambios muy costosos\n- Bueno para: proyectos con requisitos muy claros y estables\n\nMetodología Ágil:\n- Iteraciones cortas (sprints)\n- Requisitos evolucionan (flexible)\n- Pruebas continuas en cada iteración\n- Documentación justa y necesaria\n- Abraza el cambio\n- Bueno para: proyectos con requisitos cambiantes o inciertos"},{"a":"Scrum","b":"Kanban","texto":"Scrum:\n- Iteraciones (sprints) de 2-4 semanas\n- Roles definidos: PO, SM, Dev Team\n- Sprint backlog priorizado\n- Ceremonias: Planning, Daily, Review, Retro\n- Velocidad medida en story points\n\nKanban:\n- Flujo continuo, sin sprints fijos\n- Sin roles obligatorios\n- Trabajo limitado por WIP limits\n- Tablero: To Do → In Progress → Done\n- Métrica: tiempo de ciclo (cycle time)\n- Más flexible y liviano"},{"a":"Testing en cascada","b":"Agile testing","texto":"Testing en cascada:\n- Ocurre en una fase específica AL FINAL\n- Basado en planes y scripts completos previos\n- Documentación extensa antes de ejecutar\n- Feedback tarde en el proyecto\n- Testers separados del equipo de desarrollo\n\nAgile testing:\n- CONTINUO a lo largo de todo el proyecto\n- Testing desde el primer sprint\n- Tester integrado al equipo de desarrollo\n- Feedback inmediato\n- Automatización indispensable\n- TDD: primero el test, luego el código"}],"resumen":{"completo":"WATERFALL (Cascada):\n- Fases secuenciales: Requisitos→Diseño→Implementación→Pruebas→Mantenimiento\n- Requisitos fijos, tiempo y costo variables\n- Ventajas: documentación clara, fácil de gestionar\n- Desventajas: inflexible, pruebas al final, feedback tardío\n\nMANIFIESTO ÁGIL (2001):\n4 valores: individuos sobre procesos, software funcionando sobre documentación, colaboración con cliente sobre negociación, respuesta al cambio sobre seguir el plan.\n\nSCRUM:\n- Sprints de 2-4 semanas\n- Roles: Product Owner, Scrum Master, Dev Team\n- Ceremonias: Sprint Planning, Daily Standup, Sprint Review, Retrospectiva\n\nKANBAN:\n- Flujo continuo, tablero To Do / In Progress / Done\n- WIP limits para optimizar flujo\n\nAGILE TESTING:\n- Pirámide: base=unitarias (muchas), medio=integración, cima=E2E (pocas)\n- 4 Cuadrantes: Q1 y Q2 apoyan al equipo, Q3 y Q4 critican el producto\n- Tester ágil: multifacético, automatización, TDD, habilidades interpersonales\n\nPRINCIPIOS TESTER ÁGIL:\n- Calidad = responsabilidad de todo el equipo\n- Probar continuamente, no solo al final\n- Prevención de defectos antes que detección","rapido":"- Waterfall: secuencial, pruebas al final, bueno para requisitos fijos\n- Ágil: 4 valores (individuos, software funcionando, cliente, cambio)\n- Scrum: sprints, PO/SM/Dev Team, Planning/Daily/Review/Retro\n- Kanban: flujo continuo, WIP limits, To Do/In Progress/Done\n- Pirámide: muchas unitarias → pocas E2E\n- 4 Cuadrantes: Q1-Q2 apoyan, Q3-Q4 critican","examen":"TEMAS MÁS PROBABLES:\n1. Los 4 valores del Manifiesto Ágil (saber enunciarlos)\n2. Diferencia Scrum vs Kanban\n3. La pirámide del testing ágil\n4. Ventajas y desventajas del modelo Waterfall\n5. Los 4 cuadrantes del Agile Testing\n\nTRAMPAS FRECUENTES:\n- 'En ágil no hay documentación' → FALSO, hay documentación justa y necesaria\n- 'Scrum y Kanban son lo mismo' → FALSO\n- 'En la pirámide, las pruebas E2E son la base' → FALSO, son la cima (pocas)\n- 'El Manifiesto Ágil tiene 4 principios' → FALSO, tiene 4 VALORES y 12 PRINCIPIOS\n\nRECORDAR:\nQ4 = rendimiento y seguridad (tecnología, crítica del producto)\nQ3 = exploratorias y usabilidad (negocio, crítica del producto)","esquema":"Unidad 10: Testing Ágil y Tradicional\n  ├── Waterfall\n  │     ├── Fases secuenciales\n  │     └── Ventajas y desventajas\n  ├── Manifiesto Ágil (4 valores)\n  ├── Scrum\n  │     ├── Sprints (2-4 semanas)\n  │     ├── Roles: PO / SM / Dev Team\n  │     └── Ceremonias: Planning/Daily/Review/Retro\n  ├── Kanban\n  │     ├── Flujo continuo\n  │     └── WIP limits\n  ├── Agile Testing\n  │     ├── Pirámide (unitarias→integración→E2E)\n  │     └── 4 Cuadrantes (Q1-Q4)\n  └── Rol del Tester Ágil\n        ├── Multifacético y colaborativo\n        └── Automatización + TDD"}}};

function cu(){return UU[cU];}
function mk(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
function btn(cls,label,fn){var b=mk('button',cls,label);b.addEventListener('click',fn);return b;}

function renderUbar(){
  var bar=g('ubar');bar.innerHTML='';
  UU.forEach(function(u,i){
    var b=mk('button','utab'+(i===cU?' active':''),'U'+u.num+' '+u.title);
    b.dataset.i=i;
    b.addEventListener('click',function(){selU(parseInt(this.dataset.i));});
    bar.appendChild(b);
  });
  setTimeout(function(){var a=g('ubar').querySelector('.active');if(a)a.scrollIntoView({inline:'center',block:'nearest'});},50);
}

function renderUhdr(){
  var d=cu(),h=g('uhdr');h.innerHTML='';
  var L=mk('div');
  L.innerHTML='<div class="uhdr-n">UNIDAD '+d.num+' DE '+UU.length+'</div><div class="uhdr-t">'+d.title+'</div><div class="uhdr-tp">'+d.topics+'</div>';
  var nav=mk('div','unav');
  var bp=btn('','← Anterior',function(){selU(cU-1);});if(cU===0)bp.disabled=true;
  var bn=btn('','Siguiente →',function(){selU(cU+1);});if(cU===UU.length-1)bn.disabled=true;
  nav.appendChild(bp);nav.appendChild(bn);
  h.appendChild(L);h.appendChild(nav);
}

function renderTabs(){
  var modes=['preguntar','resumen','flashcards','quiz','comparar','mapa'];
  var labels=['💬 Preguntar','📄 Resumen','🃏 Flashcards','🏆 Quiz','⚖️ Comparar','🗺 Mapa'];
  var tb=g('tabs');tb.innerHTML='';
  modes.forEach(function(m,i){
    var b=mk('button','tab'+(m===cM?' active':''),labels[i]);
    b.dataset.m=m;
    b.addEventListener('click',function(){setMode(this.dataset.m);});
    tb.appendChild(b);
  });
}

function selU(i){
  if(i<0||i>=UU.length)return;
  cU=i;fcI=0;fcF=false;fcL=[];qD=null;qDn=false;qP=[];qPI=0;
  renderUbar();renderUhdr();renderPanel();
}
function setMode(m){cM=m;renderTabs();renderPanel();}

function scoreRow(p){
  var row=mk('div','sc-row');
  [[qSc,'correctas'],[qTo,'respondidas'],[qTo>0?Math.round(qSc/qTo*100)+'%':'—','acierto']].forEach(function(x){
    var sc=mk('div','sc');
    sc.innerHTML='<div class="sv">'+x[0]+'</div><div class="sl">'+x[1]+'</div>';
    row.appendChild(sc);
  });
  p.appendChild(row);
}

function renderPanel(){
  var p=g('panel');p.innerHTML='';
  var d=cu();

  if(cM==='preguntar'){
    p.appendChild(mk('div','ptitle','💬 Preguntar — '+d.title));
    var row=mk('div','ask-row');
    var inp=mk('input');inp.type='text';inp.id='qi';inp.placeholder='Escribí tu pregunta...';
    inp.addEventListener('keydown',function(e){if(e.key==='Enter')doAsk();});
    row.appendChild(inp);row.appendChild(btn('btn','Buscar',doAsk));
    p.appendChild(row);
    var qbts=mk('div','qbts');
    ['¿Conceptos principales?','¿Qué entra en el examen?','Dame un ejemplo','¿Diferencias importantes?','Resumen rápido'].forEach(function(q){
      var b=mk('button','qbt',q);
      b.addEventListener('click',function(){inp.value=this.textContent;doAsk();});
      qbts.appendChild(b);
    });
    p.appendChild(qbts);
    var ans=mk('div');ans.id='ans';ans.appendChild(mk('div','ph','Escribí una pregunta o elegí una sugerencia'));
    p.appendChild(ans);

  }else if(cM==='resumen'){
    p.appendChild(mk('div','ptitle','📄 Resumen — '+d.title));
    var brow=mk('div','brow');
    [['completo','Resumen completo','btn'],['rapido','⚡ Rápido','btn-s'],['examen','🎯 Para el examen','btn-s'],['esquema','🗂 Esquema','btn-s']].forEach(function(x){
      var b=mk('button',x[2],x[1]);b.dataset.t=x[0];
      b.addEventListener('click',function(){showR(this.dataset.t);});
      brow.appendChild(b);
    });
    p.appendChild(brow);
    var ans=mk('div');ans.id='ans';ans.appendChild(mk('div','ph','Elegí el tipo de resumen'));
    p.appendChild(ans);

  }else if(cM==='flashcards'){
    if(fcL.length>0){renderFC();return;}
    p.appendChild(mk('div','ptitle','🃏 Flashcards — '+d.title));
    var brow=mk('div','brow');
    var tot=D[cu().num].flashcards.length;
    [['all','Todas ('+tot+')','btn'],['shuffle','🔀 Aleatorizadas','btn-s'],['half','5 al azar','btn-s']].forEach(function(x){
      var b=mk('button',x[2],x[1]);b.dataset.m=x[0];
      b.addEventListener('click',function(){startFC(this.dataset.m);});
      brow.appendChild(b);
    });
    p.appendChild(brow);
    p.appendChild(mk('div','ph','Elegí el modo de estudio'));

  }else if(cM==='quiz'){
    if(qD){renderQuiz();return;}
    p.appendChild(mk('div','ptitle','🏆 Quiz — '+d.title));
    scoreRow(p);
    var brow=mk('div','brow');
    brow.appendChild(btn('btn','Nueva pregunta',nextQ));
    brow.appendChild(btn('btn-s','↺ Reiniciar puntaje',function(){qSc=0;qTo=0;qP=[];qPI=0;renderPanel();}));
    p.appendChild(brow);

  }else if(cM==='comparar'){
    p.appendChild(mk('div','ptitle','⚖️ Comparar — '+d.title));
    var cmps=D[cu().num].comparisons||[];
    var note=mk('p','','Comparaciones de esta unidad:');note.style.cssText='font-size:13px;color:#888;margin-bottom:.75rem;';p.appendChild(note);
    var qbts=mk('div','qbts');qbts.style.marginBottom='1.25rem';
    cmps.forEach(function(c,i){
      var b=mk('button','qbt',c.a+' vs '+c.b);b.dataset.i=i;
      b.addEventListener('click',function(){showCmp(parseInt(this.dataset.i));});
      qbts.appendChild(b);
    });
    p.appendChild(qbts);
    var row=mk('div','ask-row');
    var ia=mk('input');ia.type='text';ia.id='cmpA';ia.placeholder='Concepto A';
    var ib=mk('input');ib.type='text';ib.id='cmpB';ib.placeholder='Concepto B';
    row.appendChild(ia);row.appendChild(ib);row.appendChild(btn('btn','Comparar',searchCmp));
    p.appendChild(row);
    var ans=mk('div');ans.id='ans';ans.appendChild(mk('div','ph','Elegí una comparación'));p.appendChild(ans);

  }else if(cM==='mapa'){
    p.appendChild(mk('div','ptitle','🗺 Mapa de la materia'));
    var grid=mk('div','map-grid');
    UU.forEach(function(u,i){
      var c=mk('div','mc');
      c.innerHTML='<div class="mc-n">Unidad '+u.num+'</div><div class="mc-t">'+u.title+'</div><div class="mc-tp">'+u.topics+'</div>';
      c.dataset.i=i;
      c.addEventListener('click',function(){selU(parseInt(this.dataset.i));setMode('preguntar');});
      grid.appendChild(c);
    });
    p.appendChild(grid);
    p.appendChild(mk('hr'));
    var note=mk('p','','Hacé clic en cualquier unidad para estudiarla.');note.style.cssText='font-size:13px;color:#888;';p.appendChild(note);
  }
}

function search(query){
  var d=cu(),q=query.toLowerCase(),c=D[d.num];
  var words=q.split(' ').filter(function(w){return w.length>3;});
  var matches=function(s){return s.toLowerCase().indexOf(q)>=0||words.some(function(w){return s.toLowerCase().indexOf(w)>=0;});};
  var fc=c.flashcards.find(function(f){return matches(f.q);});
  if(fc)return '📌 '+fc.q+'\n\n'+fc.a;
  var cmp=c.comparisons&&c.comparisons.find(function(x){return matches(x.a)||matches(x.b);});
  if(cmp)return '⚖️ '+cmp.a+' vs '+cmp.b+'\n\n'+cmp.texto;
  var lines=c.resumen.completo.split('\n').filter(function(l){return matches(l);});
  if(lines.length)return '📄 Del resumen:\n\n'+lines.slice(0,8).join('\n');
  return '📖 No encontré "'+query+'" exactamente.\n\nResumen rápido:\n\n'+c.resumen.rapido;
}

function setAns(txt){
  var ans=g('ans');if(!ans)return;
  ans.innerHTML='';
  var d=mk('div','answer');d.textContent=txt;ans.appendChild(d);
}

function doAsk(){var q=(g('qi')||{value:''}).value.trim();if(q)setAns(search(q));}
function showR(tipo){setAns(D[cu().num].resumen[tipo]);}

function startFC(mode){
  var cards=D[cu().num].flashcards.slice();
  if(mode!=='all')cards.sort(function(){return Math.random()-.5;});
  if(mode==='half')cards=cards.slice(0,5);
  fcL=cards;fcI=0;fcF=false;renderFC();
}

function renderFC(){
  var p=g('panel');p.innerHTML='';
  var d=cu(),c=fcL[fcI];
  p.appendChild(mk('div','ptitle','🃏 Flashcards — '+d.title));
  var wrap=mk('div','fc-wrap');
  wrap.appendChild(mk('div','fc-ctr',(fcI+1)+' de '+fcL.length));
  var prog=mk('div','fc-prog');
  fcL.forEach(function(_,i){prog.appendChild(mk('div','dot'+(i<fcI?' done':i===fcI?' cur':'')));});
  wrap.appendChild(prog);
  var card=mk('div','fc-card'+(fcF?' ans':''));
  card.appendChild(mk('p','',fcF?c.a:c.q));
  card.appendChild(mk('span','fc-hint',fcF?'↩ ver pregunta':'ver respuesta →'));
  card.addEventListener('click',function(){fcF=!fcF;renderFC();});
  wrap.appendChild(card);
  var nav=mk('div','fc-nav');
  var pr=btn('btn-s','← Anterior',function(){fcI=Math.max(0,fcI-1);fcF=false;renderFC();});if(fcI===0)pr.disabled=true;
  var nx=btn('btn-s','Siguiente →',function(){fcI=Math.min(fcL.length-1,fcI+1);fcF=false;renderFC();});if(fcI===fcL.length-1)nx.disabled=true;
  nav.appendChild(pr);nav.appendChild(nx);nav.appendChild(btn('btn','↻ Volver',function(){fcL=[];renderPanel();}));
  wrap.appendChild(nav);p.appendChild(wrap);
}

function nextQ(){
  var pool=D[cu().num].quiz;
  if(!qP.length||qPI>=qP.length){qP=pool.slice().sort(function(){return Math.random()-.5;});qPI=0;}
  qD=qP[qPI++];qDn=false;qSl=-1;renderQuiz();
}

function renderQuiz(){
  var p=g('panel');p.innerHTML='';
  var d=cu();
  p.appendChild(mk('div','ptitle','🏆 Quiz — '+d.title));
  scoreRow(p);
  p.appendChild(mk('div','quiz-q',qD.q));
  var opts=mk('div','qopts');
  qD.opts.forEach(function(o,i){
    var b=mk('button','qopt',String.fromCharCode(65+i)+'. '+o);
    if(qDn){if(i===qD.correct)b.classList.add('ok');else if(i===qSl)b.classList.add('no');}
    if(qDn)b.disabled=true;
    b.dataset.i=i;
    b.addEventListener('click',function(){ansQ(parseInt(this.dataset.i));});
    opts.appendChild(b);
  });
  p.appendChild(opts);
  if(qDn){
    p.appendChild(mk('div','qexp','💡 '+qD.explain));
    p.appendChild(btn('btn','Siguiente pregunta →',nextQ));
  }
}

function ansQ(i){
  if(qDn)return;qSl=i;qDn=true;qTo++;
  if(i===qD.correct)qSc++;
  renderQuiz();
}

function showCmp(i){
  var c=D[cu().num].comparisons[i];
  var ia=g('cmpA'),ib=g('cmpB');
  if(ia)ia.value=c.a;if(ib)ib.value=c.b;
  setAns(c.a+' vs '+c.b+'\n\n'+c.texto);
}

function searchCmp(){
  var a=(g('cmpA')||{value:''}).value.trim().toLowerCase();
  var b=(g('cmpB')||{value:''}).value.trim().toLowerCase();
  if(!a||!b)return;
  var cmps=D[cu().num].comparisons||[];
  var found=cmps.find(function(c){return c.a.toLowerCase().indexOf(a)>=0||c.b.toLowerCase().indexOf(b)>=0;});
  if(found){showCmp(cmps.indexOf(found));return;}
  setAns('No hay comparación predefinida para esos conceptos.\n\nDisponibles: '+cmps.map(function(c){return c.a+' vs '+c.b;}).join(', '));
}

renderUbar();renderUhdr();renderTabs();renderPanel();

</script>
</body>
</html>
