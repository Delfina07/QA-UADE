<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0ff;color:#1a1830;min-height:100vh;}
header{background:#fff;border-bottom:2px solid #c8c4f0;padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:30;}
.logo{font-size:15px;font-weight:700;color:#534AB7;}
.logo small{font-size:12px;font-weight:400;color:#888;margin-left:8px;}
.badge{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;}
.ubar{background:#fff;border-bottom:2px solid #c8c4f0;overflow-x:auto;white-space:nowrap;display:flex;align-items:center;gap:4px;height:44px;padding:0 1rem;position:sticky;top:52px;z-index:20;}
.utab{background:transparent;border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:500;color:#5c5880;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;}
.utab:hover{background:#eeecff;}
.utab.active{background:#534AB7;color:#fff;}
.main{max-width:840px;margin:0 auto;padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:1rem;}
.uhdr{background:#fff;border:1px solid #c8c4f0;border-radius:12px;padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.uhdr-n{font-size:11px;font-weight:700;color:#534AB7;margin-bottom:3px;}
.uhdr-t{font-size:17px;font-weight:700;color:#1a1830;}
.uhdr-tp{font-size:12px;color:#888;margin-top:4px;}
.unav{display:flex;gap:6px;}
.unav button{background:#f3f2fb;border:1px solid #c8c4f0;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;color:#5c5880;font-family:inherit;}
.unav button:hover:not([disabled]){border-color:#534AB7;color:#534AB7;}
.unav button[disabled]{opacity:.3;cursor:default;}
.tabs{display:flex;gap:6px;flex-wrap:wrap;}
.tab{background:#fff;border:1px solid #c8c4f0;border-radius:8px;padding:7px 15px;font-size:13px;color:#5c5880;cursor:pointer;font-family:inherit;}
.tab:hover{border-color:#534AB7;color:#534AB7;}
.tab.active{background:#534AB7;border-color:#534AB7;color:#fff;font-weight:500;}
.panel{background:#fff;border:1px solid #c8c4f0;border-radius:12px;padding:1.5rem;min-height:160px;}
.ptitle{font-size:13px;font-weight:600;color:#534AB7;margin-bottom:1rem;}
.brow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;}
.btn{background:#534AB7;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;}
.btn:hover{background:#3C3489;}
.btn-s{background:#fff;border:1px solid #c8c4f0;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;color:#1a1830;font-family:inherit;}
.btn-s:hover:not([disabled]){border-color:#534AB7;color:#534AB7;}
.btn-s[disabled]{opacity:.35;cursor:default;}
.qbts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.qbt{background:#f3f2fb;border:1px solid #c8c4f0;border-radius:999px;padding:5px 13px;font-size:12px;color:#5c5880;cursor:pointer;font-family:inherit;}
.qbt:hover{border-color:#534AB7;color:#534AB7;}
.ask-row{display:flex;gap:8px;margin-bottom:.875rem;}
.ask-row input{flex:1;font-size:14px;border:1px solid #c8c4f0;border-radius:8px;padding:9px 14px;background:#f3f2fb;color:#1a1830;outline:none;font-family:inherit;}
.ask-row input:focus{border-color:#534AB7;background:#fff;}
.ask-row input::placeholder{color:#aaa;}
.answer{font-size:14px;color:#1a1830;line-height:1.8;white-space:pre-wrap;}
.ph{color:#aaa;font-size:14px;text-align:center;padding:2rem 0;}
.fc-wrap{display:flex;flex-direction:column;align-items:center;}
.fc-ctr{font-size:12px;color:#888;margin-bottom:6px;}
.fc-prog{display:flex;gap:4px;margin-bottom:.75rem;flex-wrap:wrap;justify-content:center;}
.dot{width:8px;height:8px;border-radius:50%;background:#ddd;}
.dot.done{background:#534AB7;}
.dot.cur{background:#534AB7;box-shadow:0 0 0 2px #EEEDFE;}
.fc-card{width:100%;background:#f3f2fb;border:1.5px solid #c8c4f0;border-radius:12px;padding:2rem 1.5rem;min-height:120px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:1rem;position:relative;}
.fc-card:hover{border-color:#534AB7;}
.fc-card p{font-size:15px;color:#1a1830;line-height:1.6;text-align:center;}
.fc-hint{position:absolute;bottom:10px;right:14px;font-size:11px;color:#aaa;}
.fc-card.ans{background:#EEEDFE;border-color:#534AB7;}
.fc-nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;}
.sc-row{display:flex;gap:10px;margin-bottom:1.25rem;}
.sc{background:#f3f2fb;border-radius:8px;padding:10px 16px;text-align:center;flex:1;}
.sc .sv{font-size:22px;font-weight:700;color:#534AB7;}
.sc .sl{font-size:11px;color:#888;margin-top:2px;}
.quiz-q{font-size:15px;font-weight:600;color:#1a1830;margin-bottom:1.25rem;line-height:1.55;}
.qopts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;}
.qopt{background:#f3f2fb;border:1px solid #c8c4f0;border-radius:8px;padding:11px 16px;font-size:14px;cursor:pointer;text-align:left;color:#1a1830;font-family:inherit;width:100%;}
.qopt:hover:not([disabled]){border-color:#534AB7;}
.qopt.ok{background:#e8f5e9;border-color:#2e7d32;color:#1b5e20;}
.qopt.no{background:#ffebee;border-color:#c62828;color:#b71c1c;}
.qopt[disabled]{cursor:default;}
.qexp{font-size:13px;color:#444;line-height:1.65;padding:12px 14px;background:#f3f2fb;border-radius:8px;margin-bottom:1rem;border-left:3px solid #534AB7;}
.map-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;}
.mc{background:#f3f2fb;border:1px solid #c8c4f0;border-radius:8px;padding:14px;cursor:pointer;}
.mc:hover{border-color:#534AB7;background:#EEEDFE;}
.mc-n{font-size:10px;font-weight:700;color:#534AB7;margin-bottom:4px;}
.mc-t{font-size:13px;font-weight:600;color:#1a1830;margin-bottom:6px;}
.mc-tp{font-size:11px;color:#888;line-height:1.5;}
hr{border:none;border-top:1px solid #e0e0f0;margin:1.25rem 0;}
@media(max-width:600px){.main{padding:1rem;}.uhdr{flex-direction:column;align-items:flex-start;}}
</style>
</head>

<script>
var DATA={"1":{"title":"Introducción a la Calidad","topics":"ISTQB · Testing · QA vs QC · 7 Principios · Rol del tester","flashcards":[{"q":"¿Qué significa ISTQB?","a":"International Software Testing Qualifications Board. Organización internacional basada en trabajo voluntario de expertos en pruebas de software, con sede en Edimburgo."},{"q":"¿Qué es el software testing?","a":"Verificación dinámica del comportamiento de un programa sobre un conjunto finito de casos de prueba, seleccionados para comparar con el comportamiento esperado."},{"q":"¿Cuál es la diferencia entre QA y QC?","a":"QA (Quality Assurance) es proactivo: previene defectos mejorando procesos. QC (Quality Control) es reactivo: identifica defectos en productos ya desarrollados."},{"q":"¿Qué es un Error en testing?","a":"Acción humana que produce un resultado incorrecto. Lo comete el desarrollador, analista u otra persona del equipo."},{"q":"¿Qué es un Defecto o Bug?","a":"Imperfección en el producto resultante de un error humano. Es el error materializado en el código, diseño o documentación."},{"q":"¿Qué es una Falla?","a":"Evento en tiempo de ejecución donde el sistema no realiza la función requerida. Es lo que experimenta el usuario final."},{"q":"Enumerá los 7 principios del testing","a":"1) Testing muestra presencia de defectos, no su ausencia. 2) Testing exhaustivo es imposible. 3) Pruebas tempranas ahorran dinero. 4) Agrupación de defectos. 5) Paradoja del pesticida. 6) Dependiente del contexto. 7) Falacia de la ausencia de errores."},{"q":"¿Qué es la paradoja del pesticida?","a":"Si siempre se ejecutan los mismos casos de prueba, eventualmente dejarán de encontrar nuevos defectos. Es necesario revisar y actualizar los casos de prueba regularmente."},{"q":"¿Qué es la agrupación de defectos?","a":"Un pequeño número de módulos contiene la mayoría de los defectos detectados. Los defectos tienden a concentrarse en ciertas áreas del sistema."},{"q":"¿Cuáles son las responsabilidades de un tester?","a":"Planificar y estimar actividades de prueba, diseñar e implementar casos de prueba, ejecutar pruebas, informar el progreso, gestionar herramientas y colaborar con el equipo."}],"quiz":[{"q":"¿Qué establece el Principio 1 del testing?","opts":["Las pruebas garantizan que no hay defectos","Las pruebas muestran la presencia de defectos, no su ausencia","El testing exhaustivo es posible con suficiente tiempo","Los defectos se distribuyen uniformemente en el código"],"correct":1,"explain":"El Principio 1 establece que el testing puede mostrar que existen defectos, pero nunca puede probar que el software está completamente libre de defectos."},{"q":"Un desarrollador escribe una condición lógica incorrecta en el código. ¿Cómo se clasifica esto?","opts":["Falla","Defecto","Error","Incidente"],"correct":2,"explain":"El Error es la acción humana incorrecta (escribir la condición mal). El Error produce un Defecto en el código. El Defecto puede producir una Falla cuando se ejecuta."},{"q":"QA se diferencia de QC principalmente en que:","opts":["QA es más costoso","QA es proactivo (previene defectos), QC es reactivo (detecta defectos)","QC se realiza antes que QA","QA solo aplica a videojuegos"],"correct":1,"explain":"QA mejora los procesos para prevenir defectos desde el inicio del proyecto. QC identifica defectos en los productos ya desarrollados, actuando principalmente al final."},{"q":"¿Cuál es el objetivo de las 'pruebas tempranas' (Principio 3)?","opts":["Terminar el proyecto más rápido","Reducir el costo de corrección de defectos detectando problemas antes","Reemplazar las pruebas de aceptación","Eliminar la necesidad de QC"],"correct":1,"explain":"Detectar defectos temprano es mucho más barato. El costo de corregir un defecto se multiplica exponencialmente cuanto más tarde en el ciclo de vida se detecta."},{"q":"En un equipo de testing, ¿quién se encarga de corregir los defectos encontrados?","opts":["El tester","El QA Manager","El desarrollador","El Product Owner"],"correct":2,"explain":"El tester ENCUENTRA y REPORTA defectos. El desarrollador los CORRIGE (depuración). Prueba y depuración son actividades distintas realizadas por personas distintas."}],"comparisons":[{"a":"QA","b":"QC","texto":"QA (Quality Assurance) — PROACTIVO:\n- Se enfoca en mejorar los procesos de desarrollo\n- Actúa durante todo el ciclo de vida del proyecto\n- Previene la aparición de defectos\n- Ejemplo: establecer estándares de código, hacer revisiones\n\nQC (Quality Control) — REACTIVO:\n- Se enfoca en identificar defectos en productos ya creados\n- Actúa principalmente al final del proceso\n- Detecta defectos antes de la entrega al cliente\n- Ejemplo: ejecutar casos de prueba sobre la build del juego\n\nAmbos son necesarios y complementarios."},{"a":"Error","b":"Defecto / Falla","texto":"Error:\n- Acción humana incorrecta\n- Lo comete una persona (desarrollador, analista, diseñador)\n- Ejemplo: el programador escribe una condición al revés\n\nDefecto (Bug):\n- Resultado del error en el producto\n- Está en el código, diseño o documento\n- Ejemplo: la línea de código con la condición incorrecta\n\nFalla:\n- Lo que experimenta el usuario cuando el defecto se activa\n- Ocurre en tiempo de ejecución\n- Ejemplo: el personaje del juego atraviesa las paredes\n\nCadena: Error → produce Defecto → puede causar Falla"},{"a":"Prueba estática","b":"Prueba dinámica","texto":"Prueba estática:\n- NO ejecuta el software\n- Revisa documentos, código, requisitos\n- Más temprana y barata\n- Ejemplos: code review, revisión de requisitos\n\nPrueba dinámica:\n- SÍ ejecuta el software\n- Evalúa el comportamiento real del sistema\n- Detecta fallos en tiempo de ejecución\n- Ejemplos: pruebas funcionales, de carga, de usuario"}],"resumen":{"completo":"CONCEPTOS PRINCIPALES:\n\n- ISTQB: Organización internacional que estandariza y certifica a profesionales en testing.\n\n- Testing: Verificación dinámica del comportamiento de un programa sobre casos de prueba finitos y seleccionados, comparando contra el comportamiento esperado.\n\n- La cadena Error → Defecto → Falla:\n  · Error: acción humana incorrecta\n  · Defecto: imperfección resultante en el producto\n  · Falla: manifestación en tiempo de ejecución\n\n- QA vs QC:\n  · QA (Quality Assurance): proactivo, mejora procesos, previene defectos\n  · QC (Quality Control): reactivo, detecta defectos en productos\n\n- 7 Principios del Testing:\n  1. Testing muestra presencia de defectos, no su ausencia\n  2. Testing exhaustivo es imposible\n  3. Pruebas tempranas ahorran tiempo y dinero\n  4. Agrupación de defectos (mayoría en pocos módulos)\n  5. Paradoja del pesticida (mismos tests dejan de encontrar bugs)\n  6. Testing dependiente del contexto\n  7. Falacia de la ausencia de errores\n\n- Rol del Tester: planifica, diseña, ejecuta, reporta. NO corrige defectos (eso es el desarrollador).","rapido":"- ISTQB: organización de certificación en testing\n- Error→Defecto→Falla (acción humana → en código → en ejecución)\n- QA: proactivo/procesos | QC: reactivo/productos\n- 7 principios: no ausencia, no exhaustivo, temprano, agrupado, pesticida, contexto, falacia\n- Tester: planifica, diseña, ejecuta, reporta (no depura)","examen":"TEMAS MÁS PROBABLES EN EXAMEN:\n\n1. Los 7 principios del testing (saber enunciarlos a todos, especialmente paradoja del pesticida y principio 1)\n2. Diferencia Error / Defecto / Falla con ejemplo\n3. QA vs QC: diferencia y ejemplo de cada uno\n4. Definición de testing según ISTQB\n5. Rol del tester y diferencia con el desarrollador\n\nPREGUNTAS TRAMPA:\n- 'El testing garantiza que no hay defectos' → FALSO (principio 1)\n- 'QA y QC son lo mismo' → FALSO\n- 'El tester corrige los bugs' → FALSO, el desarrollador los corrige\n- 'El testing exhaustivo es posible si tenés tiempo' → FALSO (principio 2)\n\nCONCEPTOS CLAVE A MEMORIZAR:\n- Paradoja del pesticida: mismos tests = no nuevos bugs\n- Agrupación: mayoría de defectos en pocos módulos","esquema":"Unidad 1: Introducción a la Calidad\n  ├── ISTQB (certificación internacional)\n  ├── Definición de Testing\n  │     ├── Verificación dinámica\n  │     ├── Finita y seleccionada\n  │     └── Comportamiento esperado\n  ├── Error → Defecto → Falla\n  ├── QA vs QC\n  │     ├── QA: proactivo, procesos\n  │     └── QC: reactivo, productos\n  ├── 7 Principios del Testing\n  │     ├── 1. Presencia no ausencia\n  │     ├── 2. No exhaustivo\n  │     ├── 3. Pruebas tempranas\n  │     ├── 4. Agrupación de defectos\n  │     ├── 5. Paradoja del pesticida\n  │     ├── 6. Dependiente del contexto\n  │     └── 7. Falacia de ausencia\n  └── Rol del Tester\n        ├── Planificar y estimar\n        ├── Diseñar y ejecutar\n        └── Reportar (≠ depurar)"}},"2":{"title":"Pruebas Estáticas","topics":"Concepto · Análisis estático · Tipos de revisión · Proceso","flashcards":[{"q":"¿Qué son las pruebas estáticas?","a":"Pruebas que no requieren la ejecución del software. Revisan productos de trabajo (documentos, código, requisitos) para encontrar defectos de forma temprana."},{"q":"¿Qué es la complejidad ciclomática?","a":"Número de caminos independientes que pueden ocurrir en la ejecución entre el inicio y el fin del software. Es una métrica del análisis estático."},{"q":"Tipos de revisión de menos a más formal","a":"1) Revisión informal (sin proceso definido), 2) Walkthrough (guiada por el autor), 3) Revisión técnica (pares con moderador), 4) Inspección formal (roles estrictos, métricas)."},{"q":"¿Qué es un Walkthrough?","a":"Revisión guiada por el AUTOR del producto de trabajo. Informal, con fines educativos y de feedback. El autor presenta su trabajo a los revisores."},{"q":"¿Qué es una Inspección formal?","a":"Revisión más rigurosa con roles definidos (moderador, lector, autor, inspectores). El autor NO guía. Se usan checklists y se generan métricas."},{"q":"¿Cuáles son las ventajas de las pruebas estáticas?","a":"Detección precoz de defectos, reducción de costos, mejora de calidad del código, mejor comunicación del equipo y desarrollo más rápido."},{"q":"¿Qué productos de trabajo se pueden revisar?","a":"Especificaciones de requisitos, historias de usuario, criterios de aceptación, código fuente, planes de prueba, casos de prueba y manuales de usuario."},{"q":"¿Qué es el flujo de control en análisis estático?","a":"Muestra el orden en que las instrucciones son ejecutadas. Permite ubicar defectos relacionados con código muerto o inalcanzable."},{"q":"¿Qué es el flujo de datos en análisis estático?","a":"Analiza cómo mutan los valores a lo largo de la aplicación: cómo se acceden y alteran las variables. Detecta variables indefinidas o que nunca se usan."},{"q":"¿Cuáles son los factores de éxito de una revisión?","a":"Objetivos claros, selección del tipo de revisión apropiado, participantes competentes y motivados, gestión de defectos bien definida."}],"quiz":[{"q":"¿Cuál de estos es un ejemplo de prueba ESTÁTICA?","opts":["Ejecutar el juego y verificar que el personaje salta","Revisar el documento de requisitos buscando ambigüedades","Realizar pruebas de carga en el servidor","Probar el menú de configuración"],"correct":1,"explain":"La revisión de documentos es prueba estática porque no requiere ejecutar el software. Los demás ejemplos requieren ejecución del sistema."},{"q":"¿Quién guía el proceso en una revisión tipo Walkthrough?","opts":["El moderador","El inspector jefe","El autor del producto de trabajo","El cliente"],"correct":2,"explain":"En el Walkthrough, el AUTOR es quien guía la revisión presentando su trabajo. Es la característica que lo distingue de la Inspección, donde el autor no guía."},{"q":"¿Qué mide la complejidad ciclomática?","opts":["El tiempo de ejecución del programa","El número de líneas de código","El número de caminos independientes de ejecución","La cantidad de defectos encontrados"],"correct":2,"explain":"La complejidad ciclomática mide los caminos independientes en el flujo de control del programa. A mayor complejidad, más difícil es probar y mantener el código."},{"q":"¿Cuál es la principal desventaja de las pruebas estáticas?","opts":["No pueden encontrar defectos reales","Requieren ejecutar el software","Requieren conocimiento del dominio y pueden ser costosas en tiempo","Solo funcionan con lenguajes específicos"],"correct":2,"explain":"Las pruebas estáticas requieren que los revisores tengan conocimiento del dominio y pueden consumir mucho tiempo del equipo, especialmente en revisiones formales."},{"q":"¿En qué se diferencia la Revisión técnica de la Inspección?","opts":["La revisión técnica es más formal que la inspección","La inspección tiene roles más estrictos y genera métricas formales","La revisión técnica es siempre guiada por el autor","No hay diferencia entre ambas"],"correct":1,"explain":"La Inspección es la más formal: tiene roles estrictamente definidos (moderador, lector, autor, inspectores), usa checklists y genera métricas. La Revisión técnica es más flexible."}],"comparisons":[{"a":"Prueba estática","b":"Prueba dinámica","texto":"Prueba estática — NO ejecuta el software:\n- Revisa documentos, código fuente, requisitos\n- Se aplica en cualquier etapa del ciclo de vida\n- Detecta defectos de forma temprana y barata\n- Ejemplos: code review, revisión de requisitos, análisis con herramientas\n\nPrueba dinámica — SÍ ejecuta el software:\n- Evalúa el comportamiento real del sistema\n- Detecta defectos en tiempo de ejecución\n- Ejemplos: pruebas funcionales, de rendimiento, de usuario\n\nClave: corregir un defecto detectado temprano (estática) es hasta 10x más barato que corregirlo en producción."},{"a":"Walkthrough","b":"Inspección formal","texto":"Walkthrough:\n- AUTOR guía la revisión\n- Informal y flexible\n- Objetivo: transferir conocimiento y recibir feedback\n- Sin roles formales ni métricas\n- Útil para: diseño de niveles, historias de usuario\n\nInspección formal:\n- MODERADOR facilita, autor NO guía\n- Roles definidos: moderador, lector, inspectores\n- Usa checklists formales\n- Genera métricas de defectos\n- La más efectiva para encontrar defectos\n- Útil para: código crítico, requisitos de seguridad"},{"a":"Análisis estático","b":"Revisión manual","texto":"Análisis estático:\n- Realizado por HERRAMIENTAS automatizadas\n- Analiza código sin ejecutarlo\n- Detecta: complejidad ciclomática, code smells, estándares de codificación\n- Rápido y consistente, sin sesgo humano\n\nRevisión manual:\n- Realizada por PERSONAS\n- Puede revisar cualquier tipo de documento\n- Detecta: ambigüedades, lógica incorrecta, problemas de diseño\n- Requiere tiempo y experiencia humana\n- Más flexible pero más lenta"}],"resumen":{"completo":"CONCEPTO:\nLas pruebas estáticas no requieren ejecutar el software. Detectan defectos revisando productos de trabajo en cualquier etapa del ciclo de vida.\n\nANÁLISIS ESTÁTICO (con herramientas):\n- Complejidad ciclomática: caminos independientes de ejecución\n- Flujo de control: orden de ejecución, detecta código muerto\n- Flujo de datos: uso de variables, detecta variables indefinidas\n- Estructura de datos: organización de los datos\n- Estándares de codificación: normas del equipo\n\nVENTAJAS:\n- Detección precoz (más barato corregir temprano)\n- Reducción de tiempo y costos\n- Mejora calidad del código\n- Mejora comunicación del equipo\n\nDESVENTAJAS:\n- Requiere conocimiento del dominio\n- Puede ser costosa en tiempo\n- Puede generar conflictos interpersonales\n\nTIPOS DE REVISIÓN (menor a mayor formalidad):\n1. Informal: sin proceso definido, rápida\n2. Walkthrough: guiada por el autor, educativa\n3. Revisión técnica: pares técnicos, moderador, más estructurada\n4. Inspección: máxima formalidad, roles estrictos, métricas\n\nPROCESO DE REVISIÓN:\nPlanificación → Inicio → Revisión individual → Reunión → Corrección → Seguimiento","rapido":"- No requieren ejecutar el software\n- Detectan defectos tempranamente (ahorra costo)\n- 4 tipos (+ a - formal): Inspección > Técnica > Walkthrough > Informal\n- Análisis estático: complejidad ciclomática, flujo control/datos\n- Productos revisables: requisitos, código, planes, casos de prueba","examen":"TEMAS MÁS PROBABLES:\n1. Diferencia prueba estática vs dinámica (con ejemplo)\n2. Tipos de revisión en orden de formalidad\n3. ¿Quién guía en walkthrough vs inspección?\n4. ¿Qué es complejidad ciclomática?\n5. Ventajas y desventajas de pruebas estáticas\n\nTRAMPAS FRECUENTES:\n- 'La inspección es guiada por el autor' → FALSO (es el walkthrough)\n- 'Las estáticas solo aplican al código' → FALSO, también a documentos\n- 'Las estáticas reemplazan a las dinámicas' → FALSO, se complementan\n- 'El análisis estático requiere ejecutar el programa' → FALSO","esquema":"Unidad 2: Pruebas Estáticas\n  ├── Concepto (sin ejecución)\n  ├── Análisis Estático (con herramientas)\n  │     ├── Complejidad ciclomática\n  │     ├── Flujo de control\n  │     ├── Flujo de datos\n  │     └── Estándares de código\n  ├── Ventajas y Desventajas\n  ├── Productos de Trabajo evaluables\n  │     ├── Requisitos / HU\n  │     ├── Código fuente\n  │     └── Planes y casos de prueba\n  ├── Tipos de Revisión\n  │     ├── Informal\n  │     ├── Walkthrough (autor guía)\n  │     ├── Revisión técnica\n  │     └── Inspección formal (más rigurosa)\n  └── Proceso de Revisión\n        └── Plan→Inicio→Individual→Reunión→Corrección"}},"3":{"title":"Proceso de Pruebas","topics":"Contexto · Trazabilidad · Psicología · Métricas · Reportes","flashcards":[{"q":"¿Qué es un proceso de pruebas?","a":"Conjunto de actividades co-dependientes que permiten llevar a cabo las pruebas de manera ordenada, coherente y eficaz."},{"q":"¿Qué es la prueba basada en el contexto?","a":"Enfoque donde los testers eligen sus técnicas observando los detalles de cada situación específica. La parte humana es lo más importante. No existe un proceso único universal."},{"q":"¿Qué es la trazabilidad en testing?","a":"Capacidad de establecer relaciones entre dos o más artefactos del sistema (requisitos, casos de prueba, código). Permite rastrear el origen de cualquier elemento."},{"q":"¿Qué tipos de trazabilidad existen?","a":"Trazabilidad horizontal: entre artefactos del mismo nivel. Trazabilidad vertical: entre requisitos y los casos de prueba que los verifican."},{"q":"¿Qué es el sesgo de confirmación en testing?","a":"Tendencia del tester a buscar información que confirme sus creencias previas, en lugar de buscar defectos. Afecta la objetividad de las pruebas."},{"q":"¿Qué diferencia hay entre informe de avance e informe de finalización?","a":"El informe de avance se genera DURANTE las pruebas (progreso, defectos abiertos). El informe de finalización se genera AL TERMINAR (resultado final, cobertura alcanzada)."},{"q":"¿Cuáles son las métricas básicas de testing?","a":"Porcentaje de casos ejecutados, número de defectos encontrados vs cerrados, cobertura de pruebas alcanzada, tiempo promedio de detección de defectos."},{"q":"¿Qué son los indicadores KPI en testing?","a":"Indicadores clave de rendimiento: velocidad de detección de defectos, tasa de re-apertura de defectos, densidad de defectos por módulo."},{"q":"Según James Bach, ¿qué es un tester basado en contexto?","a":"Alguien que se acerca a cada situación de prueba como si fuera única en aspectos importantes, con conciencia amplia de los problemas del proyecto y sus posibles soluciones."},{"q":"¿Cuáles son los factores que influyen en el proceso de prueba?","a":"Modelo de ciclo de vida, niveles y tipos de prueba, riesgos del proyecto y producto, dominio del negocio, restricciones operativas (presupuesto, plazos, complejidad)."}],"quiz":[{"q":"¿Cuál de los siguientes principios básicos del contexto es correcto?","opts":["Existen las mejores prácticas universales en testing","El valor de cualquier práctica depende de su contexto","El proceso de pruebas debe ser idéntico en todos los proyectos","La parte técnica es lo más importante del contexto"],"correct":1,"explain":"Un principio fundamental del testing basado en contexto es que el valor de cualquier práctica depende de su contexto. No existen mejores prácticas universales, solo buenas prácticas en contexto."},{"q":"Un tester encuentra que los requisitos no están claros y algunos casos de prueba no tienen cobertura definida. ¿Qué herramienta del proceso de pruebas ayudaría a detectar este problema?","opts":["Métricas de rendimiento","Trazabilidad entre requisitos y casos de prueba","Informe de finalización","Sesgo de confirmación"],"correct":1,"explain":"La trazabilidad vertical permite vincular cada requisito con los casos de prueba que lo cubren. Si hay requisitos sin casos de prueba asociados, la trazabilidad lo revela."},{"q":"¿Cuál es la diferencia entre un informe de avance y un informe de finalización?","opts":["El de avance es más detallado que el de finalización","El de avance se genera durante las pruebas, el de finalización al terminar","El de finalización incluye solo defectos críticos","No hay diferencia significativa"],"correct":1,"explain":"El informe de avance se genera durante la ejecución de pruebas para comunicar el progreso. El informe de finalización se produce al terminar el ciclo de pruebas con los resultados globales."},{"q":"El sesgo de confirmación en testing se refiere a:","opts":["La tendencia a encontrar más defectos de los esperados","La tendencia a buscar información que confirme creencias previas","La dificultad para reproducir defectos","La falta de herramientas adecuadas"],"correct":1,"explain":"El sesgo de confirmación hace que el tester busque inconscientemente evidencia que confirme lo que ya cree, en lugar de buscar activamente defectos. Reduce la efectividad de las pruebas."},{"q":"La 'tasa de re-apertura de defectos' indica:","opts":["Cuántos defectos se encuentran por hora","Cuántos defectos cerrados vuelven a abrirse por corrección incompleta","El tiempo que tarda en cerrarse un defecto","La prioridad promedio de los defectos"],"correct":1,"explain":"La tasa de re-apertura mide cuántos defectos que se marcaron como resueltos vuelven a abrirse porque la corrección fue incompleta o introdujo nuevos problemas."}],"comparisons":[{"a":"Trazabilidad horizontal","b":"Trazabilidad vertical","texto":"Trazabilidad horizontal:\n- Relaciona artefactos del MISMO nivel del ciclo de vida\n- Ejemplo: vincular un requisito funcional con el criterio de aceptación correspondiente\n- Garantiza consistencia entre documentos del mismo nivel\n\nTrazabilidad vertical:\n- Relaciona artefactos de DISTINTOS niveles\n- Ejemplo: vincular un requisito con el caso de prueba que lo verifica\n- Garantiza que cada requisito esté cubierto por pruebas\n- La más usada en QA para demostrar cobertura"},{"a":"Informe de avance","b":"Informe de finalización","texto":"Informe de avance:\n- Se genera DURANTE la ejecución de pruebas\n- Contenido: casos ejecutados/pendientes, defectos abiertos, progreso vs. plan\n- Frecuencia: periódica (diaria, semanal, por sprint)\n- Audiencia: equipo de proyecto, PM\n\nInforme de finalización:\n- Se genera AL TERMINAR el ciclo de pruebas\n- Contenido: resultado final, cobertura alcanzada, defectos totales, evaluación del proceso\n- Frecuencia: una vez al final\n- Audiencia: stakeholders, management"},{"a":"Métricas","b":"KPIs","texto":"Métricas:\n- Medidas cuantitativas del proceso de prueba\n- Ejemplos: número de casos ejecutados, defectos por módulo, cobertura %\n- Descriptivas: dicen QUÉ pasó\n\nKPIs (Key Performance Indicators):\n- Indicadores estratégicos ligados a objetivos de negocio\n- Ejemplos: velocidad de detección, tasa de re-apertura, densidad de defectos\n- Evaluativos: dicen si el proceso es BUENO o MALO\n- Subconjunto de las métricas con mayor significado estratégico"}],"resumen":{"completo":"CONCEPTO:\nNo existe un proceso de pruebas único. El proceso adecuado depende del contexto del proyecto.\n\nFACTORES DE CONTEXTO:\n- Modelo de ciclo de vida y metodología\n- Niveles y tipos de prueba\n- Riesgos del proyecto y producto\n- Dominio del negocio\n- Restricciones: presupuesto, plazos, complejidad\n\nPRUEBA BASADA EN CONTEXTO:\n- La parte humana es lo más importante\n- No existen mejores prácticas universales\n- Cada proyecto es único\n- James Bach: acercarse a cada situación como única\n\nTRAZABILIDAD:\n- Horizontal: entre artefactos del mismo nivel\n- Vertical: entre requisitos y casos de prueba\n- Beneficios: registro fiable, facilita resolución de problemas\n\nPSICOLOGÍA DEL PROCESO:\n- Sesgo de confirmación: buscar lo que confirma creencias\n- Comunicación efectiva entre tester y desarrollador es clave\n\nREPORTES:\n- Informe de avance: durante las pruebas\n- Informe de finalización: al terminar\n\nMÉTRICAS Y KPIs:\n- Casos ejecutados, defectos abiertos/cerrados\n- Cobertura de prueba alcanzada\n- Velocidad de detección, tasa de re-apertura","rapido":"- No hay proceso único; depende del contexto\n- Prueba basada en contexto: la parte humana es clave\n- Trazabilidad: horizontal (mismo nivel) y vertical (requisitos↔tests)\n- Sesgo de confirmación: tendencia a confirmar creencias previas\n- Reportes: avance (durante) y finalización (al terminar)\n- KPIs: velocidad detección, tasa re-apertura, densidad defectos","examen":"TEMAS MÁS PROBABLES:\n1. ¿Qué es la trazabilidad y sus tipos?\n2. ¿Qué es el sesgo de confirmación?\n3. Diferencia entre informe de avance y finalización\n4. Factores de contexto que influyen en el proceso\n5. Principios básicos del testing basado en contexto\n\nTRAMPAS FRECUENTES:\n- 'Existe un proceso de pruebas estándar para todos los proyectos' → FALSO\n- 'La trazabilidad solo es vertical' → FALSO, también existe horizontal\n- 'Las métricas y los KPIs son lo mismo' → No exactamente; los KPIs son métricas estratégicas\n\nFRASE CLAVE:\nJames Bach: 'Ser un tester basado en contexto es acercarse a cada situación de prueba como si fuera única en aspectos importantes.'","esquema":"Unidad 3: Proceso de Pruebas\n  ├── Concepto (no hay proceso único)\n  ├── Factores de Contexto\n  │     ├── Ciclo de vida y metodología\n  │     ├── Riesgos del proyecto\n  │     └── Restricciones operativas\n  ├── Prueba Basada en Contexto\n  │     └── James Bach: cada situación es única\n  ├── Trazabilidad\n  │     ├── Horizontal (mismo nivel)\n  │     └── Vertical (requisitos ↔ casos de prueba)\n  ├── Psicología del Proceso\n  │     └── Sesgo de confirmación\n  ├── Reportes\n  │     ├── Informe de avance (durante)\n  │     └── Informe de finalización (al terminar)\n  └── Métricas y KPIs\n        ├── % casos ejecutados\n        ├── Defectos abiertos/cerrados\n        └── Tasa de re-apertura"}},"4":{"title":"Casos de Prueba","topics":"Concepto · Elementos · Plan de pruebas · Casos de uso","flashcards":[{"q":"¿Qué es un caso de prueba?","a":"Escenario que se utiliza para medir la funcionalidad de la aplicación a través de un conjunto de acciones o condiciones para verificar los resultados esperados."},{"q":"¿Cuáles son los elementos de un caso de prueba?","a":"Nombre del TC, descripción general, paso a paso con resultado esperado para cada paso, pre-condiciones (condiciones previas), y datos necesarios para ejecutarlo."},{"q":"¿Qué es el lenguaje Gherkin?","a":"Lenguaje comprensible por humanos y máquinas usado para describir funcionalidades de software. Estructura: Given (dado), When (cuando), Then (entonces)."},{"q":"¿Cuáles son las 8 características de un buen caso de prueba?","a":"1)Atómico, 2)Propósito exacto, 3)Lenguaje claro (Gherkin), 4)Pequeño, 5)Independiente, 6)Sin pasos innecesarios, 7)Repetible, 8)Terminología consistente."},{"q":"¿Qué contiene un Plan de Pruebas?","a":"Alcance, objetivos, recursos, cronograma, criterios de entrada/salida/suspensión, estrategia de prueba, técnicas a usar, riesgos y contingencias."},{"q":"¿Cuáles son las técnicas de estimación de pruebas?","a":"Estimación basada en expertos (juicio experto), extrapolación (basada en datos históricos), y estimación de tres puntos (optimista, pesimista y más probable)."},{"q":"¿Qué es un caso de uso?","a":"Descripción de cómo un usuario interactúa con el sistema para lograr un objetivo específico. Incluye flujo principal y flujos alternativos."},{"q":"¿Cuáles son las ventajas de los casos de uso?","a":"Fáciles de entender para todos, orientados al usuario, útiles para identificar requisitos funcionales y para derivar casos de prueba."},{"q":"¿Cuáles son las limitaciones de los casos de uso?","a":"No cubren aspectos no funcionales (rendimiento, seguridad), pueden volverse muy complejos en sistemas grandes, y no son adecuados para todos los tipos de sistemas."},{"q":"¿Qué son las pre-condiciones en un caso de prueba?","a":"Condiciones que deben cumplirse antes de ejecutar el caso de prueba. Ejemplo: el usuario debe estar logueado, la base de datos debe tener ciertos datos cargados."}],"quiz":[{"q":"¿Cuál es la característica más importante de un caso de prueba bien diseñado?","opts":["Debe ser lo más largo posible para cubrir más casos","Debe ser atómico: probar solo una cosa","Debe compartir datos con otros casos de prueba","Debe incluir todos los casos posibles"],"correct":1,"explain":"Un caso de prueba atómico (que prueba solo una cosa) es más fácil de mantener, identificar errores y ejecutar de forma independiente. Los casos largos son difíciles de depurar cuando fallan."},{"q":"En el lenguaje Gherkin, ¿qué representa la sección 'When'?","opts":["La condición inicial del sistema","La acción que ejecuta el usuario","El resultado esperado","Los datos de prueba"],"correct":1,"explain":"En Gherkin: Given = estado inicial del sistema, When = acción que ejecuta el usuario, Then = resultado esperado. Es una estructura Given/When/Then."},{"q":"¿Cuál es el propósito de las pre-condiciones en un caso de prueba?","opts":["Definir el resultado esperado","Establecer las condiciones que deben cumplirse ANTES de ejecutar el caso","Describir los pasos de ejecución","Identificar los defectos encontrados"],"correct":1,"explain":"Las pre-condiciones definen el estado necesario del sistema antes de comenzar la ejecución del caso de prueba (usuario logueado, datos cargados, etc.)."},{"q":"La técnica de 'estimación de tres puntos' en testing usa:","opts":["Tres testers diferentes para estimar","Valores optimista, pesimista y más probable","Los tres niveles de prueba principales","Tres métricas de cobertura diferentes"],"correct":1,"explain":"La estimación de tres puntos calcula: (Optimista + 4×MásProbable + Pesimista) / 6. Reduce la incertidumbre considerando el mejor y peor escenario junto al más realista."},{"q":"¿Por qué los casos de prueba deben ser independientes entre sí?","opts":["Para que sean más fáciles de leer","Para poder ejecutarlos en cualquier orden sin que unos dependan del resultado de otros","Para reducir el tiempo de ejecución","Para facilitar la automatización solamente"],"correct":1,"explain":"La independencia permite ejecutar un subconjunto de casos, repetir casos específicos al corregir un bug, y evitar que el fallo en un caso afecte la ejecución de los siguientes."}],"comparisons":[{"a":"Caso de prueba","b":"Caso de uso","texto":"Caso de prueba:\n- Secuencia de pasos para VERIFICAR una funcionalidad\n- Orientado al QA/tester\n- Incluye: pasos, resultado esperado, pre-condiciones, datos\n- Puede ser positivo (camino feliz) o negativo (errores)\n- Múltiples casos de prueba por cada caso de uso\n\nCaso de uso:\n- Descripción de cómo el USUARIO interactúa con el sistema\n- Orientado al usuario/analista\n- Incluye: actor, flujo principal, flujos alternativos\n- Describe QUÉ hace el sistema, no cómo se prueba\n- Los casos de uso son BASE para crear casos de prueba"},{"a":"Plan de pruebas","b":"Caso de prueba","texto":"Plan de pruebas:\n- Documento ESTRATÉGICO del proceso de testing\n- Define: alcance, recursos, cronograma, criterios, riesgos\n- Se crea ANTES de empezar a diseñar casos\n- Responde: ¿Qué vamos a probar? ¿Cómo? ¿Cuándo? ¿Con qué?\n\nCaso de prueba:\n- Documento TÁCTICO/operacional\n- Define: pasos concretos para verificar una funcionalidad\n- Se crea DESPUÉS del plan\n- Responde: ¿Cómo pruebo específicamente esta funcionalidad?\n\nRelación: el plan define la estrategia, los casos la implementan."},{"a":"Pre-condición","b":"Post-condición","texto":"Pre-condición:\n- Estado que debe existir ANTES de ejecutar el caso de prueba\n- Establece el punto de partida\n- Ejemplos: usuario logueado, BD con datos de prueba, app iniciada\n\nPost-condición:\n- Estado esperado del sistema DESPUÉS de ejecutar el caso\n- Define qué cambió en el sistema\n- Ejemplos: registro guardado en BD, email enviado, sesión cerrada\n\nAmbas son parte del diseño completo de un caso de prueba."}],"resumen":{"completo":"CONCEPTO:\nLos casos de prueba son escenarios para medir la funcionalidad a través de acciones y condiciones que verifican resultados esperados.\n\nELEMENTOS DE UN CASO DE PRUEBA:\n- Nombre/ID del TC\n- Descripción general\n- Paso a paso de ejecución con resultado esperado\n- Pre-condiciones\n- Datos de prueba necesarios\n\n8 CARACTERÍSTICAS DE UN BUEN CASO:\n1. Atómico (prueba una sola cosa)\n2. Propósito exacto y claro\n3. Lenguaje claro (Gherkin: Given/When/Then)\n4. Pequeño (si es largo, dividir)\n5. Independiente de otros casos\n6. Sin pasos innecesarios\n7. Repetible\n8. Terminología consistente\n\nPLAN DE PRUEBAS:\n- Documento estratégico: alcance, recursos, cronograma, riesgos\n- Técnicas de estimación: expertos, extrapolación, tres puntos\n- Se crea antes que los casos individuales\n\nCASOS DE USO:\n- Describen interacción usuario-sistema\n- Ventajas: fáciles de entender, orientados al usuario\n- Limitaciones: no cubren no funcionales, pueden ser complejos","rapido":"- Caso de prueba: escenario con pasos y resultado esperado\n- Elementos: nombre, descripción, pasos, pre-condiciones, datos\n- Buen caso: atómico, exacto, claro, pequeño, independiente, repetible\n- Gherkin: Given / When / Then\n- Plan de pruebas: alcance, recursos, cronograma, criterios, riesgos\n- Estimación: expertos, extrapolación, tres puntos","examen":"TEMAS MÁS PROBABLES:\n1. Elementos que componen un caso de prueba\n2. Las 8 características de un buen caso de prueba\n3. Diferencia entre caso de prueba y caso de uso\n4. Qué es Gherkin y su estructura Given/When/Then\n5. Contenido de un plan de pruebas\n\nTRAMPAS FRECUENTES:\n- 'Los casos de prueba deben compartir datos entre sí para ser más eficientes' → FALSO, deben ser independientes\n- 'Un caso de prueba largo es mejor porque cubre más' → FALSO, deben ser pequeños y atómicos\n- 'El plan de pruebas y el caso de prueba son lo mismo' → FALSO\n\nRECORDAR:\nGherkin = Given (estado inicial) + When (acción) + Then (resultado esperado)","esquema":"Unidad 4: Casos de Prueba\n  ├── Concepto y Objetivo\n  ├── Elementos del Caso de Prueba\n  │     ├── Nombre/ID\n  │     ├── Descripción\n  │     ├── Pasos + resultado esperado\n  │     ├── Pre-condiciones\n  │     └── Datos de prueba\n  ├── 8 Características\n  │     ├── Atómico\n  │     ├── Propósito exacto\n  │     ├── Lenguaje claro (Gherkin)\n  │     ├── Pequeño\n  │     ├── Independiente\n  │     ├── Sin pasos innecesarios\n  │     ├── Repetible\n  │     └── Terminología consistente\n  ├── Plan de Pruebas\n  │     ├── Alcance, recursos, cronograma\n  │     └── Estimación: expertos, extrapolación, 3 puntos\n  └── Casos de Uso\n        ├── Ventajas\n        └── Limitaciones"}},"5":{"title":"Defectos, Errores y Fallas","topics":"Error/Defecto/Falla · Clasificación · Severidad · Reporte","flashcards":[{"q":"¿Cuál es el origen del término 'bug'?","a":"Thomas Alva Edison lo usó para fallas en el telégrafo. Luego se popularizó cuando ingenieras de Harvard encontraron una polilla real en una computadora en los años 40."},{"q":"¿Cómo se clasifican los defectos funcionales?","a":"Incluyen: lógica de negocio incorrecta, validaciones faltantes o erróneas, cálculos incorrectos, flujos de pantalla rotos, manejo incorrecto de estados."},{"q":"¿Qué son los defectos no funcionales?","a":"Defectos en aspectos como rendimiento (lentitud), seguridad (vulnerabilidades), usabilidad (difícil de usar), compatibilidad (no funciona en ciertos dispositivos/SO), accesibilidad."},{"q":"¿Qué es la Severidad (Criticidad) de un defecto?","a":"Impacto técnico del defecto en el sistema. Escala: Blocker (impide todo), Critical (funcionalidad crítica rota), Major (funcionalidad importante afectada), Minor (funcionalidad menor), Trivial (cosmético)."},{"q":"¿Qué es la Prioridad de un defecto?","a":"Urgencia para corregir el defecto desde la perspectiva del negocio. Alta, Media, Baja. Un defecto puede tener baja severidad pero alta prioridad (ej: error ortográfico en la pantalla principal)."},{"q":"¿Qué son los falsos positivos en testing?","a":"Pruebas que reportan un defecto cuando en realidad no existe. Pueden ser causados por errores en el entorno de prueba, datos corruptos o errores del tester."},{"q":"¿Qué son los falsos negativos en testing?","a":"Pruebas que NO detectan defectos que sí existen. Son más peligrosos que los falsos positivos porque dan una falsa sensación de calidad."},{"q":"¿Qué debe incluir un reporte de defecto?","a":"ID único, título descriptivo, pasos para reproducir, resultado actual, resultado esperado, severidad, prioridad, entorno de prueba, y evidencia (capturas de pantalla, logs)."},{"q":"¿Cuáles son las causas más comunes de defectos?","a":"Ambigüedad de requisitos, pruebas inadecuadas, control de calidad deficiente, falta de habilidades o conocimientos, y presión de tiempo."},{"q":"¿Qué son los defectos estructurales?","a":"Defectos en la arquitectura del código: alto acoplamiento entre módulos, baja cohesión, código duplicado, falta de modularidad. Dificultan el mantenimiento."}],"quiz":[{"q":"Un bug en un videojuego impide completamente que el juego se inicie. ¿Cuál es su severidad?","opts":["Trivial","Minor","Major","Blocker"],"correct":3,"explain":"Blocker (o Showstopper) es la severidad más alta: el defecto impide que el sistema funcione o que las pruebas continúen. Si el juego no puede iniciarse, ninguna otra prueba puede ejecutarse."},{"q":"El logo de un videojuego está levemente pixelado en la pantalla de inicio. ¿Cómo clasificarías esto?","opts":["Blocker con alta prioridad","Major con baja prioridad","Trivial con posiblemente alta prioridad (si es pantalla principal)","Critical por ser visible al usuario"],"correct":2,"explain":"Un logo pixelado es un defecto cosmético (Trivial en severidad). Sin embargo, si es la pantalla principal visible en el lanzamiento, puede tener prioridad alta desde el negocio. Severidad ≠ Prioridad."},{"q":"¿Cuál de estos es un defecto NO FUNCIONAL?","opts":["El personaje puede atravesar las paredes","El menú de pausa no aparece","El juego tarda 45 segundos en cargar (debería tardar 5)","El botón de guardar no guarda la partida"],"correct":2,"explain":"El tiempo de carga es un defecto de RENDIMIENTO, que es no funcional. Los demás son defectos funcionales (comportamiento incorrecto del sistema según sus especificaciones funcionales)."},{"q":"¿Por qué los falsos negativos son más peligrosos que los falsos positivos?","opts":["Porque son más difíciles de encontrar","Porque generan defectos que llegan al usuario sin ser detectados","Porque aumentan el costo de testing","Porque siempre son de alta severidad"],"correct":1,"explain":"Un falso negativo significa que hay un defecto real que el testing NO detectó, por lo que llega a producción. Un falso positivo es un 'defecto' que no existe, solo pierde tiempo pero no pone en riesgo la calidad."},{"q":"Un error ortográfico en el tutorial del juego tiene severidad Trivial pero prioridad Alta. ¿Por qué es esto posible?","opts":["No es posible, severidad y prioridad siempre van juntas","Porque el tutorial es crítico para los nuevos jugadores y el error es visible desde el principio","Porque todos los errores de texto son críticos","Porque la prioridad siempre es mayor que la severidad"],"correct":1,"explain":"Severidad y prioridad son independientes. Un error ortográfico tiene bajo impacto técnico (trivial), pero si está en el tutorial principal que ven todos los jugadores nuevos, corregirlo puede ser una prioridad alta de negocio."}],"comparisons":[{"a":"Severidad","b":"Prioridad","texto":"Severidad (Criticidad):\n- Impacto TÉCNICO del defecto en el sistema\n- La define el equipo de QA\n- Escala: Blocker > Critical > Major > Minor > Trivial\n- Ejemplos: Blocker=app no inicia, Trivial=error cosmético\n- Mide QUÉ TAN GRAVE es técnicamente\n\nPrioridad:\n- Urgencia de corrección desde el NEGOCIO\n- La define el Product Owner o cliente\n- Escala: Alta, Media, Baja\n- Puede diferir de la severidad\n- Ejemplo: logo pixelado (trivial severidad, alta prioridad si es el lanzamiento)\n- Mide QUÉ TAN URGENTE es corregirlo\n\nClave: un defecto puede tener cualquier combinación de severidad/prioridad."},{"a":"Falso positivo","b":"Falso negativo","texto":"Falso positivo:\n- La prueba reporta un defecto que NO EXISTE\n- Causas: entorno inestable, datos corruptos, error del tester\n- Consecuencia: pierde tiempo del equipo investigando algo que no es bug\n- Menos peligroso\n\nFalso negativo:\n- La prueba NO detecta un defecto que SÍ EXISTE\n- Causas: cobertura insuficiente, datos de prueba inadecuados\n- Consecuencia: el defecto llega a producción/usuario\n- MÁS PELIGROSO\n- Genera falsa sensación de calidad"},{"a":"Defecto funcional","b":"Defecto no funcional","texto":"Defecto funcional:\n- Afecta QUÉ HACE el sistema\n- El sistema no cumple las especificaciones funcionales\n- Ejemplos en videojuegos: personaje atraviesa paredes, guardar partida no funciona, NPC con IA rota\n\nDefecto no funcional:\n- Afecta CÓMO LO HACE el sistema\n- El sistema hace lo correcto pero mal\n- Categorías: rendimiento, seguridad, usabilidad, compatibilidad, accesibilidad\n- Ejemplos: juego lento, crash bajo alta carga, difícil de entender la UI"}],"resumen":{"completo":"CADENA: ERROR → DEFECTO → FALLA\n- Error: acción humana incorrecta\n- Defecto (Bug): imperfección resultante en el producto\n- Falla: manifestación en tiempo de ejecución\n\nCAUSAS DE DEFECTOS:\n- Ambigüedad de requisitos\n- Pruebas inadecuadas\n- Control de calidad deficiente\n- Falta de habilidades o conocimientos\n- Presión de tiempo\n\nCLASIFICACIÓN DE DEFECTOS:\n1. Funcionales: lógica, validaciones, cálculos, flujos\n2. No funcionales: rendimiento, seguridad, usabilidad, compatibilidad\n3. Estructurales: arquitectura, acoplamiento, cohesión\n4. De proceso: en metodología o documentación\n5. Humanos: comunicación, formación\n\nSEVERIDAD vs PRIORIDAD:\n- Severidad (QA): Blocker > Critical > Major > Minor > Trivial\n- Prioridad (negocio): Alta / Media / Baja\n- Son INDEPENDIENTES entre sí\n\nFALSOS POSITIVOS Y NEGATIVOS:\n- Falso positivo: reporta bug que no existe\n- Falso negativo: no detecta bug que sí existe (más peligroso)\n\nREPORTE DE DEFECTO:\nID, título, pasos para reproducir, resultado actual vs esperado, severidad, prioridad, entorno, evidencia.","rapido":"- Error→Defecto→Falla (origen→en código→en ejecución)\n- Clasificación: funcional, no funcional, estructural, proceso, humano\n- Severidad (técnica): Blocker/Critical/Major/Minor/Trivial\n- Prioridad (negocio): Alta/Media/Baja — independiente de severidad\n- Falso positivo: bug inexistente | Falso negativo: bug real no detectado\n- Reporte: ID, título, pasos, resultado actual vs esperado, evidencia","examen":"TEMAS MÁS PROBABLES:\n1. Diferencia Error / Defecto / Falla con ejemplo\n2. Clasificación de defectos (funcional, no funcional, etc.)\n3. Diferencia Severidad vs Prioridad con ejemplos\n4. Falso positivo vs falso negativo\n5. Elementos de un buen reporte de defecto\n\nTRAMPAS FRECUENTES:\n- 'Un defecto de alta severidad siempre tiene alta prioridad' → FALSO\n- 'Los falsos positivos son más peligrosos que los negativos' → FALSO\n- 'Error y defecto son lo mismo' → FALSO\n- 'Un Blocker siempre necesita corrección inmediata' → Depende de la prioridad\n\nEJEMPLO CLÁSICO:\nUn error ortográfico en la pantalla principal: Severidad=Trivial, Prioridad=Alta (si es el día del lanzamiento).","esquema":"Unidad 5: Defectos, Errores y Fallas\n  ├── Error → Defecto → Falla\n  ├── Causas de Defectos\n  │     ├── Ambigüedad de requisitos\n  │     ├── Pruebas inadecuadas\n  │     └── Falta de habilidades / presión\n  ├── Clasificación\n  │     ├── Funcionales\n  │     ├── No funcionales (rendimiento, seguridad, usabilidad)\n  │     ├── Estructurales\n  │     └── De proceso / Humanos\n  ├── Falsos Positivos y Negativos\n  ├── Severidad vs Prioridad\n  │     ├── Severidad: Blocker/Critical/Major/Minor/Trivial\n  │     └── Prioridad: Alta/Media/Baja\n  └── Reporte de Defecto\n        └── ID, título, pasos, resultado, severidad, prioridad, evidencia"}},"6":{"title":"Niveles y Tipos de Testing","topics":"ISO 25010 · 4 Niveles · Playtesting · Modelos SDLC","flashcards":[{"q":"¿Cuáles son las 8 características de calidad de ISO 25010?","a":"Adecuación funcional, eficiencia del rendimiento, compatibilidad, usabilidad, fiabilidad, seguridad, mantenibilidad y portabilidad."},{"q":"¿Cuáles son los 4 niveles de prueba según ISTQB?","a":"1) Componente/Unitaria (módulos individuales), 2) Integración (interacción entre módulos), 3) Sistema (sistema completo), 4) Aceptación (validación con usuarios/clientes)."},{"q":"¿Qué prueba el nivel de componente/unitario?","a":"Módulos individuales del software en aislamiento, sin dependencias externas. Generalmente automatizada y ejecutada por los desarrolladores. Usa TDD."},{"q":"¿Qué diferencia hay entre prueba de integración de componentes y de sistemas?","a":"Integración de componentes: verifica la interacción entre módulos dentro del mismo sistema. Integración de sistemas: verifica la interacción entre sistemas diferentes (APIs, servicios externos)."},{"q":"¿Qué tipos de prueba de aceptación existen?","a":"Alfa (interna, con personal de la empresa), Beta (externa, con usuarios reales seleccionados), UAT-User Acceptance Testing (validación con el cliente/usuario final)."},{"q":"¿Qué es el Modelo V en desarrollo de software?","a":"Modelo que integra el proceso de prueba a lo largo de todo el desarrollo. Cada fase de desarrollo tiene una fase de prueba asociada. Favorece la prueba temprana."},{"q":"¿Qué es el playtesting en videojuegos?","a":"Proceso de jugar el videojuego para probar su funcionamiento, evaluar jugabilidad, diversión, dificultad y experiencia del usuario. Puede ser realizado por testers o usuarios reales."},{"q":"¿Qué es el Game Feel?","a":"Sensación táctil y respuesta del juego a las acciones del jugador. Incluye la fluidez del movimiento, feedback visual/sonoro, sensación de control. Crucial para la experiencia de juego."},{"q":"¿Qué es el Shift-Left Testing?","a":"Práctica de comenzar las actividades de prueba lo antes posible en el ciclo de vida del desarrollo. Reduce costos al detectar defectos tempranamente."},{"q":"¿Cuáles son los perfiles de usuarios en videojuegos?","a":"Novato (nuevo en el género/juego), Casual (juega ocasionalmente, busca diversión simple), Hardcore/Gamer (experimentado, busca desafío y profundidad)."}],"quiz":[{"q":"¿En qué nivel de prueba se verifica la interacción entre módulos del mismo sistema?","opts":["Prueba de componente","Prueba de integración de componentes","Prueba de sistema","Prueba de aceptación"],"correct":1,"explain":"La prueba de integración de componentes verifica cómo interactúan los módulos entre sí dentro del mismo sistema. La prueba de componente prueba módulos en aislamiento."},{"q":"En el Modelo V, ¿cuándo se realiza el diseño de los casos de prueba de aceptación?","opts":["Al final del proyecto","Durante la fase de pruebas","Durante la fase de definición de requisitos","Durante la codificación"],"correct":2,"explain":"En el Modelo V, el diseño de pruebas de aceptación se realiza en paralelo con la definición de requisitos. Cada fase de desarrollo tiene su fase de prueba asociada desde el inicio."},{"q":"¿Cuál característica de ISO 25010 verifica que el software puede coexistir con otros sistemas en el mismo entorno?","opts":["Usabilidad","Fiabilidad","Compatibilidad","Portabilidad"],"correct":2,"explain":"La Compatibilidad verifica que el software puede coexistir con otros productos en el mismo hardware/software e intercambiar información. La Portabilidad es sobre transferir el software a otros entornos."},{"q":"Un grupo de jugadores reales prueba un videojuego antes del lanzamiento para evaluar la experiencia. ¿Qué tipo de prueba es?","opts":["Prueba de componente","Prueba beta / playtesting","Prueba de integración","Prueba de mantenimiento"],"correct":1,"explain":"Cuando usuarios reales externos prueban el producto antes del lanzamiento, se llama Prueba Beta. En contexto de videojuegos también se llama playtesting. Es una forma de prueba de aceptación."},{"q":"¿Qué es el 'Game Feel' en el testing de videojuegos?","opts":["La dificultad general del juego","La sensación táctil y respuesta del juego a las acciones del jugador","La calidad gráfica del juego","El número de niveles disponibles"],"correct":1,"explain":"El Game Feel se refiere a cómo responde el juego a las acciones del jugador: fluidez del movimiento, feedback visual/sonoro, sensación de control. Un buen Game Feel es fundamental para la experiencia."}],"comparisons":[{"a":"Prueba funcional","b":"Prueba no funcional","texto":"Prueba funcional:\n- Verifica QUÉ HACE el sistema\n- Basada en especificaciones funcionales\n- Pregunta: ¿el sistema hace lo que debe hacer?\n- Ejemplos: ¿el personaje salta? ¿se guarda la partida? ¿el menú abre?\n- Caja negra principalmente\n\nPrueba no funcional:\n- Verifica CÓMO LO HACE el sistema\n- Basada en características de calidad (ISO 25010)\n- Pregunta: ¿con qué calidad lo hace?\n- Ejemplos: ¿cuánto tarda en cargar? ¿soporta 100 jugadores simultáneos? ¿es accesible?\n- Rendimiento, seguridad, usabilidad, compatibilidad"},{"a":"Prueba alfa","b":"Prueba beta","texto":"Prueba alfa:\n- Realizada INTERNAMENTE (personal de la empresa)\n- Entorno controlado\n- Ocurre antes que la beta\n- El equipo conoce el producto\n- Menos feedback de 'usuario real'\n\nPrueba beta:\n- Realizada con USUARIOS REALES externos\n- Entorno real (los propios dispositivos del usuario)\n- Feedback más auténtico sobre experiencia\n- En videojuegos: beta abierta o cerrada\n- Mayor exposición a condiciones inesperadas"},{"a":"Modelo cascada","b":"Modelo V","texto":"Modelo en cascada:\n- Fases secuenciales: Requisitos→Diseño→Código→Prueba\n- Las pruebas ocurren AL FINAL\n- Defectos se detectan tarde (costoso)\n- Simple de planificar\n\nModelo V:\n- Integra pruebas en cada fase del desarrollo\n- Las pruebas se diseñan en paralelo con el desarrollo\n- Prueba temprana (Shift-Left)\n- Más costoso de gestionar pero detecta defectos antes\n- La V: lado izquierdo=desarrollo, lado derecho=pruebas"}],"resumen":{"completo":"ISO 25010 - 8 CARACTERÍSTICAS DE CALIDAD:\nAdecuación funcional, eficiencia del rendimiento, compatibilidad, usabilidad, fiabilidad, seguridad, mantenibilidad, portabilidad.\n\n4 NIVELES DE PRUEBA (ISTQB):\n1. Componente/Unitaria: módulos individuales en aislamiento. TDD. Ejecutada por desarrolladores.\n2. Integración: interacción entre componentes (interna) o sistemas (con externos/APIs).\n3. Sistema: evaluación del sistema completo contra todos los requisitos.\n4. Aceptación: validación con usuarios. Tipos: alfa (interna), beta (usuarios reales), UAT.\n\nTIPOS DE PRUEBA:\n- Funcionales: qué hace el sistema\n- No funcionales: cómo lo hace (rendimiento, seguridad, usabilidad, compatibilidad)\n- Caja blanca: estructura interna del código\n- Asociadas al cambio: confirmación y regresión\n\nMODELOS DE CICLO DE VIDA:\n- Cascada: secuencial, pruebas al final\n- Modelo V: pruebas en cada fase (Shift-Left)\n- Iterativo/Ágil: pruebas continuas\n\nVIDEOJUEGOS:\n- Playtesting: probar jugabilidad, diversión, dificultad\n- Game Feel: sensación de respuesta del juego\n- Perfiles: novato, casual, hardcore","rapido":"- ISO 25010: 8 características (funcional, rendimiento, compatibilidad, usabilidad, fiabilidad, seguridad, mantenibilidad, portabilidad)\n- 4 niveles: Componente→Integración→Sistema→Aceptación\n- Aceptación: alfa (interna), beta (usuarios externos), UAT\n- Modelo V: pruebas integradas en cada fase\n- Playtesting + Game Feel = testing de experiencia en videojuegos","examen":"TEMAS MÁS PROBABLES:\n1. Las 8 características de ISO 25010\n2. Los 4 niveles de prueba y qué prueba cada uno\n3. Diferencia entre prueba alfa, beta y UAT\n4. Prueba funcional vs no funcional\n5. Modelo V vs modelo cascada\n\nTRAMPAS FRECUENTES:\n- 'La prueba de integración prueba módulos aislados' → FALSO (eso es componente)\n- 'La prueba alfa es con usuarios externos' → FALSO (es interna)\n- 'La portabilidad y compatibilidad son lo mismo' → FALSO\n- 'En el modelo cascada hay pruebas tempranas' → FALSO\n\nRECORDAR: La Mantenibilidad (capacidad de modificar el software) y la Fiabilidad (funcionar correctamente bajo condiciones y tiempo dados) son características frecuentemente confundidas.","esquema":"Unidad 6: Niveles y Tipos de Testing\n  ├── ISO 25010 (8 características)\n  ├── Tipos de Prueba\n  │     ├── Funcionales (qué hace)\n  │     ├── No funcionales (cómo lo hace)\n  │     └── Asociadas al cambio\n  ├── 4 Niveles de Prueba\n  │     ├── 1. Componente/Unitaria\n  │     ├── 2. Integración (componentes / sistemas)\n  │     ├── 3. Sistema\n  │     └── 4. Aceptación (alfa / beta / UAT)\n  ├── Modelos SDLC\n  │     ├── Cascada (pruebas al final)\n  │     ├── Modelo V (pruebas integradas)\n  │     └── Ágil (pruebas continuas)\n  └── Testing en Videojuegos\n        ├── Playtesting\n        ├── Game Feel\n        └── Perfiles de jugadores"}},"7":{"title":"Técnicas de Testing","topics":"Caja Negra · Caja Blanca · Caja Gris · Experiencia","flashcards":[{"q":"¿Qué es la técnica de Caja Negra?","a":"Prueba desde perspectiva externa sin conocer el código interno. Evalúa entradas, salidas, interfaz y comportamiento observable del sistema."},{"q":"¿Qué es la Partición de Equivalencia?","a":"Técnica de caja negra que divide el dominio de entrada en clases donde el sistema se comporta igual. Solo se prueba un representante de cada clase válida e inválida."},{"q":"¿Qué es el Análisis de Valor Límite (AVL)?","a":"Técnica de caja negra que prueba en los bordes de las particiones de equivalencia: mínimo, mínimo+1, máximo-1, máximo. Los errores se concentran en los límites."},{"q":"¿Qué es una Tabla de Decisión?","a":"Técnica de caja negra que lista todas las combinaciones posibles de condiciones de entrada y las acciones resultantes. Útil para lógica de negocio compleja."},{"q":"¿Qué es la Prueba de Transición de Estado?","a":"Técnica de caja negra que verifica el comportamiento del sistema cuando cambia de un estado a otro. Se usa un diagrama de estados para diseñar los casos."},{"q":"¿Qué es la técnica de Caja Blanca?","a":"Prueba conociendo la estructura interna del código. Requiere conocimiento de programación. Diseña casos para ejecutar rutas específicas del código."},{"q":"¿Qué es la Cobertura de Sentencias?","a":"Métrica de caja blanca que mide el porcentaje de sentencias/instrucciones del código que han sido ejecutadas durante las pruebas."},{"q":"¿Qué es la Cobertura de Decisiones (Branch Coverage)?","a":"Métrica de caja blanca que mide si se han ejecutado todos los resultados posibles de cada punto de decisión (true/false de cada if). Es más completa que la cobertura de sentencias."},{"q":"¿Qué es la técnica de Error Guessing (suposición de errores)?","a":"Técnica basada en la experiencia del tester para anticipar dónde es probable que haya defectos, basándose en conocimiento del sistema y experiencias previas."},{"q":"¿Qué es la prueba exploratoria?","a":"Técnica basada en la experiencia donde el diseño y ejecución de pruebas ocurren simultáneamente. El tester explora el sistema guiado por un charter. Muy efectiva para encontrar bugs inesperados."}],"quiz":[{"q":"Un campo de edad acepta valores del 1 al 120. Usando Análisis de Valor Límite, ¿cuáles valores probarías?","opts":["Solo 1 y 120","0, 1, 2, 119, 120, 121","Cualquier valor entre 1 y 120","Solo valores inválidos como -1 y 200"],"correct":1,"explain":"AVL prueba en los bordes: mínimo-1 (0, inválido), mínimo (1, válido), mínimo+1 (2, válido), máximo-1 (119, válido), máximo (120, válido), máximo+1 (121, inválido). Los errores se concentran en los límites."},{"q":"¿Cuál es la diferencia clave entre Caja Negra y Caja Blanca?","opts":["Caja Negra es más cara","Caja Negra no conoce el código interno, Caja Blanca sí","Caja Blanca solo la usan los desarrolladores","No hay diferencia real entre ambas"],"correct":1,"explain":"Caja Negra evalúa el comportamiento externo sin conocer el código (entradas/salidas). Caja Blanca diseña pruebas basándose en el conocimiento de la estructura interna del código."},{"q":"¿Cuándo es especialmente útil la técnica de Tabla de Decisión?","opts":["Para probar rendimiento","Para verificar la lógica de negocio con múltiples condiciones combinadas","Solo para pruebas de base de datos","Para pruebas de interfaz de usuario"],"correct":1,"explain":"La Tabla de Decisión es ideal cuando hay múltiples condiciones de entrada que generan diferentes acciones. Garantiza que se prueben todas las combinaciones relevantes de condiciones."},{"q":"La 'Cobertura de Decisiones' es preferida sobre la 'Cobertura de Sentencias' porque:","opts":["Es más rápida de calcular","Garantiza que se ejecutan todos los caminos true/false de cada condición","Es más barata de implementar","Solo requiere caja negra"],"correct":1,"explain":"La cobertura de sentencias solo verifica que una instrucción se ejecuta, pero no verifica todos sus resultados posibles. La cobertura de decisiones garantiza que cada condición se evalúa como verdadera Y como falsa."},{"q":"La prueba de REGRESIÓN pertenece a las pruebas:","opts":["Basadas en experiencia","Asociadas al cambio","De caja blanca únicamente","Exploratorias"],"correct":1,"explain":"La prueba de regresión es una prueba asociada al cambio: se ejecuta después de realizar modificaciones al sistema para verificar que los cambios no introdujeron nuevos defectos en partes previamente funcionales."}],"comparisons":[{"a":"Caja Negra","b":"Caja Blanca","texto":"Caja Negra:\n- NO conoce el código interno\n- Evalúa entradas, salidas y comportamiento\n- La ejecuta el tester sin conocimiento de programación\n- Técnicas: partición equivalencia, AVL, tabla de decisión, estados\n- Ventaja: objetivo, no sesgado por el código\n- Desventaja: puede no cubrir todas las rutas del código\n\nCaja Blanca:\n- SÍ conoce la estructura interna del código\n- Diseña casos para ejecutar rutas específicas\n- Requiere conocimiento de programación\n- Técnicas: cobertura de sentencias, decisiones, condiciones\n- Ventaja: cobertura completa del código\n- Desventaja: no detecta funcionalidad faltante"},{"a":"Prueba exploratoria","b":"Prueba basada en script","texto":"Prueba exploratoria:\n- Diseño y ejecución SIMULTÁNEOS\n- El tester decide qué probar mientras prueba\n- Guiada por un 'charter' (objetivo de sesión)\n- Muy efectiva para bugs inesperados\n- Requiere testers experimentados\n\nPrueba basada en script:\n- Diseño PREVIO a la ejecución\n- El tester sigue pasos predefinidos\n- Reproducible y auditable\n- Más lenta de diseñar\n- Mejor para pruebas de regresión y compliance"},{"a":"Prueba de confirmación","b":"Prueba de regresión","texto":"Prueba de confirmación (re-testing):\n- Verifica que UN DEFECTO ESPECÍFICO fue corregido\n- Se ejecuta solo el caso que detectó el defecto\n- Objetivo puntual y específico\n\nPrueba de regresión:\n- Verifica que los cambios NO introdujeron NUEVOS DEFECTOS\n- Se ejecuta un conjunto amplio de pruebas\n- Objetivo preventivo y amplio\n- Suele automatizarse\n\nRelación: después de corregir un bug se hace confirmación (¿se arregló?) y regresión (¿rompió algo más?)."}],"resumen":{"completo":"CAJA NEGRA (sin conocer el código):\n- Partición de Equivalencia: clases de entradas que se comportan igual\n- Análisis de Valor Límite (AVL): prueba en los bordes de las particiones\n- Tabla de Decisión: combinaciones de condiciones → acciones\n- Prueba de Transición de Estado: comportamiento según cambio de estado\n- Prueba de Caso de Uso: basada en flujos de usuario\n\nCAJA BLANCA (conociendo el código):\n- Cobertura de Sentencias: % de instrucciones ejecutadas\n- Cobertura de Decisiones/Ramas: todos los true/false de cada if\n- Cobertura de Condiciones: cada condición individual evaluada como T y F\n- Prueba de Flujo de Datos: seguimiento de variables\n\nCAJA GRIS: combinación de ambas. Conocimiento parcial del sistema.\n\nBASADA EN EXPERIENCIA:\n- Error Guessing: anticipar defectos basándose en experiencia\n- Prueba Exploratoria: diseño y ejecución simultáneos, con charter\n- Basada en Checklist: lista de comprobación predefinida\n\nASSOCIADAS AL CAMBIO:\n- Confirmación (re-testing): verifica que el bug fue corregido\n- Regresión: verifica que el cambio no rompió nada más","rapido":"- Caja Negra: partición equivalencia, AVL, tabla decisión, transición estados\n- Caja Blanca: cobertura sentencias, decisiones, condiciones\n- Caja Gris: combinación de ambas\n- Experiencia: error guessing, exploratoria (diseño+ejecución), checklist\n- Cambio: confirmación (¿se arregló?) + regresión (¿rompió algo?)","examen":"TEMAS MÁS PROBABLES:\n1. Diferencia Caja Negra vs Caja Blanca\n2. ¿Cómo aplica Análisis de Valor Límite? (con ejemplo)\n3. ¿Qué es la Partición de Equivalencia?\n4. Diferencia prueba de confirmación vs regresión\n5. ¿Qué es la prueba exploratoria?\n\nTRAMPAS FRECUENTES:\n- 'La Caja Blanca no requiere conocimiento de programación' → FALSO\n- 'La Cobertura de Sentencias es más completa que la de Decisiones' → FALSO\n- 'La prueba exploratoria no tiene estructura ni objetivos' → FALSO, tiene charter\n- 'La regresión prueba solo el defecto corregido' → FALSO (eso es confirmación)\n\nEJEMPLO AVL: campo 1-10 → probar: 0 (inválido), 1, 2, 9, 10, 11 (inválido)","esquema":"Unidad 7: Técnicas de Testing\n  ├── Caja Negra (sin código)\n  │     ├── Partición de Equivalencia\n  │     ├── Análisis de Valor Límite\n  │     ├── Tabla de Decisión\n  │     └── Transición de Estado\n  ├── Caja Blanca (con código)\n  │     ├── Cobertura de Sentencias\n  │     ├── Cobertura de Decisiones\n  │     └── Cobertura de Condiciones\n  ├── Caja Gris\n  ├── Basada en Experiencia\n  │     ├── Error Guessing\n  │     ├── Exploratoria (charter)\n  │     └── Checklist\n  └── Asociadas al Cambio\n        ├── Confirmación (re-testing)\n        └── Regresión"}},"8":{"title":"Testing Funcional/No Funcional","topics":"Code Review · Coverage · Bases de datos · Performance","flashcards":[{"q":"¿Qué es un Code Review?","a":"Discusión entre dos o más programadores sobre cambios en el código para evaluar su calidad. No reemplaza las pruebas, las complementa."},{"q":"¿Cuál es el objetivo principal del Code Review?","a":"Mejorar la calidad del código y crear una cultura de equipo donde todos los desarrolladores se sientan importantes y aprendan buenas prácticas."},{"q":"¿Qué es el Code Coverage (cobertura de código)?","a":"Porcentaje del código fuente que es ejecutado durante las pruebas. Indica qué tan bien cubierto está el código por los casos de prueba."},{"q":"¿Cuáles son los tipos de cobertura de código?","a":"Cobertura de líneas/sentencias, cobertura de ramas/decisiones, cobertura de condiciones, cobertura de funciones, cobertura de rutas."},{"q":"¿Por qué alta cobertura de código no garantiza ausencia de bugs?","a":"La cobertura solo mide que el código fue ejecutado, no que fue correctamente verificado. Se puede tener 100% de cobertura y aún tener casos de prueba que no verifican el comportamiento correcto."},{"q":"¿Qué son las propiedades ACID en bases de datos?","a":"Atomicidad (toda la transacción o nada), Consistencia (BD queda en estado válido), Isolación (transacciones independientes entre sí), Durabilidad (cambios confirmados son permanentes)."},{"q":"¿Cuál es la diferencia entre prueba de carga y prueba de estrés?","a":"Prueba de carga: verifica el comportamiento bajo la carga ESPERADA (normal). Prueba de estrés: verifica el comportamiento bajo carga EXTREMA (más allá de los límites esperados)."},{"q":"¿Qué es una prueba de resistencia (soak testing)?","a":"Verifica el comportamiento del sistema durante un período PROLONGADO de tiempo bajo carga normal. Detecta problemas como memory leaks y degradación gradual del rendimiento."},{"q":"¿Qué son las pruebas de spike (picos)?","a":"Verifican cómo responde el sistema ante picos REPENTINOS y extremos de carga, para luego volver a carga normal. Simula eventos inesperados de alto tráfico."},{"q":"¿Qué elementos se revisan en un Code Review?","a":"Funcionalidad (lógica correcta), rendimiento (eficiencia), seguridad (vulnerabilidades), legibilidad (código claro), mantenibilidad, pruebas unitarias y estándares del equipo."}],"quiz":[{"q":"¿Cuál de los siguientes NO es un principio del Code Review pragmático?","opts":["Revisar el código, no al autor","Los comentarios deben ser constructivos","Mezclar revisión de estilo con revisión funcional en el mismo comentario","El código es responsabilidad de todo el equipo"],"correct":2,"explain":"Mezclar revisión de estilo (formateo, nombres) con revisión funcional (lógica, bugs) en los mismos comentarios es un enfoque deficiente. Deben separarse para mantener claridad y no confundir al autor."},{"q":"Un videojuego online tiene una capacidad esperada de 1000 jugadores simultáneos. ¿Qué tipo de prueba verifica su comportamiento con exactamente 1000 jugadores?","opts":["Prueba de estrés","Prueba de carga","Prueba de resistencia","Prueba de spike"],"correct":1,"explain":"La prueba de carga verifica el comportamiento bajo la carga ESPERADA (1000 jugadores = carga esperada). La prueba de estrés iría más allá de esos 1000, probando 2000, 5000, etc."},{"q":"¿Qué significa la 'A' de ACID en bases de datos?","opts":["Autenticación","Atomicidad","Accesibilidad","Automatización"],"correct":1,"explain":"Atomicidad: una transacción se ejecuta completamente o no se ejecuta nada. Si falla cualquier parte de la transacción, todo se revierte. Ejemplo: en un juego, comprar un ítem debita el dinero Y agrega el ítem; si falla algo, ninguna parte se ejecuta."},{"q":"Tener el 100% de cobertura de código significa:","opts":["El software no tiene ningún defecto","Todo el código fue ejecutado durante las pruebas, pero no garantiza ausencia de bugs","Las pruebas son perfectas","No es necesario hacer más pruebas"],"correct":1,"explain":"La cobertura de código mide que el código fue EJECUTADO, no que fue correctamente VERIFICADO. Puedes tener 100% de cobertura y aún tener assertions incorrectos o casos extremos no verificados."},{"q":"¿Cuál es la diferencia entre prueba de resistencia (soak) y prueba de estrés?","opts":["No hay diferencia","La resistencia es durante tiempo prolongado a carga normal; el estrés es bajo carga extrema","La resistencia es más rápida","El estrés dura más tiempo"],"correct":1,"explain":"Soak/resistencia: carga normal durante mucho tiempo (detecta memory leaks, degradación). Estrés: carga extrema durante tiempo limitado (detecta el punto de quiebre del sistema)."}],"comparisons":[{"a":"Prueba de carga","b":"Prueba de estrés","texto":"Prueba de carga:\n- Verifica comportamiento bajo carga ESPERADA/NORMAL\n- Objetivo: validar que el sistema funciona correctamente en condiciones de uso esperadas\n- Ejemplo: 1000 jugadores simultáneos en peak hour\n- Responde: ¿funciona bien cuando se usa normalmente?\n\nPrueba de estrés:\n- Verifica comportamiento bajo carga EXTREMA (más allá del límite)\n- Objetivo: encontrar el punto de quiebre del sistema\n- Ejemplo: 10.000 jugadores cuando el máximo es 1000\n- Responde: ¿cómo falla cuando se supera el límite?"},{"a":"Code Review","b":"Testing funcional","texto":"Code Review:\n- Se realiza ANTES de la ejecución (estática)\n- Revisa la estructura y calidad del código\n- Detecta: bugs lógicos, code smells, vulnerabilidades de seguridad\n- Lo hacen los desarrolladores entre sí\n- No reemplaza las pruebas\n\nTesting funcional:\n- Se realiza DURANTE/DESPUÉS de la ejecución (dinámica)\n- Verifica que el sistema se comporta correctamente\n- Detecta: comportamiento incorrecto, bugs en ejecución\n- Lo hacen los testers/QA\n- Complementa el code review"},{"a":"Cobertura de sentencias","b":"Cobertura de decisiones","texto":"Cobertura de sentencias:\n- Verifica que cada INSTRUCCIÓN del código fue ejecutada\n- Más básica y fácil de alcanzar\n- Puede dejar caminos no probados\n- Ejemplo: if(x>0) puede ejecutarse solo con x=5\n\nCobertura de decisiones:\n- Verifica que cada PUNTO DE DECISIÓN fue evaluado como true Y false\n- Más completa y rigurosa\n- Garantiza cobertura de todos los ramas\n- Ejemplo: if(x>0) debe probarse con x=5 (true) Y x=-1 (false)\n- Incluye la cobertura de sentencias"}],"resumen":{"completo":"CODE REVIEW:\n- Discusión entre programadores sobre cambios en el código\n- Objetivo: mejorar calidad y crear cultura de equipo\n- Beneficios: detecta bugs temprano, mejora consistencia, facilita aprendizaje\n- Principios: revisar el código (no al autor), comentarios constructivos\n- NO reemplaza las pruebas\n\nCODE COVERAGE:\n- Mide % del código ejecutado durante pruebas\n- Tipos: sentencias, decisiones/ramas, condiciones, funciones, rutas\n- Alta cobertura ≠ ausencia de bugs\n\nBASES DE DATOS:\n- Pruebas de: integridad referencial, stored procedures, triggers, rendimiento\n- ACID: Atomicidad, Consistencia, Isolación, Durabilidad\n\nPERFORMANCE TESTING:\n- Carga: comportamiento bajo carga esperada\n- Estrés: comportamiento bajo carga extrema (punto de quiebre)\n- Resistencia/Soak: comportamiento durante tiempo prolongado\n- Spike/Picos: respuesta ante picos repentinos de carga","rapido":"- Code Review: revisión de código entre pares (estática, complementa pruebas)\n- Code Coverage: % código ejecutado; alta cobertura ≠ sin bugs\n- ACID: Atomicidad, Consistencia, Isolación, Durabilidad\n- Performance: carga (esperada), estrés (extrema), soak (prolongada), spike (picos)","examen":"TEMAS MÁS PROBABLES:\n1. Diferencia prueba de carga vs estrés vs resistencia\n2. ¿Qué significa ACID?\n3. ¿Por qué alta cobertura no garantiza ausencia de bugs?\n4. Objetivo y beneficios del Code Review\n5. Tipos de cobertura de código\n\nTRAMPAS FRECUENTES:\n- 'El Code Review reemplaza las pruebas funcionales' → FALSO, las complementa\n- '100% cobertura = software sin bugs' → FALSO\n- 'La prueba de carga va más allá de los límites del sistema' → FALSO (eso es estrés)\n- 'La A de ACID es Autenticación' → FALSO, es Atomicidad\n\nACID COMPLETO:\nA=Atomicidad, C=Consistencia, I=Isolación, D=Durabilidad","esquema":"Unidad 8: Testing Funcional/No Funcional\n  ├── Code Review\n  │     ├── Concepto y objetivo\n  │     ├── Beneficios\n  │     └── Principios pragmáticos\n  ├── Code Coverage\n  │     ├── Sentencias\n  │     ├── Decisiones/Ramas\n  │     └── Condiciones / Funciones\n  ├── Bases de Datos\n  │     ├── Tipos de prueba\n  │     └── ACID\n  └── Performance Testing\n        ├── Carga (esperada)\n        ├── Estrés (extrema)\n        ├── Resistencia/Soak (prolongada)\n        └── Spike (picos repentinos)"}},"9":{"title":"Mobile Testing","topics":"Nativas/Web/Híbridas · iOS/Android · Automatización · Responsividad","flashcards":[{"q":"¿Qué es el mobile testing?","a":"Proceso sistemático de evaluar la funcionalidad, usabilidad y rendimiento de una aplicación móvil en diferentes dispositivos, SO y condiciones de red."},{"q":"¿Cuáles son los 3 tipos de aplicaciones móviles?","a":"Nativas (desarrolladas para un SO específico, mejor rendimiento), Web/PWA (ejecutadas en navegador, multiplataforma), Híbridas (combinan nativo y web, balance entre ambas)."},{"q":"¿Qué herramientas s
