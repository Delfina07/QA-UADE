<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Videojuegos — App de Estudio UADE</title>
<style>
:root {
  --purple:#534AB7;--pd:#3C3489;--pl:#EEEDFE;--pll:#F5F4FF;
  --bg:#f8f7ff;--sur:#fff;--sur2:#f3f2fb;--bor:#e2e0f5;
  --tx:#1a1830;--tx2:#5c5880;--tx3:#9b98b8;
  --gbg:#EAF3DE;--gbd:#3B6D11;--gtx:#27500A;
  --rbg:#FCEBEB;--rbd:#A32D2D;--rtx:#501313;
  --r:10px;--rl:14px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0f0e1a;--sur:#1a1830;--sur2:#231f38;--bor:#2e2a4a;
  --tx:#e8e6f5;--tx2:#9b98b8;--tx3:#5c5880;--pl:#2a2650;--pll:#1e1c3a;
}}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}

/* ── HEADER ── */
header{background:var(--sur);border-bottom:1px solid var(--bor);padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:30;}
.logo{font-size:15px;font-weight:700;color:var(--purple);display:flex;align-items:center;gap:8px;}
.logo-sub{font-size:12px;font-weight:400;color:var(--tx3);}
.pdf-btn-wrap{display:flex;align-items:center;gap:8px;}
.pdf-badge{font-size:11px;padding:3px 10px;border-radius:999px;background:var(--gbg);color:var(--gbd);font-weight:600;display:none;}
.pdf-badge.show{display:inline-block;}
#pdfInput{display:none;}
.pdf-upload-btn{background:var(--sur2);border:1px solid var(--bor);border-radius:var(--r);padding:6px 12px;font-size:12px;color:var(--tx2);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .15s;}
.pdf-upload-btn:hover{border-color:var(--purple);color:var(--purple);}
.pdf-upload-btn.loaded{border-color:var(--gbd);color:var(--gbd);background:var(--gbg);}

/* ── UNIT SELECTOR BAR (top, always visible) ── */
.unit-bar{background:var(--sur);border-bottom:1px solid var(--bor);padding:0 1.25rem;overflow-x:auto;white-space:nowrap;display:flex;align-items:center;gap:4px;height:44px;position:sticky;top:52px;z-index:20;}
.unit-bar::-webkit-scrollbar{height:3px;}
.unit-bar::-webkit-scrollbar-thumb{background:var(--bor);border-radius:999px;}
.ubtab{background:transparent;border:none;border-radius:var(--r);padding:5px 12px;font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .12s;flex-shrink:0;}
.ubtab:hover{background:var(--sur2);color:var(--tx);}
.ubtab.active{background:var(--purple);color:#fff;}

/* ── MAIN ── */
.main{max-width:860px;margin:0 auto;padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:1rem;}

/* ── UNIT HEADER CARD ── */
.unit-hdr{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rl);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.unit-hdr-left{}
.unit-hdr-num{font-size:11px;font-weight:700;color:var(--purple);margin-bottom:3px;}
.unit-hdr-title{font-size:17px;font-weight:700;color:var(--tx);}
.unit-hdr-topics{font-size:12px;color:var(--tx3);margin-top:4px;}
.unit-nav{display:flex;gap:6px;}
.unit-nav button{background:var(--sur2);border:1px solid var(--bor);border-radius:var(--r);padding:6px 12px;font-size:12px;cursor:pointer;color:var(--tx2);font-family:inherit;}
.unit-nav button:hover:not(:disabled){border-color:var(--purple);color:var(--purple);}
.unit-nav button:disabled{opacity:.3;cursor:default;}

/* ── MODE TABS ── */
.tabs{display:flex;gap:6px;flex-wrap:wrap;}
.tab{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);padding:7px 15px;font-size:13px;color:var(--tx2);cursor:pointer;font-family:inherit;transition:all .12s;}
.tab:hover{border-color:var(--purple);color:var(--purple);}
.tab.active{background:var(--purple);border-color:var(--purple);color:#fff;font-weight:500;}

/* ── PANEL ── */
.panel{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rl);padding:1.5rem;min-height:160px;}
.ptitle{font-size:13px;font-weight:600;color:var(--purple);margin-bottom:1.125rem;}

/* ── ASK ── */
.ask-row{display:flex;gap:8px;margin-bottom:.875rem;}
.ask-row input{flex:1;font-size:14px;border:1px solid var(--bor);border-radius:var(--r);padding:9px 14px;background:var(--sur2);color:var(--tx);outline:none;font-family:inherit;}
.ask-row input:focus{border-color:var(--purple);background:var(--sur);}
.ask-row input::placeholder{color:var(--tx3);}
.qbts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem;}
.qbt{background:var(--sur2);border:1px solid var(--bor);border-radius:999px;padding:5px 13px;font-size:12px;color:var(--tx2);cursor:pointer;font-family:inherit;transition:all .12s;}
.qbt:hover{border-color:var(--purple);color:var(--purple);background:var(--pll);}

/* ── BUTTONS ── */
.btn{background:var(--purple);color:#fff;border:none;border-radius:var(--r);padding:9px 18px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;transition:background .12s;}
.btn:hover{background:var(--pd);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-s{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);padding:7px 14px;font-size:13px;cursor:pointer;color:var(--tx);font-family:inherit;transition:all .12s;}
.btn-s:hover:not(:disabled){border-color:var(--purple);color:var(--purple);}
.btn-s:disabled{opacity:.35;cursor:default;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;}

/* ── ANSWER ── */
.answer{font-size:14px;color:var(--tx);line-height:1.8;white-space:pre-wrap;}
.ans-ph{color:var(--tx3);font-size:14px;text-align:center;padding:2rem 0;}
.loading{color:var(--tx2);font-size:14px;display:flex;align-items:center;gap:10px;padding:.75rem 0;}
.spin{width:16px;height:16px;border:2px solid var(--bor);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.err{color:#c0392b;font-size:13px;}

/* ── FLASHCARDS ── */
.fc-wrap{display:flex;flex-direction:column;align-items:center;}
.fc-counter{font-size:12px;color:var(--tx3);margin-bottom:6px;}
.fc-prog{display:flex;gap:4px;margin-bottom:.75rem;flex-wrap:wrap;justify-content:center;}
.fc-dot{width:8px;height:8px;border-radius:50%;background:var(--bor);transition:background .2s;}
.fc-dot.done{background:var(--purple);}
.fc-dot.cur{background:var(--purple);box-shadow:0 0 0 2px var(--pl);}
.fc-card{width:100%;background:var(--sur2);border:1.5px solid var(--bor);border-radius:var(--rl);padding:2rem 1.5rem;min-height:130px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .15s,background .15s;margin-bottom:1rem;position:relative;}
.fc-card:hover{border-color:var(--purple);}
.fc-card p{font-size:15px;color:var(--tx);line-height:1.6;text-align:center;}
.fc-hint{position:absolute;bottom:10px;right:14px;font-size:11px;color:var(--tx3);}
.fc-card.ans{background:var(--pll);border-color:var(--purple);}
.fc-nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;}

/* ── QUIZ ── */
.score-row{display:flex;gap:10px;margin-bottom:1.25rem;}
.sc{background:var(--sur2);border-radius:var(--r);padding:10px 16px;text-align:center;flex:1;}
.sc .sv{font-size:22px;font-weight:700;color:var(--purple);}
.sc .sl{font-size:11px;color:var(--tx3);margin-top:2px;}
.quiz-q{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:1.25rem;line-height:1.55;}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;}
.qopt{background:var(--sur2);border:1px solid var(--bor);border-radius:var(--r);padding:11px 16px;font-size:14px;cursor:pointer;text-align:left;color:var(--tx);font-family:inherit;transition:border-color .12s;}
.qopt:hover:not(:disabled){border-color:var(--purple);}
.qopt.correct{background:var(--gbg);border-color:var(--gbd);color:var(--gtx);}
.qopt.wrong{background:var(--rbg);border-color:var(--rbd);color:var(--rtx);}
.qopt:disabled{cursor:default;}
.quiz-exp{font-size:13px;color:var(--tx2);line-height:1.65;padding:12px 14px;background:var(--sur2);border-radius:var(--r);margin-bottom:1rem;border-left:3px solid var(--purple);}

/* ── MAP ── */
.map-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;}
.map-card{background:var(--sur2);border:1px solid var(--bor);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .15s;}
.map-card:hover{border-color:var(--purple);background:var(--pll);}
.mc-num{font-size:10px;font-weight:700;color:var(--purple);margin-bottom:4px;}
.mc-title{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:6px;}
.mc-topics{font-size:11px;color:var(--tx3);line-height:1.5;}

/* ── COMPARE ── */
.divider{border:none;border-top:1px solid var(--bor);margin:1.25rem 0;}

/* ── PDF MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--sur);border-radius:var(--rl);padding:2rem;max-width:480px;width:90%;border:1px solid var(--bor);}
.modal h2{font-size:16px;font-weight:700;margin-bottom:.5rem;color:var(--tx);}
.modal p{font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:1.25rem;}
.drop-zone{border:2px dashed var(--bor);border-radius:var(--rl);padding:2.5rem;text-align:center;cursor:pointer;transition:border-color .15s;margin-bottom:1rem;}
.drop-zone:hover,.drop-zone.drag{border-color:var(--purple);background:var(--pll);}
.drop-zone p{font-size:14px;color:var(--tx3);}
.drop-zone strong{display:block;font-size:15px;color:var(--tx2);margin-bottom:6px;}
.progress-bar{width:100%;background:var(--sur2);border-radius:999px;height:6px;overflow:hidden;margin-bottom:.75rem;display:none;}
.progress-bar.show{display:block;}
.progress-fill{height:100%;background:var(--purple);border-radius:999px;transition:width .3s;}
.modal-status{font-size:13px;color:var(--tx2);text-align:center;min-height:20px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;}

@media(max-width:600px){
  .main{padding:1rem;}
  .unit-hdr{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>

<!-- PDF MODAL -->
<div class="modal-overlay" id="pdfModal">
  <div class="modal">
    <h2>📄 Cargar apunte PDF</h2>
    <p>Subí el PDF del apunte de clase para que la app use el contenido exacto. El texto se extrae directamente en tu navegador, sin subir el archivo a ningún servidor.</p>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('pdfFile').click()"
         ondragover="event.preventDefault();this.classList.add('drag')"
         ondragleave="this.classList.remove('drag')"
         ondrop="handleDrop(event)">
      <strong>Arrastrá el PDF acá</strong>
      <p>o hacé clic para seleccionar</p>
    </div>
    <input type="file" id="pdfFile" accept=".pdf" style="display:none" onchange="loadPDF(this.files[0])">
    <div class="progress-bar" id="pdfProgress"><div class="progress-fill" id="pdfFill" style="width:0%"></div></div>
    <div class="modal-status" id="pdfStatus"></div>
    <div class="modal-btns">
      <button class="btn-s" onclick="closePdfModal()">Cancelar</button>
    </div>
  </div>
</div>

<header>
  <div class="logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
    QA Videojuegos
    <span class="logo-sub">Apunte UADE</span>
  </div>
  <div class="pdf-btn-wrap">
    <span class="pdf-badge" id="pdfBadge">✓ PDF cargado</span>
    <button class="pdf-upload-btn" id="pdfUploadBtn" onclick="openPdfModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Cargar PDF
    </button>
  </div>
</header>

<!-- UNIT SELECTOR BAR -->
<nav class="unit-bar" id="unitBar"></nav>

<div class="main">
  <!-- UNIT HEADER -->
  <div class="unit-hdr" id="unitHdr"></div>

  <!-- MODE TABS -->
  <div class="tabs">
    <button class="tab active" onclick="setMode('preguntar')">💬 Preguntar</button>
    <button class="tab" onclick="setMode('resumen')">📄 Resumen</button>
    <button class="tab" onclick="setMode('flashcards')">🃏 Flashcards</button>
    <button class="tab" onclick="setMode('quiz')">🏆 Quiz</button>
    <button class="tab" onclick="setMode('comparar')">⚖️ Comparar</button>
    <button class="tab" onclick="setMode('mapa')">🗺 Mapa</button>
  </div>

  <!-- PANEL -->
  <div class="panel" id="panel"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
// ── UNIT CONTENT (from apunte) ──────────────────────────────────
const UNIT_CONTENT = {
  1: `UNIDAD N°1: INTRODUCCIÓN A LA CALIDAD Contenido: ISTQB ∙ Definición del testing y su uso ∙ Quality Assurance y Quality Control ∙ Origen del rol ∙ Responsabilidades de un tester ∙ Funciones de un tester ∙ Principios del Testing. ¿Qué es ISTQB? “International Software Testing Qualifications Board” es una organización internacional – Edimburgo – basada en el trabajo voluntario de expertos en pruebas de software a nivel mundial. Definición del testing y su uso El software testing es la actividad de probar un software para verificar el funcionamiento y encontrar errores que incluye muchas actividades diferentes, la ejecución de pruebas es sólo una de las actividades. Existen varias técnicas de prueba manual que ayudan a reducir el número de casos de prueba que se ejecutarán al tiempo que aumentan la cobertura de prueba. Ayudan a identificar condiciones de prueba que de otro modo serían difíciles de reconocer. Existen profesionales que se dedican expresamente a realizar software testing. Su trabajo consiste en poner a prueba cada software para entregar un informe a las partes interesadas, con detalles como: si el software cumple con los requisitos y el diseño acordados, si la aplicación funciona como se esperaba, si la aplicación no contiene errores graves y si cumple con el uso previsto según las expectativas del usuario. El software testing es una metodología de desarrollo de software que se basa en la investigación de un modelo para entregar un informe sobre la calidad del mismo a las partes interesadas. De esa manera, se garantiza que el software cumpla con los requisitos, que no contiene errores graves y que todo funciona como se esperaba. Veamos en detalle qué es un software testing, sus tipos y técnicas a continuación. El testing de software consiste en la verificación dinámica del comportamiento de un programa sobre un conjunto finito de casos de prueba, apropiadamente seleccionados a partir del dominio de ejecución que usualmente es infinito, en relación con el comportamiento esperado. Las palabras “dinámica”, “finito”, “seleccionado” y “esperado” corresponden a las características fundamentales del testing. Es una técnica dinámica en el sentido de que el programa se verifica poniéndolo en ejecución de la forma más parecida posible a como ejecutará cuando esté en producción – esto se contrapone a las técnicas estáticas las cuales se basan en analizar el código fuente. Es finito ya que el programa se prueba ejecutando solo unos pocos casos de prueba dado que por lo general es física, económica o técnicamente imposible ejecutarlo para todos los valores de entrada posibles. Esos casos de prueba son elegidos siguiendo alguna regla o criterio de selección. Se determina si un caso de prueba ha detectado un error o no comparando la salida producida con la salida esperada para la entrada correspondiente –la salida esperada debería estar documentada en la especificación del programa. 8 Testear un programa significa ejecutarlo bajo condiciones controladas tales que permitan observar su salida o resultados. El testing se estructura en casos de prueba; los casos de prueba se reúnen en conjuntos de prueba. Desde el punto de vista del testing se ve a un programa (o subrutina) como una función que va del producto cartesiano de sus entradas en el producto cartesiano de sus salidas De acuerdo a la definición clásica de corrección, un programa es correcto si verifica su especificación. Entonces, al considerarse como técnica de verificación el testing, un programa es correcto si ninguno de los casos de prueba seleccionados detecta un error. Una falla es el síntoma manifiesto de la presencia de un error. Es decir que un error permanecerá oculto hasta que ocurra una falla causada por aquel. En este sentido el testing trata de incrementar la probabilidad de que los errores en un programa causen fallas, al seleccionar casos de prueba apropiados. Finalmente, una falta es un estado intermedio incorrecto al cual se llega durante la ejecución de un programa –por ejemplo, se invoca a una subrutina cuando se debería haber invocado a otra, o se asigna un valor a una variable cuando se debería haber asignado otro. Contribuciones de la prueba al éxito A lo largo de la historia informática es bastante común que el software y los sistemas se entreguen a operaciones, y debido a la presencia de defectos que posteriormente causen fallos, no satisfagan las necesidades de los implicados en consecuencia. Sin embargo, la utilización de técnicas de prueba adecuadas puede reducir la frecuencia de estas entregas problemáticas, cuando estas técnicas se aplican con el nivel adecuado de experiencia en materia de prueba, en los niveles de prueba adecuados y en los puntos adecuados del ciclo de vida del desarrollo del software (para mayor información véase apartado 1.2.1 de “Probador Certificado ISTQB”). Objetivos de las pruebas de calidad El objetivo principal de las pruebas de software es eliminar posibles errores y mejorar la calidad en diversos aspectos como son el rendimiento, la experiencia de usuario y la seguridad. Antes de comenzar cualquier prueba se debe establecer una serie de pautas o principios para asegurarnos que el resultado se ajusta a los objetivos principales:  Todos los casos de prueba deben prepararse basándose en los requisitos del cliente; de lo contrario se estarán probando los requisitos equivocados. Cada característica o función del sistema debe probarse con uno o varios casos de prueba.  Algunos de los tipos de prueba de software, como las de rendimiento y las de aceptación, deben realizarlas expertos (personal de QA o desarrolladores Sr.)  Planificación en primer lugar de las funcionalidades básicas y luego se amplían estas pruebas para funcionalidades avanzadas.  Se recomienda comenzar con las pruebas en fases tempranas del proyecto ya que el impacto es menor que cuando se está en fases más avanzadas.  No es recomendable repetir los mismos casos de prueba una y otra vez porque, después de cierto tiempo, no se encontrarán problemas nuevos; la mejor práctica es ajustar los casos de prueba con el objetivo de encontrar nuevos errores. La ley de Pareto aplicada al testing dice que el 80% de los errores son causados por el 20% de las características del sistema: durante las pruebas una gran cantidad de errores estará asociada a una cantidad pequeña de funcionalidades.  9  Las pruebas dependen del contexto, lo que implica que las pruebas y metodologías a aplicar deben estar basadas en el contexto del sistema que se va a probar. Elementos de la prueba de calidad Para cualquier proyecto, los objetivos de prueba pueden incluir:  Evaluar productos de trabajo como requisitos, historias de usuario, diseño y código.  Verificar el cumplimiento de todas las especificaciones técnicas.  Verificar si el objeto de prueba está completo y funciona como es esperado.  Generar confianza en el nivel de calidad del objeto de prueba.  Prevenir defectos.  Encontrar fallos y defectos.  Proporcionar información para la toma de decisiones.  Reducir el nivel de riesgo de calidad inadecuada.  Cumplir con requisitos contractuales y normas vigentes. Los objetivos de la prueba pueden variar dependiendo del contexto que se está probando y su nivel de prueba. Estas diferencias pueden incluir:  Durante la prueba de componente: Encontrar tantas fallas como sean posibles para identificar defectos subyacentes.  Durante la prueba de aceptación: Confirmar que el sistema funciona como se espera y que cumple con los requisitos. Quality Assurance y Quality Control En español sería “Garantía de calidad” (QA) y “Control de Calidad” (QC). Es un término relativamente nuevo en el software y las personas tienden a confundirlos; si bien los nombres son muy parecidos, se refieren a partes del proceso muy diferenciadas. QA Se diseñan y definen los parámetros de aceptación de un software. Es un sistema de prevención de fallos y se generan medidas correctivas para evitar salidas a producción. Los QA son cada miembro del equipo involucrado en el desarrollo del producto, desde el desarrollador, pasando por los managers y clientes. Presente desde la fase 0, por eso son los desarrolladores quienes inician la “mecha” del QA. QA está orientado en el proceso. QA se diseña y ejecuta antes de terminar el producto. Se ejecuta todo el white-box testing, desde los Unit Test hasta los Acceptance Test. QC Se controla el comportamiento final del producto. Es un sistema de corrección de fallos e introducción de mejoras. El departamento de QC trabaja junto a QA, siendo un equipo totalmente independiente. QC entra en el terreno de juego cuando el producto está finalizado. QC está orientado al producto. QC se ejecuta durante la puesta a producción. Pruebas no funcionales: performance, stress, pruebas realizadas por humanos; es decir, black-box testing. 10 Los técnicos de QC sólo necesitan saber cómo funciona el producto o, mejor dicho, cómo debería funcionar el producto y están orientados al cliente. Por ello es que se dice que un buen candidato a QA es un desarrollador senior, pero si son personas especializadas dentro del equipo de desarrollo su tarea será completar pruebas que los desarrolladores no han podido completar por falta de tiempo o debido a que el número de test es suficiente pero no necesario. Qué son exactamente QA y QC La Norma ISO 9000, define:  Cláusula 3.2.10: El control de calidad es una parte de la gestión de calidad enfocada a cumplir con los requisitos de calidad.  Cláusula 3.2.11: La garantía de calidad es una parte de la gestión de calidad centrada en proporcionar confianza en que se cumplirán los requisitos de calidad. La clave del éxito en un proyecto es aplicar ambos. Si solo se tiene QA, se tendrá solamente un conjunto de procesos que pueden aplicarse para garantizar un grado de calidad en nuestra solución.`,
  2: `UNIDAD N°2: PRUEBAS ESTÁTICAS Contenido: Concepto ∙ Productos de trabajo ∙ Proceso de revisión. Concepto A diferencia de las pruebas dinámicas, estas no requieren de la ejecución de software para ser realizadas. Parte del objetivo de las pruebas estáticas es la revisión de productos de trabajo como documentos de requerimientos, casos de prueba, planes de prueba, código, guías de usuario. Este tipo de pruebas se enfoca en la prevención de defectos y en la detección temprana de dichos defectos, ya que se pueden efectuar en cualquier etapa del ciclo de vida del software, dependiendo de la información que se tenga disponible. El objetivo de las pruebas estáticas es verificar la calidad y estabilidad del código antes de pasar a las pruebas dinámicas. 17 Para el análisis estático hay muchas herramientas, y la mayoría de ellas se centran en el código del software, suelen ser utilizadas por los desarrolladores antes y durante las pruebas de componente e integración; y por los diseñadores durante el modelado de software. Las herramientas de análisis estático muestran:  Profundidad de anidamiento.  Complejidad ciclomática: Número de caminos independientes que pueden ocurrir en la ejecución, entre el inicio y el fin del software.  Estándares de codificación.  Flujos de control.  Relaciones de datos.  Número de rutas entre líneas de código. El análisis estático es de vital importancia para softwares de seguridad crítica, como ser: sistemas aeronáuticos, médicos, nucleares y bancarios. Un análisis estático es aplicable mediante herramientas que evalúan los productos de trabajo escritos en lenguaje natural (ej.: un corrector ortográfico). Algunas de las herramientas más comunes en el análisis estático son la revisión de estándares de código, la revisión de las métricas y de la estructura de código. Los estándares de código hacen referencia a las formas de escribir el código dentro de un marco de lenguaje común a todos los desarrolladores. Las métricas proporcionan información sobre la cantidad de líneas de código, frecuencia de comentarios, complejidad de anidamiento en las estructuras de control (condicionales o estructuras repetitivas). Esto se realiza tanto para un sistema nuevo como para tareas de mantenimiento ya que permite entender si el sistema está creciendo en tamaño, complejidad o ambos. Respecto a la estructura de código, existen diferentes mediciones relacionadas al código que indican qué tan complejo fue escribirlo, comprenderlo para modificarlo a futuro o probarlo.  Flujo de control: Muestra el orden en que las instrucciones son ejecutadas. Mediante este tipo de análisis se pueden ubicar defectos relacionados con secciones del código muerto o inalcanzable.  Flujo de datos: Permite analiza cómo mutan valores a lo largo de la vida de la aplicación, como se acceden y se alteran a través del código las distintas variables; esto permite ubicar defectos relacionados a variables con valores indefinidos y variables que nunca se usan.  Estructura de datos: Muestra cómo se organizan los datos en sí mismos; no suele tener relación con la estructura del código o con el flujo de control. Una vez identificados los mecanismos para administrar los datos (colas, pilas, listas o estructuras más complejas), se puede identificar la complejidad de los algoritmos necesarios para lidiar con esas estructuras a nivel de programación, y así establecer su complejidad para probarlas. Ventajas de una prueba estática La mayoría de los productos de software pueden ser evaluados por las pruebas estáticas (revisiones), como por ejemplo las especificaciones de requerimientos del software (funcionales, no funcionales), historias de usuario, criterios de aceptación, especificaciones de 18 diseño del software o el código. En resumen, se puede revisar cualquier producto de trabajo que los interesados puedan leer y comprender para poder encontrar defectos. Las ventajas de las pruebas estáticas son muy variadas, pero se puede destacar que no solo el costo del desarrollo y las pruebas va a ser menor, también el costo de todo el proceso de calidad del producto durante toda la vida útil, ya que se reduce la frecuencia de los fallos en momentos posteriores a la entrada en producción, pero una ventaja que también es muy importante y aunque suene simple permite encontrar defectos que no se pueden identificar fácilmente con las pruebas dinámicas.  Detección precoz de defectos: Detectar los defectos lo antes posible ahorra tiempo y dinero. De hecho, cuando los errores de diseño, requisitos o codificación se dejan sin comprobar, se propagan a etapas posteriores del SDLC y pueden llegar a ser muy incómodos y caros de eliminar. Las pruebas estáticas ayudan a los equipos a detectar errores en una fase temprana y evitar nuevos defectos.  Reducción del tiempo y coste de las pruebas: Las pruebas estáticas ayudan a reducir el tiempo y los costes de las pruebas. Al tener lugar antes de las pruebas dinámicas, los problemas pueden descubrirse pronto, lo que reduce el tiempo y el dinero que conlleva la reelaboración.  Mejora de la calidad del código: Consiste en realizar revisiones del código. Al centrarse en las normas y las mejores prácticas - no sólo en el rendimiento funcional -, el código se vuelve más ágil, más inteligible y mucho más fácil de mantener. Este enfoque fomenta un código coherente y bien estructurado, mucho más fácil de modificar y editar en el futuro.  Mejor comunicación: Las pruebas estáticas consisten en organizar revisiones y debates para garantizar que el software está a un buen nivel. En estas reuniones participan probadores, desarrolladores y partes interesadas, y son una oportunidad para compartir conocimientos e información, lo que conduce a un equipo mejor informado.  Desarrollo más rápido: Dado que las pruebas estáticas promueven un enfoque más proactivo tanto para la detección de defectos como para su corrección, los equipos pueden ahorrar un tiempo valioso en la resolución de problemas, la reelaboración y las pruebas de regresión. Puede dedicar este tiempo ahorrado a otras tareas, como el desarrollo de nuevas características y funciones. Desventajas de una prueba estática  Inversión de tiempo: Cuando se realizan correctamente, las pruebas estáticas pueden ahorrar mucho tiempo a los equipos. Sin embargo, requiere una inversión de tiempo, que puede ser especialmente onerosa cuando se hace manualmente para construcciones de software complejas.  Organización: Las pruebas estáticas son profundamente colaborativas. Programar este tipo de pruebas requiere mucha coordinación, lo que puede resultar una tarea ardua para equipos dispersos por todo el mundo y trabajadores muy ocupados.  Alcance limitado: Hay un límite claro al número de defectos que se pueden detectar mediante revisiones del código. Las pruebas estáticas se centran principalmente en el código y la documentación, por lo que no descubrirán todos los errores que existen en la aplicación. Además, no puede tener en cuenta factores externos, como 19 dependencias externas, problemas del entorno o comportamientos inesperados de los usuarios.  Dependencia de la intervención humana: Las pruebas estáticas manuales dependen en gran medida de las habilidades y la experiencia de los probadores humanos. A menos que el revisor humano tenga los conocimientos adecuados, puede pasar por alto fácilmente defectos y errores, lo que mitiga algunos de los beneficios de las pruebas estáticas. la experiencia y las habilidades,  Calidad de la herramienta de análisis estático: La calidad de las herramientas de pruebas estáticas es desigual. Algunos son muy buenos, mientras que otros generan falsos positivos y negativos, lo que significa que es necesaria la intervención humana para interpretar los resultados. ¿En qué se diferencian con las pruebas dinámicas? Las pruebas dinámicas y estáticas pueden tener el mismo objetivo donde la meta es asegurar la calidad del producto; si bien cada uno de estos tipos de prueba tiene un momento de aplicación diferente, no se trata de tipos de prueba contrarios sino complementarios. Mientras que la prueba estática se utiliza para mejorar la consistencia y calidad interna de los productos de trabajo, la prueba dinámica se centra en los comportamientos visibles desde el exterior. Una de las principales diferencias es que la prueba estática detecta defectos directamente, en lugar de identificar fallos causados por defectos. Mientras que para sacar a la luz un defecto mediante pruebas dinámicas puede implicar un proceso complejo para desarrollar aquella prueba que lo provoque, la prueba estática puede ser capaz de encontrarlo con un esfuerzo mucho menor. PRUEBAS DINÁMICAS En ejecución: Se realizan mientras el código se ejecuta. Detección: Se enfocan en encontrar defectos. Pruebas tardías: Se realizan cuando el código se lleva a un entorno de pruebas. Técnicas: Funcionales y no funcionales. PRUEBAS ESTÁTICAS No ejecución: Se realizan sobre productos de trabajo. Prevención: Se enfocan en evitar defectos. Pruebas tempranas: Se pueden desarrollar desde las primeras etapas del ciclo de vida. Técnicas: Revisión técnica, inspección, revisión de código. Defectos típicos en las pruebas estáticas Hay ciertos defectos comunes dentro del desarrollo de un software que son mucho más fáciles y económicos de detectar y corregir a través de este tipo de pruebas. A saber:  Defectos en los requisitos en términos de inconsistencia o redundancia, entre otras cosas.  Defectos de diseño como algoritmos y estructuras de bases de datos ineficientes; alto acoplamiento o baja cohesión. o Acoplamiento: Se refiere al grado de interdependencia entre los módulos de software. o Cohesión: Se refiere al grado en que los elementos de un módulo colaboran para cumplir un propósito único y bien definido. 20  Defectos de codificación que pueden incluir variables mal consideradas o no consideraras.`,
  3: `UNIDAD N°3: PROCESO DE PRUEBAS Contenido: Proceso de prueba en contexto ∙ Trazabilidad ∙ Psicología del proceso de prueba ∙ Reporte de resultados ∙ Producción ∙ Monitoreo. Proceso de prueba de contexto Antes de iniciar, se debe tomar en cuenta que no existe un proceso de pruebas único que se pueda ajustar a todos los proyectos, pero existen algunas actividades de pruebas que se pueden considerar como comunes en la mayoría de los procesos de pruebas. El proceso de prueba adecuado y específico, en cualquier situación, depende de muchos factores. Concepto de proceso de pruebas Un proceso de pruebas es un conjunto de actividades co-dependientes que permiten que las pruebas puedan ser llevadas a cabo de manera ordenada, coherente y eficaz. 26 Puesta en contexto del proceso de pruebas Los factores de contexto que influyen en el proceso de prueba incluyen los siguientes tópicos, aunque no son limitantes.  El modelo de ciclo de vida de desarrollo de software y metodologías del proyecto.  Niveles y tipos de prueba considerados.  Riesgos del proyecto y del producto.  Dominio del negocio.  Restricciones operativas: Presupuesto, recursos, plazos, complejidad, requisitos contractuales y normativos.  Políticas, procedimientos, estándares y prácticas influyentes en la organización: El testing no se limita a la simple ejecución de pruebas y la verificación de resultados, sino que involucra una serie de actividades complementarias y críticas para garantizar la calidad del software y reducir el riesgo de fallos en su funcionamiento. Además, el testing puede realizarse en diferentes etapas del ciclo de vida del software y su importancia varía según el contexto y los requisitos del proyecto. Prueba basada en el contexto Las pruebas basadas en el contexto se basan en que la parte humana es lo más importante. Recomienda a los testers que elijan sus técnicas de prueba, pruebas de entregables, documentación y objetivos, observando los detalles de una situación específica. Este método es muy útil cuando los programadores no cuentan con la documentación. Para llevar a cabo con éxito este tipo de pruebas, los desarrolladores de software deben identificar el mercado deseado y evaluar el entorno en el que es probable que las personas usen el producto. La prueba basada en el contexto no es una técnica, es un conjunto de valores dentro de una metodología. Tester basado en el contexto Según James Bach “Ser un tester basado en contexto es acercarse a cada situación de prueba como si fuera única en aspectos importantes, y desarrollar las habilidades para reaccionar ante situaciones con una conciencia amplia y profunda de los problemas en los proyectos y posibles soluciones relacionadas a esos problemas”. La idea de este método es que las pruebas de software deben adaptarse a la naturaleza del proyecto, su contexto, y no deben depender de la simple aplicación de buenas prácticas. Principios básicos del contexto  El valor de cualquier práctica depende de su contexto.  Hay buenas prácticas en contexto, pero no existen las mejores prácticas.  Las personas, trabajando juntas, son la parte más importante del contexto de cualquier proyecto. Los proyectos se desarrollan con el tiempo de maneras que a menudo no son predecibles.   El producto es una solución. Si el problema no se resuelve, el producto no funciona. 27  Una buena prueba de software es un proceso intelectual desafiante.  Solo a través del juicio y la habilidad, ejercidos de forma cooperativa a lo largo de todo el proyecto, se pueden hacer las cosas correctas en los momentos adecuados para probar los productos de manera efectiva. Razones para utilizar pruebas basadas en el contexto  Pueden controlar los principales desafíos de la planificación de pruebas.  Ayuda a aclarar la misión.  El producto es analizado.  Analiza el riesgo del producto.  Diseña la estrategia de prueba.  Tiene un plan logístico.  Los planes son compartidos con los demás. Trazabilidad Introducción La trazabilidad software es una antigua buena práctica, recomendada para medianos o grandes desarrollos software, que trata sobre cómo enlazar o relacionar los requisitos con otros elementos del ciclo de vida, principalmente, casos de prueba y código. En la Ingeniería de Software, se ha definido trazabilidad como la capacidad de establecer relaciones entre dos o más artefactos de un sistema dentro de un proceso de desarrollo. La trazabilidad es considerada como una medida de madurez del proceso de desarrollo por varios estándares, algunos de ellos derivados de la metodología “en cascada” donde era necesario mostrar que el producto final se correspondía con los requerimientos. La trazabilidad proporciona varios beneficios importantes que hacen que valga la pena el esfuerzo adicional. Al proporcionar un registro completo y confiable de todas las actividades pasadas, ayuda a investigar y resolver problemas durante eventos como retiros del mercado, lo que permite a las partes interesadas localizar el origen del problema. Los datos generados por la trazabilidad se pueden utilizar para mejorar los procesos críticos de negocio y abordar los problemas de rendimiento relacionados con los plazos de entrega, los costes de transporte y la gestión de inventarios, entre otras cosas. Características Dentro de las principales características de la trazabilidad de software se encuentra que ofrece un registro fiable y muy completo en relación con los eventos y acciones ocurridas en el sistema, lo que, a su vez, contribuye en la identificación del origen de fallos y facilita su resolución. De manera que, los procesos de trazabilidad información recolectada de de software, puede implementarse para optimizar labores críticas en los sistemas, como los relacionados con el rendimiento, la entrega y otras cuestiones. la 28 Otra de las características de la trazabilidad de software es que proporciona una visibilidad mayor con respecto a los requisitos del ciclo de desarrollo o del sistema, lo que permite comprobar más fácilmente si estos se cumplen o no. De igual forma, la trazabilidad en ingeniería de software incluye la capacidad de describir y realizar un seguimiento del ciclo de vida del desarrollo, desde su creación hasta su despliegue y ejecución. Beneficios  Facilita el análisis de impacto.  Ayuda a hacer los cambios correctamente. Por lo tanto, mejora la calidad del producto. o Se conocerán qué requisitos de usuarios pueden verse afectados al realizar los cambios requeridos.  Ayuda a definir los enlaces de trazabilidad de manera que también registra el conocimiento de ingeniería inversa.  En caso de que un miembro del equipo con conocimientos vitales abandone la empresa, tener una transparencia informativa completa ayuda mucho. Reduce en gran medida el riesgo de un revelado incorrecto.  Confirma una cobertura de prueba del 100 % a través de un proceso de verificación adecuado. Elementos clave de la trazabilidad La trazabilidad en el desarrollo de software es esencial para comprender cómo los diferentes elementos del sistema están interconectados y cómo los cambios en un área específica pueden afectar a otras partes del sistema. A través de la trazabilidad, los equipos de desarrollo pueden gestionar y mantener la coherencia y la integridad del software a lo largo del tiempo. Los elementos clave en la trazabilidad de software suelen incluir: • Requisitos: Seguimiento de los requisitos del sistema desde su concepción hasta su implementación. • Diseño: Vínculos entre los requisitos y el diseño de software que los satisface. • Código fuente: Relación entre el diseño y la implementación real del código fuente. • Pruebas: Asociación entre los requisitos y los casos de prueba utilizados para validar el software. • Documentación: Enlaces entre la documentación del sistema y los elementos correspondientes en el código o los requisitos. Tipos de trazabilidad Trazabilidad directa Es la trazabilidad desde los requisitos hasta los casos de prueba. Se realiza para garantizar que el proyecto avance en la dirección correcta y que todos y cada uno de los requisitos se prueben correctamente. 29 Trazabilidad hacia atrás La trazabilidad hacia atrás es la trazabilidad desde los casos de prueba hasta los requisitos. Se realiza para garantizar que el proyecto se mueva en la dirección deseada y que no se agreguen características adicionales o no especificadas al producto. Trazabilidad bidireccional La trazabilidad bidireccional es la trazabilidad tanto hacia adelante como hacia atrás. Aquí, los casos de prueba se asignan a los requisitos y viceversa. Se realiza para garantizar que todos los casos de prueba sean rastreables para cada requisito, que todos los requisitos especificados sean precisos y que haya casos de prueba válidos para cada uno de ellos. Cómo aplicar la trazabilidad Texto libre Cuando se tiene un conjunto de requisitos, al final, se puede simplemente agregar una pequeña sección para agregar un conjunto de nombres o códigos que pueden ayudar a relacionarse con el particular. Si bien esto sigue siendo una opción, puede salirse de control bastante rápido si deben administrarse más de unos pocos requisitos. También hace que el proceso de análisis de impacto sea casi imposible. Tabla de trazabilidad Se puede crear una tabla que contenga todos los datos de todos los requisitos. Se puede representar cada requisito con un número de identificación único y agregar los datos en consecuencia. Pero esto puede ser difícil de mantener a largo plazo, ya que la cantidad de datos solo aumentará. Matrices de trazabilidad Las matrices son una forma de tablas que se utilizan para determinar la integridad de la relación entre dos documentos de línea base utilizando muchas comparaciones y visualizando la matriz de trazabilidad. Aunque es un poco difícil cuando cientos de elementos están involucrados en el proceso.`,
  4: `UNIDAD N°4: CASOS DE PRUEBA Contenido: Introducción ∙ Análisis de documentación ∙ Tipos de documentos ∙ Plan de pruebas ∙ Casos de uso. Introducción Concepto Los casos de prueba son los escenarios que se utilizan para medir la funcionalidad de la aplicación a través de un conjunto de ciertas acciones o condiciones para verificar los resultados esperados. En otras palabras, es una secuencia de ejecución detallada que ayuda a validar paso a paso una funcionalidad o un requerimiento sobre un sistema, y permite comprobar si el resultado obtenido coincide con el resultado esperado. En el caso de no coincidir, esta secuencia de pasos ayuda a encontrar el error y corregirlo. Objetivo La finalidad de los casos de prueba no sólo es poder diseñarlos, sino poder crear casos de pruebas automáticos. Para cubrir el software más a fondo y con más detalle, debe crearse al menos un caso de prueba por cada requisito definido y tener en cuenta, todos los elementos de diseño, el uso de todo tipo de datos de entrada/salida y cada comportamiento esperado. Elementos que componen el caso de prueba Un caso de prueba consta de varias cosas, como pasos de prueba, datos de prueba y condiciones previas y posteriores desarrolladas para un escenario de prueba particular. Los casos de prueba se pueden aplicar a cualquier aplicación de software. Se puede hacer a través de pruebas manuales y automatizadas o cualquier herramienta de gestión de pruebas. Un caso de prueba (TC) consta de:  Nombre del TC.  Descripción general del TC.  El paso a paso de la ejecución, que incluye una descripción detallada del paso y el resultado esperado de cada uno de ellos. Además, un caso de prueba puede tener:  Pre-condiciones: Condiciones que deben cumplirse para poder ejecutar el TC.  Datos: Conjunto de datos necesarios para poder ejecutar el TC en la aplicación o el sistema bajo prueba (SUT). Características de un buen caso de prueba 1. Solo prueba una cosa en un caso de prueba: Entre más atómico sea el caso de prueba, mejor será su legibilidad y la corrección del error si este llega a detectarse. 43 2. El caso de prueba debe tener un propósito exacto: El caso de prueba deber ser preciso, y debe testear algo exacto. 3. El caso de prueba debe estar escrito en un lenguaje claro y fácil de entender: En el mundo de la automatización de pruebas de software, existe un lenguaje llamado “Gherkin”. Es un lenguaje comprensible por humanos y por ordenadores, con el que se describen las funcionalidades, definiendo el comportamiento del software, sin entrar en su implementación. Se trata de un lenguaje fácil de leer, fácil de entender y fácil de escribir. Es un lenguaje de los que Martin Fowler llama 'Business Readable DSL', es decir, 'Lenguaje Específico de Dominio legible por Negocio'. 4. El caso de prueba debe ser relativamente pequeño: Es indispensable que el caso de prueba sea relativamente pequeño y que sus pasos sean atómicos. Si el caso de prueba es largo, entonces es probable que se esté tratando de probar demasiado. En ese caso, debe dividirse en múltiples casos de prueba. Los casos de prueba largos se vuelven demasiado complicados y eso a su vez conduce a errores en la definición, implementación o ejecución. 5. El caso de prueba debe ser independiente: Los casos de prueba deben ser independientes de los demás, cada caso debe ser autosuficiente y parametrizar todo lo que necesita para ejecutarse. El hecho de que sea independiente también le permite al probador o desarrollador usar el caso de prueba para volver a realizar la prueba según sea necesario y probar un subconjunto de pruebas mientras espera que algún componente se complete o repare. 6. El caso de prueba no debe tener pasos o palabras innecesarias: Al leerse un caso de prueba no deben generarse confusiones, es por este motivo que debe tener las palabras necesarias y precisas. 7. El caso de prueba debe ser repetible: Esto permite ejecutar pruebas de regresión, repeticiones de correcciones e integración continua donde las pruebas se ejecutan cada vez que el código modificado se integra en el producto. 8. El caso de prueba debe usar terminología consistente e identificación de funcionalidad: Esta regla va junto con una definición clara. Al nombrar o identificar una característica o funcionalidad, debe haber la misma terminología coherente dentro del caso de prueba y en todos los casos de prueba. Entonces, por ejemplo, si los casos de prueba describen las pruebas para la página de inicio de sesión para una clase universitaria, no deberían tener "usuario", "persona" y "estudiante" para referirse a la misma identidad. Uno de estos debe seleccionarse y usarse de manera consistente. Tipos de casos de prueba Caso de prueba de funcionalidad Se utilizan para analizar si el sistema está funcionando como se esperaba o no. El equipo de control de calidad es responsable de escribir los casos de prueba funcionales. Este tipo de prueba se puede realizar tan pronto como el equipo de desarrollo haga que la primera función de la aplicación esté disponible para la prueba. Por ejemplo, verificar si el usuario puede subir una foto de perfil. 44 Caso de prueba de integración Se utilizan para analizar si los diferentes módulos de la aplicación interactúan entre sí correctamente o no. El equipo de pruebas es responsable de separar las áreas que deben someterse a pruebas de integración. Por otro lado, el equipo de desarrollo ayuda a escribir los casos de prueba de integración. Por ejemplo, verificar si la página de inicio de sesión aparece cuando hacemos clic en el botón 'iniciar sesión' en la página de inicio. Caso de prueba de usabilidad También conocidos como tareas o escenarios, son casos en los que los probadores presentan escenarios de alto nivel o tareas para completar en lugar de instrucciones paso a paso para realizar la prueba. Estos casos de prueba se utilizan para analizar cómo los usuarios suelen abordar y utilizar una aplicación. Por ejemplo, verificar si el usuario puede agregar más de un artículo a su carrito de compras en un sitio web de compras en línea y cómo es esa experiencia. Diferencia entre caso de prueba y escenario de prueba CASO DE PRUEBA Conjunto de acciones ejecutadas para verificar una característica o funcionalidad particular de la aplicación. ESCENARIO DE PRUEBA Cualquier funcionalidad de la aplicación que se puede probar. Se centra en cómo probar Se centra en qué probar. Incluye pasos de prueba, datos y resultados esperados de la prueba Incluye una funcionalidad de extremo a extremo que debe probarse. Los equipos de control de calidad y desarrollo son responsables de escribir los casos de prueba. Ayuda en las pruebas exhaustivas. Requiere más tiempo, esfuerzo y recursos. Los escenarios de prueba son revisados por analistas comerciales o gerentes comerciales. Ayuda en la metodología ágil de probar la funcionalidad general. Requiere menos tiempo y esfuerzo en comparación. Cómo escribir un caso de prueba Hay varios pasos que se deben seguir para escribir casos de prueba. Incluyen  ID de caso de prueba: Todos y cada uno de los casos de prueba deben estar representados con una identificación única. Esto hace que sea más fácil y conveniente entenderlos y distinguirlos. 45  Descripción del caso de prueba: Cada caso de prueba debe tener una descripción adecuada que contenga detalles importantes como qué característica, unidad o función se está probando y qué debe verificarse.  Condiciones previas: También se acumulan las condiciones que se deben tener en cuenta al ejecutar la prueba.  Pasos de prueba: Para poder ejecutar una prueba correctamente, debe comprender correctamente cómo ejecutar ese caso de prueba en particular. Entonces, los pasos para ejecutar el caso de prueba deben ser escritos en un lenguaje fácil y comprensible. Información de prueba: Recopilar los datos necesarios para ejecutar el caso de prueba de forma precisa y concisa. Registrar esos datos en un documento claro y completo.   Resultado deseado: Explicar los resultados deseados del caso de prueba. Por ejemplo, al ingresar al botón de inicio de sesión, el usuario iniciará sesión en el sitio web con éxito.  Condiciones de publicación: Estas son las condiciones que se deben cumplir para la ejecución exitosa del caso de prueba.  Resultado real: Estos son los resultados obtenidos después de ejecutar el caso de prueba. Con base en estos resultados, se comprueba si el caso de prueba pasó o falló.  Estado: Finalmente, el estado del caso de prueba se define como aprobado o reprobado sobre la base de los resultados reales obtenidos al ejecutar el caso de prueba. Si los resultados obtenidos son los deseados, la prueba se marca como aprobada, si no, se marca como fallida. Si la prueba falla, pasa por el ciclo de vida del error para que los desarrolladores lo corrijan. Análisis de documentación Base de pruebas: Punto de partida de la documentación Tanto si se trabaja en entornos ágiles, como si se trabaja con metodologías más clásicas es necesario entender cuál es el mínimo necesario de documentación para saber dos cosas: La primera, ¿qué se va a desarrollar? Y la segunda, ¿qué se va a probar? Si se está trabajando en el desarrollo de software o probando un proyecto y no se conocen las respuestas a las preguntas anteriores, difícilmente se pueda verificar y validar el producto de forma adecuada. Existe documentación recomendada en testing, que será la base desde la cual se parta para conocer qué se va a desarrollar; y, en función del tipo de metodología sobre la que se desarrolle se deberá contar con un material u otro. Metodología ágil: Historias de usuario Se deben disponer de las historias de usuarios cumplimentadas y trabajadas en la aclaración de dudas, para que no haya la menor incertidumbre a la hora de desarrollar. Es recomendable que disponga de una serie de campos a rellenar, partiendo quizás de una plantilla que permita estandarizar la recogida de la información.`,
  5: `UNIDAD N°5: DEFECTOS, ERRORES Y FALLAS Contenido: Concepto ∙ Diferencias ∙ Clasificación de defectos ∙ Criticidad y urgencia ∙ Reporte de defectos ∙ Bugs asociados a funcionalidades básicas. Concepto Los primeros usos del término bug se asocian a las conversaciones de Thomas Alva Edison con empresarios de Western Union, en las que utiliza esta palabra para asegurar la presencia de fallos en el funcionamiento de su invención más importante, el telégrafo. 57 Tiempo después, la palabra bug (bicho) tras encontrar una polilla en el interior de una de las primeras computadoras de la década de 1940, como se ha comentado en la Unidad 1. la Universidad de Harvard ingenieros de retomaron Un bug en software puede impactar el desarrollo, funcionamiento y rendimiento de los productos informáticos en función de la composición del código y los cambios implementados durante el proceso de creación. Las inconsistencias en el diseño y la falta de compatibilidad con otros programas pueden dar origen a estos fallos, algunos con mayor nivel de riesgo que otros. Causas Los defectos pueden ser causados por una variedad de factores, como errores humanos, problemas ambientales, problemas técnicos o brechas de comunicación. Las causas comunes de defectos incluyen ambigüedad de requisitos, pruebas inadecuadas, control de calidad deficiente y falta de habilidades o conocimientos. Ambigüedad de requisitos La ingeniería de requisitos es una de las etapas más importantes del ciclo de vida del desarrollo de software. El éxito de cualquier producto de software depende de la calidad de sus requisitos. Los requisitos de software suelen estar escritos en lenguaje natural. La ambigüedad en los requisitos escritos en lenguaje natural es un problema que ha sido estudiado por la comunidad de ingeniería de requisitos durante más de dos décadas; ocurre cuando los requisitos no son claros, están incompletos, son inconsistentes o cambian con frecuencia, lo que genera confusión entre las partes interesadas. La resolución manual de la ambigüedad en los requisitos es tediosa y requiere mucho tiempo. Existen varias herramientas de procesamiento del lenguaje natural para automatizar el análisis de la ambigüedad, sin embargo, la mayoría de ellas no están ampliamente disponibles, son obsoletas, poco seguras y caras. Para evitar esta causa es necesario que los requerimientos sean precisos, dado que serán lo que dará guía y dirección a todo lo que se especifique en el desarrollo del software. La ambigüedad se refiere a expresiones o situaciones que pueden comprenderse de diferentes maneras o generar confusión. El término “ambiguo” es un adjetivo que señala a una persona que cuyas palabras o comportamientos no definen claramente sus actitudes u opiniones; es decir, es incierto o dudoso. Este concepto se relaciona con fallas de software ya que a la hora de ejecutar el trabajo no hay total claridad sobre cómo se harán las tareas, por lo que se crea controversia ya que se realiza primero de una forma, y quizás después se quiera hacer de otra forma, provocando confusión y en consecuencia una falla. Es de suma importancia que todos los procesos que tengan que ver con el desarrollo del software sean precisos y que carezcan de ambigüedad, realizando una documentación sólida y clara. Pruebas inadecuadas Cuando las pruebas no son suficientes, exhaustivas o lo suficientemente rigurosas para detectar y corregir los defectos antes de la liberación. El control de calidad deficiente ocurre 58 cuando los estándares, procesos o herramientas de calidad no se siguen, aplican o actualizan adecuadamente. Esto puede dar lugar a falsos positivos por las siguientes razones:  Error en la forma de ejecutar una prueba.  Defectos en los datos que usamos para nuestra prueba.  Defectos en el entorno de prueba (puede estar inestable).  Defectos en alguno de los productos de trabajo que usamos para conducir nuestra prueba.  Datos corruptos de la base de datos que usamos. Y también puede dar lugar al origen de los falsos negativos que son aquellas pruebas que no detectan defectos que deberían haber detectado, es decir damos como válida una funcionalidad o módulo cuando en realidad tiene un defecto. Las posibles causas de estos falsos resultados pueden derivarse de la persona misma que está testeando, o bien por no haber suficientes datos que cubran toda la cobertura de prueba que debiera contemplarse. Las pruebas son esenciales para garantizar que el software funcione correctamente y cumpla con los requisitos del proyecto. Si éstas no se realizan correctamente, pueden surgir errores y problemas que perjudicarán la salud del proyecto y serán difíciles de solucionar. Para evitar esto, es importante integrar las pruebas en el ciclo de desarrollo; siendo estas, pruebas de unidad, pruebas de integración, pruebas de aceptación del usuario y pruebas de rendimiento. Las pruebas deben ser automatizadas siempre que sea posible para garantizar una cobertura exhaustiva y una detección temprana de errores. Falta de habilidades o conocimientos Ocurre cuando los desarrolladores o probadores carecen de las habilidades, el conocimiento o la experiencia necesarios para diseñar, codificar o probar el software de manera efectiva y eficiente. La inexperiencia en cuanto al desarrollo de productos de software puede presentarse durante la toma de requerimientos, el desarrollo del código que luego se convierte en el producto de software y/o en el testing que se realice. Localización de los defectos de software Se tiene una creencia muy arraigada y antigua por la cual se piensa que los defectos serán localizados en el desarrollo realizado: en el código o configuración aplicada. Es cierto, ahí es donde se suelen localizar el grueso de las incidencias, pero no es el único lugar donde puede haber defectos. Si se indaga en el resto del material, en la documentación: requisitos, historias de usuarios, criterios de aceptación, documentación de desarrollo, planes de pruebas, manuales o guías de instalación; también se encontrarán discrepancias. No deben dejar de registrarse estos defectos y aplicar una corrección. Para resolver estas incoherencias en la documentación se realizarán reuniones que aclaren los requisitos a tener en cuenta, en cualquier momento del ciclo de vida del producto. Realizar sesiones de trabajo intercambien impresiones sobre el producto y adquiera más 59 conocimiento de lo que se está creando. De este modo, se reducirá el número de defectos y también el de falsos positivos. Prevención La prevención de defectos es el enfoque proactivo para reducir o eliminar la aparición de defectos en las pruebas de software, lo que implica identificar las causas raíz e implementar las mejores prácticas y técnicas. El análisis de requisitos, la revisión del código, la estrategia de prueba y la mejora continua son algunos métodos comunes de prevención de defectos. A su vez, evitar completamente los errores de software no es posible. Sin embargo, hay formas de minimizar la cantidad de errores. Análisis de requisitos Implica verificar y validar los requisitos para garantizar que sean claros, completos, consistentes y comprobables. Planificar y diseñar cuidadosamente el software es fundamental ya que una arquitectura de software bien construida ayuda a reducir la probabilidad de errores. Es imprescindible asegurar que cada función del software esté bien definida y sirve un propósito claro. Además, intenta mantener el código lo más simple y legible posible. Revisión de código Es el proceso de inspeccionar, evaluar y mejorar la calidad y funcionalidad del código siguiendo los estándares, directrices y principios de codificación. Las revisiones de código entre compañeros pueden ayudar a descubrir posibles problemas y mejorar la calidad general del código. Tener varias personas revisando el código puede ayudar a descubrir errores que un solo desarrollador pasaría por alto. Simplificación del código Es importante comprender que los códigos complicados tendrán más errores. También serán más difíciles de probar. Un código debe ser simple y preciso. Sólo debe realizar lo que necesita hacer. Evitar los códigos extensos es otra premisa. El código debe ser fácil de leer y comprender por los servicios de pruebas de software. Esto resultará en menos errores y menos recursos gastados en corregirlos. Evita perder tiempo construyendo un código sofisticado que no se solicita. Estrategia de pruebas Es el proceso de planificación, diseño y ejecución de actividades de prueba para cubrir características, funciones y escenarios de software de manera efectiva y eficiente. Utilizar herramientas de prueba de software automatizada es una buena práctica ya que pueden detectar errores antes de que se conviertan en problemas importantes. Implementar pruebas unitarias, pruebas de integración y pruebas funcionales puede ayudar a detectar errores temprano en el proceso de desarrollo. 60 Mediante estas estrategias, los desarrolladores pueden reducir la cantidad de errores, si no evitarlos por completo. También pueden detectar algunas fallas más temprano en la etapa de desarrollo. Mejora continua Proceso de monitoreo, medición y mejora de la calidad del software y los procesos de prueba mediante el uso de retroalimentación, métricas y lecciones aprendidas. A lo largo de la etapa de desarrollo, las pruebas deben ser un proceso continuo. Las pruebas continuas y el perfeccionamiento del software pueden ayudar en la detección de fallas y en la calidad general del código. Diferencias entre prevenir y corregir defectos Los costos de un defecto en el software varían de acuerdo a la etapa del ciclo de vida en la que hayan sido detectados: diseño, implementación, pruebas, mantenimiento. Entre más avanzado sea el momento de su detección, mayores serán las repercusiones para las empresas. Entre más anticipadas sean las prácticas de software testing, las repercusiones económicas serán menores.`,
  6: `UNIDAD N°6: NIVELES Y TIPOS DE TESTING Contenido: Introducción ∙ Tipos de prueba ∙ Niveles de prueba ∙ Playtesting ∙ Perfiles de usuarios ∙ Psicología del jugador ∙ Game feel ∙ Prueba de mantenimiento ∙ Pruebas tempranas ∙ Cuadro conceptual. Introducción El esquema de los niveles de pruebas de software permite que se analicen con mayor detalle los riesgos que un componente, aplicación o sistema puede tener, logrando un proceso de pruebas más eficaz. Esto tiene una relación directa con los tipos de pruebas de software. De acuerdo al International Software Testing Qualifications Board (ISTQB) existen 4 niveles de pruebas de software, 4 tipos de pruebas, y por su parte la norma ISO 25010 define 8 características de calidad, por lo que al tomar ambas referencias se puede establecer un camino a seguir. 80 Características de calidad establecidas por ISO 25010 Las características de un modelo para medir la calidad de un producto de software mediante los siguientes puntos:  Adecuación funcional: Es el grado de alcance que tiene el producto de las funciones que satisfacen las necesidades declaradas e implícitas. Aquí se prueba qué hace el producto.  Eficiencia del rendimiento: Es el desempeño relativo a la cantidad de recursos utilizados bajo condiciones específicas.  Compatibilidad: Se aplica cuando se tienen 2 o más elementos y se quiere verificar que éstos pueden coexistir en un mismo entorno - hardware o software - e intercambiar información entre ellos.  Usabilidad: Aunque tiene diferentes subtipos, en síntesis, se refiere a la capacidad del producto para ser entendido, aprendido, usado y resultar atractivo para el usuario.  Fiabilidad: Es el grado de un sistema o componente para desempeñar las funciones especificadas, bajo unas condiciones y periodo de tiempo determinados. Por ejemplo, la tolerancia a fallos. Seguridad: Es el nivel que los datos e información están protegidos para que personas o sistemas no autorizados puedan tener acceso a ellos.   Mantenibilidad: Es la capacidad del producto para ser modificado efectiva y eficientemente, debido a necesidades evolutivas, correctivas o perfectivas.  Portabilidad: Es el grado que un producto o componente para que pueda ser transferido de forma efectiva y eficiente de un entorno hardware, software, operacional o de utilización a otro. Modelos de ciclo de vida del desarrollo de software Comprende las etapas por las cuales avanza un proyecto de software: desde la relevación de información para determinar los requisitos del proyecto hasta la solución final. Describe cómo las actividades se relacionan entre sí y en qué momento debería llevarse a cabo cada una de ellas. El modelo a elegir dependerá del objetivo del proyecto. Desarrollo de software y prueba de software Como tester es necesario conocer la metodología de pruebas que se está utilizando en el proyecto, porque es el marco de trabajo que indica cuándo se deben ejecutar qué tareas de pruebas, y qué técnica utilizar en el proceso. Una parte importante del rol del tester es estar familiarizado con los modelos de ciclo de vida de desarrollo de software más comunes, de modo que puedan realizar las actividades de prueba adecuadas. En cualquier modelo hay una serie de características que hacen que las pruebas sean adecuadas:  Para cada actividad del desarrollo hay una actividad de prueba asociada.  Cada nivel de prueba tiene objetivos de prueba específicos para ese nivel.  El análisis y diseño de la prueba para un nivel de prueba dado comienza durante la actividad de desarrollo correspondiente. 81  Los testers participan en discusiones para definir y refinar los requisitos y el diseño; además, están involucrados en la revisión de los productos de trabajo tan pronto como las versiones borrador estén disponibles. Independientemente del modelo de ciclo de vida que se haya elegido, las actividades de prueba deben comenzar en las etapas iniciales del ciclo de vida, adhiriéndose al principio de “prueba temprana”. Modelos secuenciales Son aquellos donde cualquier fase del proceso de desarrollo comienza una vez que la anterior finalizó. En la teoría no hay un solapamiento de fases, pero en la práctica es beneficioso tener una retroalimentación temprana de la siguiente fase. Los modelos de desarrollo secuencial ofrecen software que contiene el conjunto completo de prestaciones, pero suelen requerir meses – o años – para su entrega a las partes interesadas y a los usuarios finales. Modelo de cascada Las actividades de desarrollo se completan una tras otra (actividades: análisis de requisitos, diseño, codificación, prueba). En este modelo, las actividades de prueba sólo ocurren después de que todas las demás actividades de desarrollo hayan sido completadas. Modelos iterativos y e incrementales Este tipo de desarrollo implica establecer requisitos, diseñar, construir y probar un sistema en fragmentos, lo que significa que las prestaciones del software crecen de forma incremental. El tamaño de las prestaciones varía ya que algunos métodos tienen piezas más grandes y otros más pequeñas. Eso significa sacar una primera versión básica e ir agregando funcionalidades con el paso del tiempo. El desarrollo iterativo se produce cuando se especifican, diseñan, construyen y prueban conjuntamente grupos de prestaciones en una serie de ciclos, a menudo, de una duración fija; las iteraciones pueden implicar cambios en las prestaciones desarrolladas en iteraciones anteriores, junto con cambios en el alcance del proyecto. Se presume que, al final de la iteración, el resultado es la obtención de un producto funcional y no un requerimiento desarrollado que por sí mismo no es operativo. Modelo V (incremental) Integra el proceso de prueba a lo largo de todo el proceso de desarrollo (aquí es donde se aplica el principio de prueba temprana mencionado anteriormente). Además, incluye niveles de prueba asociados con cada fase del desarrollo correspondiente, lo que favorece aún más la prueba temprana. En este modelo, la ejecución de las pruebas asociadas a cada nivel de prueba tiene lugar de forma secuencial, pero en algunos casos se producen solapamientos. 82 Definición de requerimientos Diseño funcional del sistema Diseño técnico del sistema Validación Validación Validación Pruebas de aceptación Pruebas de sistema Pruebas de integración Especificación componentes Validación Pruebas de componentes Modelos iterativos CÓDIGO  RUP (Rational Unified Process): Cada iteración tiende a ser relativamente larga (dos a tres meses), y las funcionalidades corresponden al tiempo invertido; se trata de dos o tres grupos de funcionalidades relacionadas.  Planificación  Modelo de negocio  Requerimientos  Análisis  Diseño  Implementación Planificación inicial Evaluación Pruebas Entrega  Scrum: Interacciones cortas (horas, días o pocas semanas) cuyas entregas representan dos o tres nuevas funcionalidades. 83  Kanban: Es un modelo implementado con o sin iteraciones de longitud fija, que pueden ofrecer una sola mejora o función al finalizar, o pueden agrupar funciones para lanzar a la vez. Como parte de su organización tiene una lista de tareas pendientes, tareas en curso y tareas finalizadas. experimentales; llegar a  Espiral (o de prototipos): Implica crear en incrementos ocasiones puede involucrar extensos procesos en el desarrollo que consuman importantes volúmenes de recursos, y que podrían llegar a ser desechados en etapas posteriores de desarrollo en caso de que no se consideren adecuados. Pero, en caso de acertar, permite obtener una visión previa de lo que se pretende alcanzar y forma más dirigir controlada hacia el objetivo. Se producen múltiples iteraciones sobre cada una de las etapas a lo largo del ciclo de vida. esfuerzos de Los componentes o sistemas desarrollados con estos métodos implican diferentes niveles de prueba que se superponen entre sí. Lo ideal es que cada prestación se pruebe en varios niveles de prueba a medida que se aproxima la entrega. Modelos de ciclo de vida del desarrollo de software en contexto Los modelos deben seleccionarse en base a las metas, el tipo de producto, los riesgos asociados, entre otras consideraciones. Hay niveles de prueba y actividades asociadas, y dependiendo de la complejidad, es posible que en algunos casos sea necesario combinar y reorganizar los niveles o actividades de prueba. Además, los modelos pueden combinarse (por ejemplo: utilizar el modelo V para la prueba de los sistemas back-end y sus integraciones; y utilizar un ágil para desarrollar y probar una UI). 84 Tipos de prueba Pruebas funcionales Las pruebas funcionales son un tipo de pruebas que buscan establecer si cada característica de la aplicación funciona según los requisitos del software. Cada función se compara con el requisito correspondiente para determinar si su resultado se ajusta a las expectativas del usuario final. Las pruebas se realizan proporcionando entradas de muestra, capturando las salidas resultantes y verificando que las salidas reales son las mismas que las esperadas. Algunos ejemplos de pruebas funcionales son:  ¿Pueden los usuarios iniciar sesión con éxito en la aplicación una vez que proporcionan credenciales legítimas?  ¿Rechaza la pasarela de pago la entrada y muestra un mensaje de error cuando un usuario introduce un número de tarjeta de crédito no válido?  ¿Las entradas de la pantalla "Añadir nuevo registro" añaden y guardan correctamente un nuevo registro en la base de datos? Al final de pruebas funcionales, en el caso de las aplicaciones, se debe contar con un software que tenga una interfaz de usuario coherente, una API consistente y que se integre a la perfección con los procesos empresariales. Las pruebas funcionales no se ocupan de investigar la calidad, la seguridad o el rendimiento del código fuente subyacente de la aplicación.`,
  7: `UNIDAD N°7: TÉCNICAS DE TESTING Contenido: Introducción a las técnicas de prueba ∙ Caja negra ∙ Caja blanca ∙ Caja gris ∙ Basada en la experiencia ∙ Prueba asociada al cambio ∙ Aplicación de técnicas de caja blanca/caja negra (anexo). Introducción a las técnicas de pruebas La técnica es la forma en la que se lleva a cabo una tarea de una manera específica; una buena técnica es algo que se realiza para que lo que se entregue sea el mejor resultado posible del trabajo realizado. Cuanto más refinadas estén mejor será el producto final; además, al volverse experto en las diferentes técnicas, se construyen buenas herramientas para realizar el trabajo. Las técnicas de prueba son las herramientas con las que cuenta el equipo de calidad para ejecutar proyectos de calidad. Es clave tener una comprensión básica de lo que se está tratando de resolver para lograr el éxito en cualquier prueba de calidad. Si bien no todas las técnicas se ajustarán a los objetivos de calidad actuales deben evaluarse todas, el uso a corto y largo plazo en su conjunto de herramientas. Estas técnicas se utilizan para lograr objetivos específicos y acelerar el tiempo que lleva probar el producto. Es muy importante desarrollar el plan de pruebas (que no es objeto de este curso) para poder exponerlo ante las diferentes áreas del equipo, utilizando un lenguaje que todo el equipo tenga familiarizado ya que en esta instancia es más importante enfocarse en el resultado que en las terminologías técnicas; el equipo quiere saber que el producto funciona y qué no debe suceder para asegurarse de que no se repetirá en versiones futuras. Por ello, el foco debe estar en comunicar cómo los resultados de las pruebas desafían el proyecto y el producto y por qué fallas específicas están afectándolo. De manera que, si alguien cuestiona los resultados, siempre se los puede redirigir al plan de pruebas y explicarle la técnica que se utilizó. Las pruebas y las técnicas utilizadas son parte de un entorno de colaboración para ayudar a garantizar los objetivos comunes de lograr un producto de calidad. La forma en que se comunica el plan y, lo más importante, los resultados de las pruebas afectarán directamente si el enfoque del equipo para las pruebas de calidad se considera exitoso. Existen varias técnicas de prueba manual que ayudan a reducir el número de casos de prueba que se ejecutarán al tiempo que aumentan la cobertura de prueba. Ayudan a identificar condiciones de prueba que de otro modo serían difíciles de reconocer. El objetivo de utilizar numerosas metodologías de software testing en el proceso de desarrollo es asegurarse de que la aplicación pueda funcionar con éxito en múltiples entornos y en diferentes plataformas. La clave para lanzar software de alta calidad que pueda ser adoptado fácilmente por los usuarios finales es construir un marco de prueba sólido que implemente metodologías de software testing tanto funcionales como no funcionales. En conclusión, las técnicas son herramientas a disposición para desarrollar un plan de pruebas que cubra el objetivo para garantizar la calidad del producto, sin dejar de lado el tiempo 101 que es el que determinará la cobertura de las pruebas, los casos y condiciones, brindando una prueba exhaustiva que no afecte al cronograma. El proceso de prueba no implica un camino lineal, en general los casos de prueba suelen tener capas sobre capas de técnicas; algunos trabajan juntos y otros suelen ser independientes, y algunos suelen ser intercambiables en diferentes etapas de prueba. Como parte de las pruebas se realizarán dos tipos típicos de evaluación:  Primero hay pruebas funcionales, cuando el equipo de calidad revisa el diseño del producto y ve si el software cumple con la especificación;  Segundo, las pruebas no funcionales que evalúan las partes “extrañas” del software, así como también la usabilidad y confiabilidad. Teniendo todo esto en cuenta, se puede decir que las técnicas no son diferentes tipos de pruebas, sino que son facetas de un proceso. Por ello, la calidad termina siendo para el desarrollador como un socio en su esfuerzo por entregar el producto, viendo las técnicas de prueba como herramientas importantes para probar conceptos y evaluar el trabajo. Caja Negra Introducción y objetivo Cuando se visualizan los objetivos centrales de una prueba de calidad, se están imaginando pruebas de caja negra. La prueba de caja negra es una evaluación de lo que se puede ver. La razón por la que tiene el nombre de caja negra es porque se trata de ver el software en sí sin saber lo que está sucediendo dentro; piensa en el comportamiento del producto y cómo se supone que debe funcionar. Este es el foco de las pruebas de caja negra: evaluar la interfaz, la entrada de datos, la salida, el diseño de la aplicación. Cuando los equipos de producto crean una aplicación de software para resolver un problema en particular, es la prueba de caja negra la que mide la eficacia con la que el producto logró ese propósito. Mide si se cumple con las especificaciones de diseño de todos los niveles; desde el campo de entrada más pequeño hasta el objetivo general del software, las pruebas de caja negra miden el software completo desde un enfoque externo. Las pruebas de calidad efectivas hablan con datos desde todos los puntos de vista, no hay lugar para la subjetividad. Las pruebas de caja negra adoptan este enfoque al permitir que las pruebas hablen con los datos. Gran parte del enfoque de esta prueba es binario, ya que informa si funciona o no. La entrega de los datos debe centrarse en los resultados fácticos extraídos de sus técnicas de prueba de caja negra; podría mostrarse dónde ocurre exactamente el problema y, a partir de pruebas, encontrar problemas repetibles. Los aspectos de la prueba funcional de la caja negra son las pruebas primarias empleadas para evaluar el rendimiento de un producto. Las pruebas no funcionales en pruebas de caja negra evalúan el software a partir de piezas externas que se conectan
